<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geography Games — HomeschoolGames</title>
  <link rel="stylesheet" href="../assets/css/site.css">
  <style>
    .games-section {
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    .games-heading {
      text-align: center;
      margin-bottom: 2rem;
    }
    .games-heading h1 {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      line-height: 1.05;
      margin: 0 0 0.5rem;
    }
    .games-heading h1 .pop {
      background: linear-gradient(90deg, #E0853B, var(--gold) 45%, #7A9C5C 90%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .games-heading p {
      color: var(--ink-light);
      font-size: clamp(1rem, 2.6vw, 1.2rem);
    }
    @media (max-width: 600px) {
      .games-section { padding: 2.5rem 1rem 3rem; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="../index.html" class="site-logo">Homeschool<span>Games</span></a>
  </header>

  <a href="../index.html" class="back-link"><span class="arrow" aria-hidden="true">←</span> Back</a>

  <section class="games-section">
    <div class="games-heading">
      <h1>🗺️ <span class="pop">Geography</span></h1>
      <p>Master the map — countries, capitals, and flags.</p>
    </div>

    <div class="game-grid">

        <a href="../games/map-quiz/index.html" class="game-tile">
          <span class="tile-icon">🗺️</span>
          <span class="tile-name">Map Quiz</span>
        </a>

        <a href="../games/flag-frenzy/index.html" class="game-tile">
          <span class="tile-icon">🚩</span>
          <span class="tile-name">Flag Frenzy</span>
        </a>

    </div>
  </section>

  <footer class="site-footer">
    homeschoolgames.app
  </footer>

</body>
</html>
