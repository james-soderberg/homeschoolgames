<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Quiz — HomeschoolGames</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
  <link rel="stylesheet" href="../../assets/css/streak-rail.css">
  <style>
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .map-page { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }

    .map-header { margin-bottom: 1rem; }
    .map-header h1 { font-size: 1.8rem; margin-bottom: 0.1rem; }

    /* Region selector */
    .region-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .region-tab {
      padding: 0.55rem 1.1rem;
      border: 2px solid var(--border);
      border-radius: 99px;
      background: white;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      color: var(--ink-light);
      transition: all 0.15s;
    }

    .region-tab.active {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }

    .region-tab:hover:not(.active) {
      border-color: var(--ink-light);
      color: var(--ink);
    }

    /* Country prompt — big */
    .prompt-box {
      background: white;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(26,23,20,0.07);
    }

    .prompt-left { flex: 1; min-width: 160px; }

    .prompt-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 0.35rem;
    }

    .prompt-country {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.1;
    }

    .score-box {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .score-item { text-align: center; }

    .score-num {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 600;
      display: block;
      line-height: 1;
    }

    .score-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      font-weight: 600;
    }

    .score-num.correct { color: var(--green); }
    .score-num.wrong   { color: var(--red); }
    .score-num.streak  { color: var(--gold); }

    /* Feedback bar */
    .feedback-bar {
      min-height: 2.4rem;
      margin-bottom: 0.75rem;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 0.3rem 0;
    }

    /* Map container */
    .map-container {
      background: #E8F4F8;
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .map-container svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Country paths */
    .country {
      fill: #D4C9B5;
      stroke: #9A8E7A;
      stroke-width: 0.5;
      cursor: pointer;
      transition: fill 0.15s;
    }

    .country:hover { fill: #C4A040; }
    .country.correct-flash { fill: #2A5C3F !important; animation: pop 0.3s ease; }
    .country.wrong-flash { fill: #8B2020 !important; }
    .country.highlight-target { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }
    .country.show-correct { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .prompt-country { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../../index.html" class="site-logo">Homeschool<span>Games</span></a>
  <nav class="site-nav">
    <a href="../../index.html">← All Games</a>
  </nav>
</header>

<div class="game-layout game-layout-wide">
<div class="map-page game-main">
  <div class="map-header">
    <h1>Map Quiz</h1>
  </div>

  <div class="region-tabs">
    <button class="region-tab active" onclick="loadRegion('americas')">🌎 Americas</button>
    <button class="region-tab" onclick="loadRegion('europe')">🌍 Europe</button>
    <button class="region-tab" onclick="loadRegion('asia')">🌏 Asia</button>
    <button class="region-tab" onclick="loadRegion('africa')">🌍 Africa</button>
  </div>

  <div class="prompt-box">
    <div class="prompt-left">
      <div class="prompt-label">Click this country on the map →</div>
      <div class="prompt-country" id="promptCountry">Loading…</div>
    </div>
    <div class="score-box">
      <div class="score-item">
        <span class="score-num correct" id="scoreCorrect">0</span>
        <span class="score-label">✓ Correct</span>
      </div>
      <div class="score-item">
        <span class="score-num wrong" id="scoreWrong">0</span>
        <span class="score-label">✗ Missed</span>
      </div>
    </div>
  </div>

  <div class="feedback-bar" id="feedbackBar"></div>

  <div class="map-container" id="mapContainer"></div>

  <div class="btn-row">
    <button class="btn btn-outline btn-sm" onclick="resetScores()">Reset Scores</button>
  </div>

</div><!-- /.map-page -->

  <aside class="hsg-rail" id="streakRail"></aside>
</div><!-- /.game-layout -->

<footer class="site-footer">
  <a href="../../index.html">homeschoolgames.app</a>
</footer>

<script src="../../assets/js/streak-rail.js"></script>
<script src="../../assets/js/map-data.js"></script>
<script>
// ============================================================
// MAP DATA — country lists per region
// Each country has: id (matches SVG path id), name
// ============================================================

const REGIONS = {

      {id:'SV',name:'El Salvador'},{id:'NI',name:'Nicaragua'},{id:'CR',name:'Costa Rica'},
      {id:'PA',name:'Panama'},{id:'CU',name:'Cuba'},{id:'HT',name:'Haiti'},
      {id:'DO',name:'Dominican Republic'},{id:'JM',name:'Jamaica'},
      {id:'CO',name:'Colombia'},{id:'VE',name:'Venezuela'},{id:'GY',name:'Guyana'},
      {id:'SR',name:'Suriname'},{id:'BR',name:'Brazil'},{id:'EC',name:'Ecuador'},
      {id:'PE',name:'Peru'},{id:'BO',name:'Bolivia'},{id:'CL',name:'Chile'},
      {id:'AR',name:'Argentina'},{id:'PY',name:'Paraguay'},{id:'UY',name:'Uruguay'},
    ]
  },
  europe: {
    label: 'Europe',
    countries: [
      {id:'IS',name:'Iceland'},{id:'IE',name:'Ireland'},{id:'GB',name:'United Kingdom'},
      {id:'PT',name:'Portugal'},{id:'ES',name:'Spain'},{id:'FR',name:'France'},
      {id:'BE',name:'Belgium'},{id:'NL',name:'Netherlands'},{id:'LU',name:'Luxembourg'},
      {id:'DE',name:'Germany'},{id:'CH',name:'Switzerland'},{id:'AT',name:'Austria'},
      {id:'IT',name:'Italy'},{id:'DK',name:'Denmark'},{id:'NO',name:'Norway'},
      {id:'SE',name:'Sweden'},{id:'FI',name:'Finland'},{id:'PL',name:'Poland'},
      {id:'CZ',name:'Czech Republic'},{id:'SK',name:'Slovakia'},{id:'HU',name:'Hungary'},
      {id:'RO',name:'Romania'},{id:'BG',name:'Bulgaria'},{id:'GR',name:'Greece'},
      {id:'HR',name:'Croatia'},{id:'SI',name:'Slovenia'},{id:'BA',name:'Bosnia'},
      {id:'RS',name:'Serbia'},{id:'ME',name:'Montenegro'},{id:'MK',name:'North Macedonia'},
      {id:'AL',name:'Albania'},{id:'EE',name:'Estonia'},{id:'LV',name:'Latvia'},
      {id:'LT',name:'Lithuania'},{id:'BY',name:'Belarus'},{id:'UA',name:'Ukraine'},

  },
  asia: {

    countries: [
      {id:'TR',name:'Turkey'},{id:'SY',name:'Syria'},{id:'LB',name:'Lebanon'},
      {id:'IL',name:'Israel'},{id:'JO',name:'Jordan'},{id:'IQ',name:'Iraq'},
      {id:'IR',name:'Iran'},{id:'SA',name:'Saudi Arabia'},{id:'YE',name:'Yemen'},
      {id:'OM',name:'Oman'},{id:'AE',name:'United Arab Emirates'},{id:'QA',name:'Qatar'},
      {id:'KW',name:'Kuwait'},{id:'AF',name:'Afghanistan'},{id:'PK',name:'Pakistan'},
      {id:'IN',name:'India'},{id:'NP',name:'Nepal'},{id:'BD',name:'Bangladesh'},
      {id:'LK',name:'Sri Lanka'},{id:'MM',name:'Myanmar'},{id:'TH',name:'Thailand'},

  },
  africa: {
    label: 'Africa',
    countries: [
      {id:'MA',name:'Morocco'},{id:'DZ',name:'Algeria'},{id:'TN',name:'Tunisia'},
      {id:'LY',name:'Libya'},{id:'EG',name:'Egypt'},{id:'MR',name:'Mauritania'},
      {id:'ML',name:'Mali'},{id:'NE',name:'Niger'},{id:'TD',name:'Chad'},

      {id:'CD',name:'DR Congo'},{id:'AO',name:'Angola'},{id:'ZM',name:'Zambia'},
      {id:'MW',name:'Malawi'},{id:'MZ',name:'Mozambique'},{id:'ZW',name:'Zimbabwe'},
      {id:'BW',name:'Botswana'},{id:'NA',name:'Namibia'},{id:'ZA',name:'South Africa'},
      {id:'SZ',name:'Eswatini'},{id:'LS',name:'Lesotho'},{id:'MG',name:'Madagascar'},
    ]
  }
};

// ============================================================
// SVG MAP DATA — real country outlines from Natural Earth (110m),
// projected with d3-geo. Data lives in ../../assets/js/map-data.js
// (window.HSG_MAP_DATA), regenerated via scratchpad/gen.mjs.
// ============================================================

function buildRegionSVG(region) {
  const data = window.HSG_MAP_DATA[region];
  let svg = `<svg viewBox="${data.viewBox}" xmlns="http://www.w3.org/2000/svg">`;
  for (const [id, d] of Object.entries(data.paths)) {
    svg += `<path id="${id}" class="country" d="${d}"></path>`;
  }
  svg += `</svg>`;
  return svg;
}

// ---- State ----
let currentRegion = 'americas';
let queue = [];
let currentCountry = null;
let scoreCorrect = 0;
let scoreWrong = 0;
let streak = 0;
let waitingForNext = false;
let advanceTimer = null;

function loadRegion(region) {
  currentRegion = region;
  document.querySelectorAll('.region-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim().toLowerCase().startsWith(region.charAt(0).toUpperCase() + region.slice(1, 3)));
  });
  // fix active for africa
  document.querySelectorAll('.region-tab').forEach(t => {
    const labels = { americas:'Americas', europe:'Europe', asia:'Asia', africa:'Africa' };
    t.classList.toggle('active', t.textContent.trim() === labels[region]);
  });

  // Render map
  document.getElementById('mapContainer').innerHTML = buildRegionSVG(region);

  // Attach click handlers
  document.querySelectorAll('#mapContainer .country').forEach(path => {
    path.addEventListener('click', () => handleCountryClick(path.id));
  });

  // Reset queue & start
  resetQueue();
}

function resetQueue() {
  if (typeof rail !== 'undefined') rail.end(); // streak ends on reset / region switch
  queue = shuffle([...REGIONS[currentRegion].countries]);
  scoreCorrect = 0;
  scoreWrong = 0;
  streak = 0;
  updateScoreDisplay();
  nextQuestion();
}

function resetScores() {
  loadRegion(currentRegion);
}

function nextQuestion() {
  clearTimeout(advanceTimer);
  waitingForNext = false;
  // Clear feedback
  document.getElementById('feedbackBar').textContent = '';
  // Clear highlights
  document.querySelectorAll('#mapContainer .country').forEach(el => {
    el.classList.remove('correct-flash', 'wrong-flash', 'show-correct');
  });

  if (queue.length === 0) {
    queue = shuffle([...REGIONS[currentRegion].countries]);
  }

  currentCountry = queue.pop();
  document.getElementById('promptCountry').textContent = currentCountry.name;
}

function handleCountryClick(countryId) {
  if (waitingForNext) {
    nextQuestion();
    return;
  }
  if (!currentCountry) return;

  const fb = document.getElementById('feedbackBar');
  const correctEl = document.getElementById(currentCountry.id);

  if (countryId === currentCountry.id) {
    scoreCorrect++;
    streak++;
    rail.hit();
    fb.innerHTML = `<span class="feedback-correct">🎉 Yes! That's ${currentCountry.name}!</span>`;
    if (correctEl) correctEl.classList.add('correct-flash');
    updateScoreDisplay();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 1000);
  } else {
    scoreWrong++;
    const endedStreak = streak;
    streak = 0;
    const wrongName = getCountryName(countryId);
    fb.innerHTML = `<span class="feedback-wrong">✗ ${wrongName ? `That's ${wrongName}.` : 'Not quite!'} ${currentCountry.name} is highlighted in green.</span>`;
    if (correctEl) correctEl.classList.add('show-correct');
    const wrongEl = document.getElementById(countryId);
    if (wrongEl) {
      wrongEl.classList.add('wrong-flash');
      setTimeout(() => wrongEl.classList.remove('wrong-flash'), 800);
    }
    updateScoreDisplay();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 1800);
    // A streak just ended — flare down and offer the leaderboard if it qualifies.
    if (endedStreak) rail.end();
  }
}

function getCountryName(id) {
  const all = Object.values(REGIONS).flatMap(r => r.countries);
  return all.find(c => c.id === id)?.name || null;
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent = scoreWrong;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// Init
// ============================================================
const rail = HSGStreak.init({
  gameId: 'map-quiz', gameName: 'Map Quiz', minStreak: 1,
  mount: document.getElementById('streakRail')
});

loadRegion('americas');
</script>

</body>
</html>
