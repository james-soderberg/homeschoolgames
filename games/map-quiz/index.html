    @keyframes pop {

      40%  { transform: scale(1.04); }

    .map-header { margin-bottom: 1rem; }
    .map-header h1 { font-size: 1.8rem; margin-bottom: 0.1rem; }

    /* ---- World-map region picker (start screen) ---- */
    .world-pick { text-align: center; }
    .pick-intro { font-size: 1.05rem; color: var(--ink-light); margin: 0 0 0.9rem; }
    .world-map-wrap {

    .world-svg { display: block; width: 100%; height: auto; }
    .wm-country { stroke-width: 0.5; transition: filter 0.12s; }
    .wm-region { cursor: pointer; }
    .wm-region[data-region="americas"] .wm-country { fill: #E4A65B; stroke: #b07a34; }
    .wm-region[data-region="europe"]   .wm-country { fill: #7BB0E0; stroke: #43719e; }
    .wm-region[data-region="asia"]     .wm-country { fill: #C58BD0; stroke: #835690; }
    .wm-region[data-region="africa"]   .wm-country { fill: #77C08A; stroke: #43855a; }
    .wm-region:hover .wm-country, .wm-region.hot .wm-country { filter: brightness(1.14) saturate(1.15); }
    .wm-region:hover .wm-country, .wm-region.hot .wm-country { stroke-width: 0.9; }
    .wm-label {
      font-family: var(--font-serif); font-weight: 800; font-size: 30px; fill: #22201a;
      paint-order: stroke; stroke: #fff; stroke-width: 5px; stroke-linejoin: round; pointer-events: none;

    .region-legend { display: flex; gap: 0.55rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
    .region-chip {
      display: flex; align-items: center; gap: 0.45rem; padding: 0.5rem 0.95rem;

    }
    .region-chip:hover { transform: translateY(-2px); border-color: var(--gold); }
    .region-chip .rc-count { font-size: 0.78rem; color: var(--ink-light); font-weight: 500; }
    .mq-board-region { font-family: var(--font-sans); font-weight: 700; font-size: 0.82rem;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-light); margin-bottom: 0.4rem; text-align: center; }

    /* Country prompt - big */
    .prompt-box {
      background: white;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(26,23,20,0.07);
    }

    .prompt-left { flex: 1; min-width: 160px; }

    .prompt-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 0.35rem;
    }

    .prompt-country {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.1;
    }

    .score-box {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .score-item { text-align: center; }

    .score-num {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 600;
      display: block;
      line-height: 1;
    }

    .score-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      font-weight: 600;
    }

    .score-num.correct { color: var(--green); }
    .score-num.wrong   { color: var(--red); }
    .score-num.streak  { color: var(--gold); }

    /* Feedback bar */

      min-height: 2.4rem;
      margin-bottom: 0.75rem;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 0.3rem 0;
    }

    /* Map container */

      background: #E8F4F8;
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .map-container svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Neighbouring filler land - fills gaps, not part of the quiz */
    .country-bg {
      fill: #E2E0D2;
      stroke: #B8AE98;
      stroke-width: 0.4;
      pointer-events: none;
    }

    /* Country paths */
    .country {
      fill: #D4C9B5;
      stroke: #9A8E7A;
      stroke-width: 0.5;
      cursor: pointer;
      transition: fill 0.15s;
    }

    .country:hover { fill: #C4A040; }
    .country.correct-flash { fill: #2A5C3F !important; animation: pop 0.3s ease; }
    .country.wrong-flash { fill: #8B2020 !important; }
    .country.highlight-target { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }
    .country.show-correct { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }
    /* Already found - painted a bright, per-country colour (set inline in JS);
       hovering brightens it and shows the country name in a tooltip. */
    .country.completed { fill: #6CA8C4; stroke: #3f6b7d; cursor: pointer; }

    #mapTip {

// ============================================================
// SVG MAP DATA - real country outlines from Natural Earth (110m),
// projected with d3-geo. Data lives in ../../assets/js/map-data.js
// (window.HSG_MAP_DATA), regenerated via scratchpad/gen.mjs.
// ============================================================

function buildRegionSVG(region) {
  const data = window.HSG_MAP_DATA[region];
  let svg = `<svg viewBox="${data.viewBox}" xmlns="http://www.w3.org/2000/svg">`;
  // Background filler: neighbouring non-quiz land so the continent reads whole
  // (no gaps). Non-interactive.
  for (const d of data.bg || []) {
    svg += `<path class="country-bg" d="${d}"></path>`;
  }
  // Interactive quiz countries on top.
  for (const [id, d] of Object.entries(data.paths)) {
    svg += `<path id="${id}" class="country" d="${d}"></path>`;
  }
  svg += `</svg>`;
  return svg;
}

// ---- State ----
// Each entry into a region is a FRESH run (all its countries to find), so the
// accuracy score is a full, comparable attempt. runCorrect/runWrong drive both
// the live readout and the leaderboard score.
let currentRegion = null;
let queue = [];
let currentCountry = null;
let completed = new Set();   // ids found so far THIS run (colours the map)
let runCorrect = 0;          // correct clicks this run
let runWrong = 0;            // wrong clicks this run
let streak = 0;              // local streak — only drives confetti milestones
let waitingForNext = false;
let advanceTimer = null;
let regionJustFinished = false;

// A single integer encodes correct + wrong for the leaderboard (see the
// `mapscore` unit in streak-rail.js): more correct wins, ties broken by fewer wrong.
function encodeScore(correct, wrong) { return correct * 1000 + (999 - Math.min(wrong, 999)); }

// ---- Whole-world map (start picker), composed from the four region datasets.
// Each region is independently projected to its own ~1016 box, so we rescale each
// to a common ~5px-per-degree and place it at its real lon/lat. Approximate, but
// it reads as a clean world map with four clickable, highlightable regions.
const GEO = {
  americas: { latSpan: 127, cLon: -95, cLat: 8 },
  africa:   { latSpan: 72,  cLon: 20,  cLat: 2 },
  asia:     { latSpan: 65,  cLon: 104, cLat: 28 },
  europe:   { latSpan: 36,  cLon: 12,  cLat: 57 },
};
const REGION_META = {
  americas: { label: 'Americas', emoji: '🌎', labelLon: -100, labelLat: 46 },
  europe:   { label: 'Europe',   emoji: '🌍', labelLon: 15,   labelLat: 50 },
  asia:     { label: 'Asia',     emoji: '🌏', labelLon: 93,   labelLat: 41 },
  africa:   { label: 'Africa',   emoji: '🌍', labelLon: 22,   labelLat: 3 },
};
function buildWorldSVG() {
  const K = 5, wx = lon => (lon + 170) * K, wy = lat => (85 - lat) * K;
  const order = ['americas', 'africa', 'asia', 'europe'];   // Europe last = on top at the Euro-Asia seam
  let inner = '', labels = '', minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  for (const region of order) {
    const data = window.HSG_MAP_DATA[region]; if (!data) continue;
    const vb = data.viewBox.split(/\s+/).map(Number);       // [x, y, w, h]
    const g = GEO[region], s = K * g.latSpan / vb[3];
    const wsc = vb[2] * s, hsc = vb[3] * s;
    const cx = wx(g.cLon), cy = wy(g.cLat), px = cx - wsc / 2, py = cy - hsc / 2;
    minX = Math.min(minX, px); minY = Math.min(minY, py);
    maxX = Math.max(maxX, px + wsc); maxY = Math.max(maxY, py + hsc);
    inner += `<g class="wm-region" data-region="${region}" transform="translate(${px.toFixed(1)},${py.toFixed(1)}) scale(${s.toFixed(4)}) translate(${(-vb[0]).toFixed(1)},${(-vb[1]).toFixed(1)})">`;
    for (const d of Object.values(data.paths)) inner += `<path class="wm-country" d="${d}"></path>`;
    inner += `</g>`;
    const m = REGION_META[region];
    labels += `<text class="wm-label" x="${wx(m.labelLon).toFixed(0)}" y="${wy(m.labelLat).toFixed(0)}" text-anchor="middle">${m.emoji} ${m.label}</text>`;
  }
  const pad = 26;
  const vbox = `${(minX - pad).toFixed(0)} ${(minY - pad).toFixed(0)} ${(maxX - minX + 2 * pad).toFixed(0)} ${(maxY - minY + 2 * pad).toFixed(0)}`;
  return `<svg viewBox="${vbox}" xmlns="http://www.w3.org/2000/svg" class="world-svg">${inner}${labels}</svg>`;
}

// Native SVG tooltip on a country path
function setTitle(el, name) {
  if (!el) return;
  let t = el.querySelector('title');
  if (!t) {
    t = document.createElementNS('http://www.w3.org/2000/svg', 'title');
    el.appendChild(t);
  }
  t.textContent = name;
}

// Found countries fill in with a colour drawn from their NATIONAL FLAG - the
// single most identifying flag colour - so the map reads like a flag/political
// map instead of flat grey. Keyed by ISO-2 id.
const FLAG_COLORS = {
  // Americas
  CA:'#D52B1E', US:'#3C3B6E', MX:'#006847', GT:'#4997D0', BZ:'#003F87', HN:'#0073CF',
  SV:'#0F47AF', NI:'#0067C6', CR:'#002B7F', PA:'#005293', CU:'#002A8F', HT:'#00209F',
  DO:'#002D62', JM:'#009B3A', CO:'#FCD116', VE:'#00247D', GY:'#009E49', SR:'#377E3F',
  BR:'#009C3B', EC:'#FFD100', PE:'#D91023', BO:'#FFE000', CL:'#0039A6', AR:'#74ACDF',
  PY:'#D52B1E', UY:'#0038A8', GF:'#0055A4',
  // Europe
  IS:'#02529C', IE:'#169B62', GB:'#012169', PT:'#006600', ES:'#C60B1E', FR:'#0055A4',
  BE:'#FAE042', NL:'#FF6C00', LU:'#00A1DE', DE:'#DD0000', CH:'#D52B1E', AT:'#ED2939',
  IT:'#008C45', DK:'#C8102E', NO:'#BA0C2F', SE:'#006AA7', FI:'#003580', PL:'#DC143C',
  CZ:'#11457E', SK:'#0B4EA2', HU:'#CD2A3E', RO:'#002B7F', BG:'#00966E', GR:'#0D5EAF',
  HR:'#D81E05', SI:'#005DA4', BA:'#002395', RS:'#C6363C', ME:'#C40308', MK:'#D20000',
  AL:'#E41E20', EE:'#0072CE', LV:'#9E3039', LT:'#FDB913', BY:'#00843D', UA:'#0057B7',
  MD:'#0046AE', RU:'#DA291C',
  // Asia
  TR:'#E30A17', SY:'#007A3D', LB:'#ED1C24', IL:'#0038B8', JO:'#CE1126', IQ:'#CE1126',
  IR:'#239F40', SA:'#006C35', YE:'#CE1126', OM:'#C8102E', AE:'#00732F', QA:'#8A1538',
  KW:'#007A3D', AF:'#007A36', PK:'#0C6B37', IN:'#FF9933', NP:'#DC143C', BD:'#006A4E',
  LK:'#8D2029', MM:'#FECB00', TH:'#241D4F', LA:'#002868', VN:'#DA251D', KH:'#032EA1',
  MY:'#CC0001', ID:'#CE1126', PH:'#0038A8', CN:'#DE2910', MN:'#C4272E', KR:'#003478',
  KP:'#ED1C27', JP:'#BC002D', KZ:'#00AFCA', UZ:'#0099B5', TM:'#00843D', AZ:'#00B5E2',
  GE:'#E8112D', AM:'#D90012',
  // Africa
  MA:'#C1272D', DZ:'#006233', TN:'#E70013', LY:'#239E46', EG:'#CE1126', MR:'#00853F',
  ML:'#14B53A', NE:'#E05206', TD:'#002664', SD:'#D21034', ER:'#12AD2B', ET:'#078930',
  DJ:'#6AB2E7', SO:'#4189DD', SN:'#00853F', GM:'#CE1126', GW:'#CE1126', GN:'#FCD116',
  SL:'#1EB53A', LR:'#BF0A30', CI:'#F77F00', GH:'#FCD116', TG:'#006A4E', BJ:'#FCD116',
  NG:'#008751', CM:'#007A5E', CF:'#003082', SS:'#0F47AF', UG:'#FCDC04', KE:'#BE0027',
  RW:'#00A1DE', BI:'#CE1126', TZ:'#1EB53A', GA:'#009E60', CG:'#009543', CD:'#007FFF',
  AO:'#CE1126', ZM:'#198A00', MW:'#21873B', MZ:'#007168', ZW:'#319208', BW:'#75AADB',
  NA:'#003580', ZA:'#007A4D', SZ:'#3E5EB9', LS:'#00209F', MG:'#FC3D32'
};
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
// darken a #rrggbb fill into a matching border colour
function darken(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.round(((n >> 16) & 255) * f), g = Math.round(((n >> 8) & 255) * f), b = Math.round((n & 255) * f);
  return `rgb(${r},${g},${b})`;
}
function colorFor(id) {
  const flag = FLAG_COLORS[id];
  if (flag) return { fill: flag, stroke: darken(flag, 0.6) };
  const hue = hashStr(id) % 360;          // fallback for any id without a flag colour
  return { fill: `hsl(${hue}, 50%, 63%)`, stroke: `hsl(${hue}, 45%, 38%)` };
}
function paintCompleted(el, id) {
  if (!el) return;
  const c = colorFor(id);
  el.style.fill = c.fill;
  el.style.stroke = c.stroke;
  el.style.strokeWidth = '0.6';
}

// Set the target country in the top prompt AND the always-visible floating chips
// (bottom + right edge), so you can see what to find without scrolling up.
function setPrompt(text, isCountry) {
  document.getElementById('promptCountry').textContent = text;
  const el = document.getElementById('fpBottom');
  if (el) {
    if (isCountry) {
      el.innerHTML = '<span class="lbl">Find:</span> <b>' + text + '</b>';
      el.classList.add('show');
    } else {
      el.classList.remove('show');
    }
  }
}

// ---- screen switching ----
function showPicker() {
  clearTimeout(advanceTimer); waitingForNext = false; currentCountry = null;
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('worldPicker').style.display = '';
  const fp = document.getElementById('fpBottom'); if (fp) fp.classList.remove('show');
  renderPickerBoards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function enterRegion(region) {
  currentRegion = region;
  document.getElementById('worldPicker').style.display = 'none';
  document.getElementById('gameScreen').style.display = '';
  loadRegion(region);
  renderRegionBoard();
}

function loadRegion(region) {
  currentRegion = region;
  document.getElementById('mapContainer').innerHTML = buildRegionSVG(region);
  document.querySelectorAll('#mapContainer .country').forEach(path => {
    path.addEventListener('click', () => handleCountryClick(path.id));
  });
  startRound();
}

// Every entry into a region is a fresh, full run so the score is comparable.
function startRound() {
  completed = new Set();
  runCorrect = 0; runWrong = 0; streak = 0; regionJustFinished = false;
  queue = shuffle(REGIONS[currentRegion].countries.slice());
  updateScoreDisplay();
  nextQuestion();
}

function restartRegion() { clearTimeout(advanceTimer); loadRegion(currentRegion); }

// ---- leaderboard (per region, accuracy-based) ----
function renderRegionBoard() {
  const host = document.getElementById('streakRail');
  if (!host || !currentRegion) return;
  host.innerHTML = '<div class="mq-board-region">' + REGIONS[currentRegion].label + ' · Top scores</div><div id="mqRailBoard"></div>';
  HSGStreak.renderBoardInto('#mqRailBoard', { gameId: 'map-quiz', level: currentRegion, minStreak: 1, unit: 'mapscore' });
}

// Start screen: one collapsible board per region, right in the rail.
function renderPickerBoards() {
  const host = document.getElementById('streakRail');
  if (!host || !window.HSGStreak || !HSGStreak.levelBoards) return;
  host.innerHTML = '<div id="mqPickerBoards"></div>';
  HSGStreak.levelBoards('#mqPickerBoards', {
    gameId: 'map-quiz', unit: 'mapscore', minStreak: 1, title: '🏆 Top scores by region',
    levels: ['americas', 'europe', 'asia', 'africa'].map(r => ({
      key: r, label: REGION_META[r].label, icon: REGION_META[r].emoji
    }))
  });
}

// Bank this run to the leaderboard (only if at least one country was found), then
// run onDone. Prompts for a name inline only when the score makes the Top 10.
function bankRun(onDone) {
  if (runCorrect <= 0) { if (onDone) onDone(); return; }
  HSGStreak.record({
    gameId: 'map-quiz', gameName: 'Map Quiz',
    level: currentRegion, levelName: REGIONS[currentRegion].label,
    unit: 'mapscore', minStreak: 1, score: encodeScore(runCorrect, runWrong),
    onDone: () => { renderRegionBoard(); if (onDone) onDone(); }
  });
}
// Quit mid-run: save the score even though the region isn't finished, then return
// to the world picker.
function quitAndSave() {
  clearTimeout(advanceTimer); waitingForNext = false; currentCountry = null;
  bankRun(showPicker);
}

function nextQuestion() {
  clearTimeout(advanceTimer);
  waitingForNext = false;
  document.getElementById('feedbackBar').textContent = '';
  document.querySelectorAll('#mapContainer .country').forEach(el => {
    el.classList.remove('correct-flash', 'wrong-flash', 'show-correct');
  });

  if (queue.length === 0) {
    // Region complete — every country found.
    currentCountry = null;
    const total = REGIONS[currentRegion].countries.length;
    setPrompt('All found! 🎉', false);
    const totalGuesses = runCorrect + runWrong;
    const pct = totalGuesses ? Math.round(100 * runCorrect / totalGuesses) : 100;
    document.getElementById('feedbackBar').innerHTML =
      `<span class="feedback-correct">🌍 You found all ${total} countries in ${REGIONS[currentRegion].label}! ${pct}% accuracy.</span>`;
    if (regionJustFinished) {
      regionJustFinished = false;
      HSGfx.confetti({ count: 90, big: true });
      HSGfx.showSummary({
        title: `${REGIONS[currentRegion].label} complete!`,
        correct: runCorrect, total: totalGuesses,
        stats: [
          { num: runCorrect, label: 'Found' },
          { num: totalGuesses, label: 'Guesses' },
          { num: pct, label: '% Accuracy', cls: 'best' },
        ],
        extraHTML: '<div id="mqBoard" style="text-align:left;margin:0.25rem 0 0.5rem"></div>',
        onMount: card => HSGStreak.endPanel(card.querySelector('#mqBoard'), {
          gameId: 'map-quiz', gameName: 'Map Quiz', level: currentRegion, levelName: REGIONS[currentRegion].label,
          unit: 'mapscore', score: encodeScore(runCorrect, runWrong), minStreak: 1,
          onSaved: () => renderRegionBoard(),
        }),
        onPlayAgain: () => enterRegion(currentRegion),
      });
    }
    return;
  }

  currentCountry = queue.pop();
  setPrompt(currentCountry.name, true);
}

function handleCountryClick(countryId) {
  if (waitingForNext) {
    nextQuestion();
    return;
  }
  if (!currentCountry) return;
  if (completed.has(countryId)) return; // clicking an already-found country does nothing

  const fb = document.getElementById('feedbackBar');
  const correctEl = document.getElementById(currentCountry.id);

  if (countryId === currentCountry.id) {
    runCorrect++;
    streak++;
    HSGSound.correct();
    if (HSGfx.milestone(streak)) HSGSound.streak(streak);
    completed.add(currentCountry.id);
    if (completed.size === REGIONS[currentRegion].countries.length) regionJustFinished = true;
    if (correctEl) {
      correctEl.classList.add('correct-flash', 'completed');
      setTitle(correctEl, currentCountry.name);
      paintCompleted(correctEl, currentCountry.id);                 // set the colour (under the flash)
      const fid = currentCountry.id;
      setTimeout(() => { const e = document.getElementById(fid); if (e) e.classList.remove('correct-flash'); }, 450);
    }
    fb.innerHTML = `<span class="feedback-correct">🎉 Yes! That's ${currentCountry.name}!</span>`;
    updateScoreDisplay();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 1000);
  } else {
    runWrong++;
    streak = 0;
    HSGSound.wrong();
    const wrongName = getCountryName(countryId);
    fb.innerHTML = `<span class="feedback-wrong">✗ ${wrongName ? `That's ${wrongName}.` : 'Not quite!'} ${currentCountry.name} is highlighted in green.</span>`;
    if (correctEl) correctEl.classList.add('show-correct');
    const wrongEl = document.getElementById(countryId);
    if (wrongEl) {
      wrongEl.classList.add('wrong-flash');
      setTimeout(() => wrongEl.classList.remove('wrong-flash'), 800);
    }
    // Missed — put it back in the rotation so you get another shot at it.
    const at = Math.floor(Math.random() * (queue.length + 1));
    queue.splice(at, 0, currentCountry);
    updateScoreDisplay();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 1800);
  }
}

function getCountryName(id) {
  const all = Object.values(REGIONS).flatMap(r => r.countries);
  return all.find(c => c.id === id)?.name || null;
}

function updateScoreDisplay() {
  const total = REGIONS[currentRegion].countries.length;
  document.getElementById('scoreCorrect').textContent = `${runCorrect} / ${total}`;
  document.getElementById('scoreWrong').textContent = runWrong;
  const g = runCorrect + runWrong;
  document.getElementById('scoreAcc').textContent = g ? Math.round(100 * runCorrect / g) + '%' : '—';
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// Init — build the world picker; a region is chosen before play
// ============================================================
document.getElementById('worldMapWrap').innerHTML = buildWorldSVG();
document.querySelectorAll('#worldMapWrap .wm-region').forEach(g => {
  g.addEventListener('click', () => enterRegion(g.dataset.region));
});
// legend chips: hovering highlights the region on the map; clicking enters it
(function buildLegend() {
  const legend = document.getElementById('regionLegend');
  ['americas', 'europe', 'asia', 'africa'].forEach(r => {
    const m = REGION_META[r], n = REGIONS[r].countries.length;
    const chip = document.createElement('button');
    chip.className = 'region-chip'; chip.dataset.region = r;
    chip.innerHTML = m.emoji + ' <b>' + m.label + '</b> <span class="rc-count">' + n + ' countries</span>';
    const grp = () => document.querySelector('#worldMapWrap .wm-region[data-region="' + r + '"]');
    chip.addEventListener('mouseenter', () => { const el = grp(); if (el) el.classList.add('hot'); });
    chip.addEventListener('mouseleave', () => { const el = grp(); if (el) el.classList.remove('hot'); });
    chip.addEventListener('click', () => enterRegion(r));
    legend.appendChild(chip);
  });
})();

// Hover a found country to see its name (delegated, so it survives map rebuilds).
const mapTip = document.createElement('div');
mapTip.id = 'mapTip';
document.body.appendChild(mapTip);

// always-visible "what to find" chip pinned to the bottom of the screen
const fpBottom = document.createElement('div');
fpBottom.id = 'fpBottom'; fpBottom.className = 'float-prompt';
document.body.appendChild(fpBottom);
const mapContainerEl = document.getElementById('mapContainer');
function hideTip() { mapTip.classList.remove('show'); }
mapContainerEl.addEventListener('mousemove', (e) => {
  const path = e.target.closest ? e.target.closest('.country.completed') : null;
  const name = path ? getCountryName(path.id) : null;
  if (name) {
    mapTip.textContent = name;
    mapTip.style.left = e.clientX + 'px';
    mapTip.style.top = e.clientY + 'px';
    mapTip.classList.add('show');
  } else {
    hideTip();
  }
});
mapContainerEl.addEventListener('mouseleave', hideTip);

// Deep link straight into a region, e.g. ?r=asia (otherwise start on the picker).
const rq = new URLSearchParams(location.search).get('r');
if (rq && REGIONS[rq]) enterRegion(rq);
else renderPickerBoards();
</script>
