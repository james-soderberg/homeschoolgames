<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Quiz · HomeschoolGames</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
  <link rel="stylesheet" href="../../assets/css/streak-rail.css">
  <style>
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .map-page { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }

    .map-header { margin-bottom: 1rem; }
    .map-header h1 { font-size: 1.8rem; margin-bottom: 0.1rem; }

    /* Region selector */
    .region-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .region-tab {
      padding: 0.55rem 1.1rem;
      border: 2px solid var(--border);
      border-radius: 99px;
      background: white;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      color: var(--ink-light);
      transition: all 0.15s;
    }

    .region-tab.active {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }

    .region-tab:hover:not(.active) {
      border-color: var(--ink-light);
      color: var(--ink);
    }

    /* Country prompt — big */
    .prompt-box {
      background: white;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(26,23,20,0.07);
    }

    .prompt-left { flex: 1; min-width: 160px; }

    .prompt-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 0.35rem;
    }

    .prompt-country {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.1;
    }

    .score-box {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .score-item { text-align: center; }

    .score-num {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 600;
      display: block;
      line-height: 1;
    }

    .score-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      font-weight: 600;
    }

    .score-num.correct { color: var(--green); }
    .score-num.wrong   { color: var(--red); }
    .score-num.streak  { color: var(--gold); }

    /* Feedback bar */
    .feedback-bar {
      min-height: 2.4rem;
      margin-bottom: 0.75rem;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 0.3rem 0;
    }

    /* Map container */
    .map-container {
      background: #E8F4F8;
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .map-container svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Neighbouring filler land — fills gaps, not part of the quiz */
    .country-bg {
      fill: #E2E0D2;
      stroke: #B8AE98;
      stroke-width: 0.4;
      pointer-events: none;
    }

    /* Country paths */
    .country {
      fill: #D4C9B5;
      stroke: #9A8E7A;
      stroke-width: 0.5;
      cursor: pointer;
      transition: fill 0.15s;
    }

    .country:hover { fill: #C4A040; }
    .country.correct-flash { fill: #2A5C3F !important; animation: pop 0.3s ease; }
    .country.wrong-flash { fill: #8B2020 !important; }
    .country.highlight-target { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }
    .country.show-correct { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }
    /* Already found — painted a bright, per-country colour (set inline in JS);
       hovering brightens it and shows the country name in a tooltip. */
    .country.completed { fill: #6CA8C4; stroke: #3f6b7d; cursor: pointer; }
    .country.completed:hover { filter: brightness(1.12); }

    /* floating name tooltip for found countries */
    #mapTip {
      position: fixed; z-index: 60; pointer-events: none; opacity: 0;
      background: rgba(26,23,20,0.93); color: #fff;
      font-family: var(--font-sans); font-weight: 700; font-size: 0.82rem;
      padding: 0.3rem 0.6rem; border-radius: 8px; white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.28);
      transform: translate(-50%, calc(-100% - 12px)); transition: opacity 0.1s;
    }
    #mapTip.show { opacity: 1; }
    #mapTip::after {
      content: ""; position: absolute; left: 50%; top: 100%;
      transform: translateX(-50%); border: 6px solid transparent;
      border-top-color: rgba(26,23,20,0.93);
    }

    /* Always-visible "what to find" chips so you never scroll up to recheck. */
    .float-prompt {
      position: fixed; z-index: 55; pointer-events: none; opacity: 0; transition: opacity .15s;
      background: var(--ink); color: #fff; font-family: var(--font-sans); font-weight: 700;
      border-radius: 99px; box-shadow: 0 6px 20px rgba(0,0,0,.28); white-space: nowrap;
    }
    .float-prompt.show { opacity: 0.96; }
    .float-prompt .lbl { font-size: 0.7rem; letter-spacing: .08em; text-transform: uppercase; opacity: .8; }
    .float-prompt b { color: #f0d384; font-family: var(--font-serif); font-weight: 800; }
    #fpBottom { left: 50%; bottom: 16px; transform: translateX(-50%); padding: .55rem 1.2rem; font-size: 1.1rem; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .prompt-country { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../../index.html" class="site-logo">Homeschool<span>Games</span></a>
  <nav class="site-nav">
    <a href="../../subjects/geography.html">← Geography</a>
  </nav>
</header>

<div class="game-layout game-layout-wide">
<div class="map-page game-main">
  <div class="map-header">
    <h1>Map Quiz</h1>
  </div>

  <div class="region-tabs">
    <button class="region-tab active" onclick="loadRegion('americas')">🌎 Americas</button>
    <button class="region-tab" onclick="loadRegion('europe')">🌍 Europe</button>
    <button class="region-tab" onclick="loadRegion('asia')">🌏 Asia</button>
    <button class="region-tab" onclick="loadRegion('africa')">🌍 Africa</button>
  </div>

  <div class="prompt-box">
    <div class="prompt-left">
      <div class="prompt-label">Click this country on the map →</div>
      <div class="prompt-country" id="promptCountry">Loading…</div>
    </div>
    <div class="score-box">
      <div class="score-item">
        <span class="score-num correct" id="scoreCorrect">0</span>
        <span class="score-label">✓ Found</span>
      </div>
      <div class="score-item">
        <span class="score-num wrong" id="scoreWrong">0</span>
        <span class="score-label">✗ Missed</span>
      </div>
    </div>
  </div>

  <div class="feedback-bar" id="feedbackBar"></div>

  <div class="map-container" id="mapContainer"></div>

  <div class="btn-row">
    <button class="btn btn-outline btn-sm" onclick="resetScores()">Reset Scores</button>
  </div>

</div><!-- /.map-page -->

  <aside class="hsg-rail" id="streakRail"></aside>
</div><!-- /.game-layout -->

<footer class="site-footer">
  <a href="../../index.html">homeschoolgames.app</a>
</footer>

<script src="../../assets/js/streak-rail.js"></script>
<script src="../../assets/js/sfx.js"></script>
<script src="../../assets/js/fx.js"></script>

<script>

      {id:'SZ',name:'Eswatini'},{id:'LS',name:'Lesotho'},{id:'MG',name:'Madagascar'},

// ============================================================
// SVG MAP DATA — real country outlines from Natural Earth (110m),
// projected with d3-geo. Data lives in ../../assets/js/map-data.js
// (window.HSG_MAP_DATA), regenerated via scratchpad/gen.mjs.
// ============================================================

function buildRegionSVG(region) {
  const data = window.HSG_MAP_DATA[region];
  let svg = `<svg viewBox="${data.viewBox}" xmlns="http://www.w3.org/2000/svg">`;
  // Background filler: neighbouring non-quiz land so the continent reads whole
  // (no gaps). Non-interactive.
  for (const d of data.bg || []) {
    svg += `<path class="country-bg" d="${d}"></path>`;
  }
  // Interactive quiz countries on top.
  for (const [id, d] of Object.entries(data.paths)) {
    svg += `<path id="${id}" class="country" d="${d}"></path>`;
  }
  svg += `</svg>`;
  return svg;
}

// ---- State ----
let currentRegion = 'americas';
let queue = [];
let currentCountry = null;
let completed = new Set();   // ids of countries already found (this region)
let scoreWrong = 0;
let streak = 0;
let bestStreak = 0;
let waitingForNext = false;
let advanceTimer = null;
let regionJustFinished = false;

// ---- Persistence: found countries survive reloads so you fill them in over time ----
function storageKey(region) { return 'hsg-mapquiz-found-' + region; }
function loadCompleted(region) {
  try { return new Set(JSON.parse(localStorage.getItem(storageKey(region)) || '[]')); }
  catch (e) { return new Set(); }
}
function saveCompleted() {
  try { localStorage.setItem(storageKey(currentRegion), JSON.stringify([...completed])); }
  catch (e) { /* ignore quota / private-mode errors */ }
}

// Native SVG tooltip on a country path
function setTitle(el, name) {
  if (!el) return;
  let t = el.querySelector('title');
  if (!t) {
    t = document.createElementNS('http://www.w3.org/2000/svg', 'title');
    el.appendChild(t);
  }
  t.textContent = name;
}

// Found countries fill in with a colour drawn from their NATIONAL FLAG — the
// single most identifying flag colour — so the map reads like a flag/political
// map instead of flat grey. Keyed by ISO-2 id.
const FLAG_COLORS = {
  // Americas
  CA:'#D52B1E', US:'#3C3B6E', MX:'#006847', GT:'#4997D0', BZ:'#003F87', HN:'#0073CF',
  SV:'#0F47AF', NI:'#0067C6', CR:'#002B7F', PA:'#005293', CU:'#002A8F', HT:'#00209F',
  DO:'#002D62', JM:'#009B3A', CO:'#FCD116', VE:'#00247D', GY:'#009E49', SR:'#377E3F',
  BR:'#009C3B', EC:'#FFD100', PE:'#D91023', BO:'#FFE000', CL:'#0039A6', AR:'#74ACDF',
  PY:'#D52B1E', UY:'#0038A8',
  // Europe
  IS:'#02529C', IE:'#169B62', GB:'#012169', PT:'#006600', ES:'#C60B1E', FR:'#0055A4',
  BE:'#FAE042', NL:'#FF6C00', LU:'#00A1DE', DE:'#DD0000', CH:'#D52B1E', AT:'#ED2939',
  IT:'#008C45', DK:'#C8102E', NO:'#BA0C2F', SE:'#006AA7', FI:'#003580', PL:'#DC143C',
  CZ:'#11457E', SK:'#0B4EA2', HU:'#CD2A3E', RO:'#002B7F', BG:'#00966E', GR:'#0D5EAF',
  HR:'#D81E05', SI:'#005DA4', BA:'#002395', RS:'#C6363C', ME:'#C40308', MK:'#D20000',
  AL:'#E41E20', EE:'#0072CE', LV:'#9E3039', LT:'#FDB913', BY:'#00843D', UA:'#0057B7',
  MD:'#0046AE', RU:'#DA291C',
  // Asia
  TR:'#E30A17', SY:'#007A3D', LB:'#ED1C24', IL:'#0038B8', JO:'#CE1126', IQ:'#CE1126',
  IR:'#239F40', SA:'#006C35', YE:'#CE1126', OM:'#C8102E', AE:'#00732F', QA:'#8A1538',
  KW:'#007A3D', AF:'#007A36', PK:'#0C6B37', IN:'#FF9933', NP:'#DC143C', BD:'#006A4E',
  LK:'#8D2029', MM:'#FECB00', TH:'#241D4F', LA:'#002868', VN:'#DA251D', KH:'#032EA1',
  MY:'#CC0001', ID:'#CE1126', PH:'#0038A8', CN:'#DE2910', MN:'#C4272E', KR:'#003478',
  KP:'#ED1C27', JP:'#BC002D', KZ:'#00AFCA', UZ:'#0099B5', TM:'#00843D', AZ:'#00B5E2',
  GE:'#E8112D', AM:'#D90012',
  // Africa
  MA:'#C1272D', DZ:'#006233', TN:'#E70013', LY:'#239E46', EG:'#CE1126', MR:'#00853F',
  ML:'#14B53A', NE:'#E05206', TD:'#002664', SD:'#D21034', ER:'#12AD2B', ET:'#078930',
  DJ:'#6AB2E7', SO:'#4189DD', SN:'#00853F', GM:'#CE1126', GW:'#CE1126', GN:'#FCD116',
  SL:'#1EB53A', LR:'#BF0A30', CI:'#F77F00', GH:'#FCD116', TG:'#006A4E', BJ:'#FCD116',
  NG:'#008751', CM:'#007A5E', CF:'#003082', SS:'#0F47AF', UG:'#FCDC04', KE:'#BE0027',
  RW:'#00A1DE', BI:'#CE1126', TZ:'#1EB53A', GA:'#009E60', CG:'#009543', CD:'#007FFF',
  AO:'#CE1126', ZM:'#198A00', MW:'#21873B', MZ:'#007168', ZW:'#319208', BW:'#75AADB',
  NA:'#003580', ZA:'#007A4D', SZ:'#3E5EB9', LS:'#00209F', MG:'#FC3D32'
};
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
// darken a #rrggbb fill into a matching border colour
function darken(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.round(((n >> 16) & 255) * f), g = Math.round(((n >> 8) & 255) * f), b = Math.round((n & 255) * f);
  return `rgb(${r},${g},${b})`;
}
function colorFor(id) {
  const flag = FLAG_COLORS[id];
  if (flag) return { fill: flag, stroke: darken(flag, 0.6) };
  const hue = hashStr(id) % 360;          // fallback for any id without a flag colour
  return { fill: `hsl(${hue}, 50%, 63%)`, stroke: `hsl(${hue}, 45%, 38%)` };
}
function paintCompleted(el, id) {
  if (!el) return;
  const c = colorFor(id);
  el.style.fill = c.fill;
  el.style.stroke = c.stroke;
  el.style.strokeWidth = '0.6';
}

// Set the target country in the top prompt AND the always-visible floating chips
// (bottom + right edge), so you can see what to find without scrolling up.
function setPrompt(text, isCountry) {
  document.getElementById('promptCountry').textContent = text;
  const el = document.getElementById('fpBottom');
  if (el) {
    if (isCountry) {
      el.innerHTML = '<span class="lbl">Find:</span> <b>' + text + '</b>';
      el.classList.add('show');
    } else {
      el.classList.remove('show');
    }
  }
}

function loadRegion(region) {
  currentRegion = region;
  const labels = { americas:'Americas', europe:'Europe', asia:'Asia', africa:'Africa' };
  if (typeof rail !== 'undefined') rail.setLevel(region, labels[region]);  // per-region board
  document.querySelectorAll('.region-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === labels[region]);
  });

  // Render map
  document.getElementById('mapContainer').innerHTML = buildRegionSVG(region);

  // Attach click handlers
  document.querySelectorAll('#mapContainer .country').forEach(path => {
    path.addEventListener('click', () => handleCountryClick(path.id));
  });

  startRound();
}

function startRound() {
  completed = loadCompleted(currentRegion);
  scoreWrong = 0;
  streak = 0;
  bestStreak = 0;
  regionJustFinished = false;

  // Colour + label everything already found
  completed.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.add('completed'); setTitle(el, getCountryName(id)); paintCompleted(el, id); }
  });

  // Only ask for countries not yet found
  queue = shuffle(REGIONS[currentRegion].countries.filter(c => !completed.has(c.id)));
  updateScoreDisplay();
  nextQuestion();
}

function resetScores() {
  if (!confirm('Reset your found countries and scores for ' + REGIONS[currentRegion].label + '?')) return;
  try { localStorage.removeItem(storageKey(currentRegion)); } catch (e) {}
  loadRegion(currentRegion);
}

function nextQuestion() {
  clearTimeout(advanceTimer);
  waitingForNext = false;
  // Clear feedback + transient highlights (keep persistent .completed greying)
  document.getElementById('feedbackBar').textContent = '';
  document.querySelectorAll('#mapContainer .country').forEach(el => {
    el.classList.remove('correct-flash', 'wrong-flash', 'show-correct');
  });

  if (queue.length === 0) {
    // Region complete!
    currentCountry = null;
    const total = REGIONS[currentRegion].countries.length;
    setPrompt('All found! 🎉', false);
    document.getElementById('feedbackBar').innerHTML =
      `<span class="feedback-correct">🌍 You found all ${total} countries in ${REGIONS[currentRegion].label}!</span>`;
    // Only celebrate when the region was just finished by play (not on reload).
    if (regionJustFinished) {
      regionJustFinished = false;
      HSGfx.confetti({ count: 90, big: true });
      const banked = bestStreak;
      HSGfx.showSummary({
        title: `${REGIONS[currentRegion].label} complete!`,
        correct: total, total: total + scoreWrong, best: bestStreak,
        onPlayAgain: () => {
          try { localStorage.removeItem(storageKey(currentRegion)); } catch (e) {}
          loadRegion(currentRegion);
        },
        extraHTML: '<div id="mqBoard" style="text-align:left;margin:0.25rem 0 0.5rem"></div>',
        onMount: card => rail.gameOver(banked, card.querySelector('#mqBoard')),
      });
    }
    return;
  }

  currentCountry = queue.pop();
  setPrompt(currentCountry.name, true);
}

function handleCountryClick(countryId) {
  if (waitingForNext) {
    nextQuestion();
    return;
  }
  if (!currentCountry) return;
  if (completed.has(countryId)) return; // clicking an already-found country does nothing

  const fb = document.getElementById('feedbackBar');
  const correctEl = document.getElementById(currentCountry.id);

  if (countryId === currentCountry.id) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    rail.hit();
    HSGSound.correct();
    if (HSGfx.milestone(streak)) HSGSound.streak(streak);
    // Mark found: persists, greys out, and reveals its name on hover.
    completed.add(currentCountry.id);
    saveCompleted();
    if (completed.size === REGIONS[currentRegion].countries.length) regionJustFinished = true;
    if (correctEl) {
      correctEl.classList.add('correct-flash', 'completed');
      setTitle(correctEl, currentCountry.name);
      paintCompleted(correctEl, currentCountry.id);                 // set the colour (under the flash)
      const fid = currentCountry.id;
      setTimeout(() => { const e = document.getElementById(fid); if (e) e.classList.remove('correct-flash'); }, 450); // reveal it
    }
    fb.innerHTML = `<span class="feedback-correct">🎉 Yes! That's ${currentCountry.name}!</span>`;
    updateScoreDisplay();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 1000);
  } else {
    scoreWrong++;
    streak = 0;
    HSGSound.wrong();
    const wrongName = getCountryName(countryId);
    fb.innerHTML = `<span class="feedback-wrong">✗ ${wrongName ? `That's ${wrongName}.` : 'Not quite!'} ${currentCountry.name} is highlighted in green.</span>`;
    if (correctEl) correctEl.classList.add('show-correct');
    const wrongEl = document.getElementById(countryId);
    if (wrongEl) {
      wrongEl.classList.add('wrong-flash');
      setTimeout(() => wrongEl.classList.remove('wrong-flash'), 800);
    }
    // Missed — put it back in the rotation so you get another shot at it.
    const at = Math.floor(Math.random() * (queue.length + 1));
    queue.splice(at, 0, currentCountry);
    updateScoreDisplay();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 1800);
    rail.broke();   // wrong click snaps the streak — keep going, no modal
  }
}

function getCountryName(id) {
  const all = Object.values(REGIONS).flatMap(r => r.countries);
  return all.find(c => c.id === id)?.name || null;
}

function updateScoreDisplay() {
  const total = REGIONS[currentRegion].countries.length;
  document.getElementById('scoreCorrect').textContent = `${completed.size} / ${total}`;
  document.getElementById('scoreWrong').textContent = scoreWrong;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// Init
// ============================================================
const rail = HSGStreak.init({
  gameId: 'map-quiz', gameName: 'Map Quiz', minStreak: 1,
  mount: document.getElementById('streakRail')
});

// Hover a found country to see its name (delegated, so it survives map rebuilds).
const mapTip = document.createElement('div');
mapTip.id = 'mapTip';
document.body.appendChild(mapTip);

// always-visible "what to find" chip pinned to the bottom of the screen
const fpBottom = document.createElement('div');
fpBottom.id = 'fpBottom'; fpBottom.className = 'float-prompt';
document.body.appendChild(fpBottom);
const mapContainerEl = document.getElementById('mapContainer');
function hideTip() { mapTip.classList.remove('show'); }
mapContainerEl.addEventListener('mousemove', (e) => {
  const path = e.target.closest ? e.target.closest('.country.completed') : null;
  const name = path ? getCountryName(path.id) : null;
  if (name) {
    mapTip.textContent = name;
    mapTip.style.left = e.clientX + 'px';
    mapTip.style.top = e.clientY + 'px';
    mapTip.classList.add('show');
  } else {
    hideTip();
  }
});
mapContainerEl.addEventListener('mouseleave', hideTip);

loadRegion('americas');
</script>
