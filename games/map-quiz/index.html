<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Quiz — HomeschoolGames</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
  <style>
    .map-page { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }

    .map-header { margin-bottom: 1.25rem; }
    .map-header h1 { font-size: 1.8rem; margin-bottom: 0.2rem; }

    /* Region selector */
    .region-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .region-tab {
      padding: 0.45rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: var(--font-sans);
      color: var(--ink-light);
      transition: all 0.15s;
    }

    .region-tab.active {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }

    /* Score / prompt bar */
    .quiz-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .prompt-box {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      flex: 1;
      min-width: 200px;
    }

    .prompt-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 0.2rem;
    }

    .prompt-country {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
    }

    .score-box {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .score-item {
      text-align: center;
    }

    .score-num {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      display: block;
      line-height: 1;
    }

    .score-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-light);
    }

    .score-num.correct { color: var(--green); }
    .score-num.wrong { color: var(--red); }

    /* Feedback bar */
    .feedback-bar {
      min-height: 2rem;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.4rem 0;
    }

    /* Map container */
    .map-container {
      background: #E8F4F8;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    .map-container svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Country paths */
    .country {
      fill: #D4C9B5;
      stroke: #9A8E7A;
      stroke-width: 0.5;
      cursor: pointer;
      transition: fill 0.15s;
    }

    .country:hover { fill: #C4A040; }
    .country.correct-flash { fill: #2A5C3F !important; }
    .country.wrong-flash { fill: #8B2020 !important; }
    .country.highlight-target { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }

    /* After answering, show correct location */
    .country.show-correct { fill: #5B8A6A; stroke: #2A5C3F; stroke-width: 1.5; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../../index.html" class="site-logo">Homeschool<span>Games</span></a>
  <nav class="site-nav">
    <a href="../../index.html">← All Games</a>
  </nav>
</header>

<div class="map-page">
  <div class="map-header">
    <h1>Map Quiz</h1>
    <p>Find the country on the map.</p>
  </div>

  <div class="region-tabs">
    <button class="region-tab active" onclick="loadRegion('americas')">Americas</button>
    <button class="region-tab" onclick="loadRegion('europe')">Europe</button>
    <button class="region-tab" onclick="loadRegion('asia')">Asia</button>
    <button class="region-tab" onclick="loadRegion('africa')">Africa</button>
  </div>

  <div class="quiz-bar">
    <div class="prompt-box">
      <div class="prompt-label">Find this country</div>
      <div class="prompt-country" id="promptCountry">Loading…</div>
    </div>
    <div class="score-box">
      <div class="score-item">
        <span class="score-num correct" id="scoreCorrect">0</span>
        <span class="score-label">Correct</span>
      </div>
      <div class="score-item">
        <span class="score-num wrong" id="scoreWrong">0</span>
        <span class="score-label">Missed</span>
      </div>
    </div>
  </div>

  <div class="feedback-bar" id="feedbackBar"></div>

  <div class="map-container" id="mapContainer"></div>

  <div class="btn-row">
    <button class="btn btn-outline btn-sm" onclick="resetScores()">Reset Scores</button>
  </div>
</div>

<footer class="site-footer">
  <a href="../../index.html">homeschoolgames.app</a>
</footer>

// ============================================================
// SVG MAP DATA — simplified path data per region
// Using Natural Earth simplified coordinates
// ============================================================

// We'll use an inline SVG approach with country shapes
// These are simplified but recognizable outlines

const MAP_SVG = {
  americas: buildAmericasSVG(),
  europe: buildEuropeSVG(),
  asia: buildAsiaSVG(),
  africa: buildAfricaSVG(),
};

// ---- State ----
let currentRegion = 'americas';
let queue = [];
let currentCountry = null;
let scoreCorrect = 0;
let scoreWrong = 0;
let waitingForNext = false;

function loadRegion(region) {
  currentRegion = region;
  document.querySelectorAll('.region-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim().toLowerCase().startsWith(region.charAt(0).toUpperCase() + region.slice(1, 3)));
  });
  // fix active for africa
  document.querySelectorAll('.region-tab').forEach(t => {
    const labels = { americas:'Americas', europe:'Europe', asia:'Asia', africa:'Africa' };
    t.classList.toggle('active', t.textContent.trim() === labels[region]);
  });

  // Render map
  document.getElementById('mapContainer').innerHTML = MAP_SVG[region];

  // Attach click handlers
  document.querySelectorAll('#mapContainer .country').forEach(path => {
    path.addEventListener('click', () => handleCountryClick(path.id));
  });

  // Reset queue & start
  resetQueue();
}

function resetQueue() {
  queue = shuffle([...REGIONS[currentRegion].countries]);
  scoreCorrect = 0;
  scoreWrong = 0;
  updateScoreDisplay();
  nextQuestion();
}

function resetScores() {
  loadRegion(currentRegion);
}

function nextQuestion() {
  waitingForNext = false;
  // Clear feedback
  document.getElementById('feedbackBar').textContent = '';
  // Clear highlights
  document.querySelectorAll('#mapContainer .country').forEach(el => {
    el.classList.remove('correct-flash', 'wrong-flash', 'show-correct');
  });

  if (queue.length === 0) {
    queue = shuffle([...REGIONS[currentRegion].countries]);
  }

  currentCountry = queue.pop();
  document.getElementById('promptCountry').textContent = currentCountry.name;
}

function handleCountryClick(countryId) {
  if (waitingForNext) {
    nextQuestion();
    return;
  }
  if (!currentCountry) return;

  const fb = document.getElementById('feedbackBar');
  const correctEl = document.getElementById(currentCountry.id);

  if (countryId === currentCountry.id) {
    scoreCorrect++;
    fb.innerHTML = `<span class="feedback-correct">✓ Correct! That's ${currentCountry.name}.</span>`;
    if (correctEl) correctEl.classList.add('correct-flash');
    updateScoreDisplay();
    waitingForNext = true;
    setTimeout(nextQuestion, 1200);
  } else {
    scoreWrong++;
    fb.innerHTML = `<span class="feedback-wrong">✗ That's ${getCountryName(countryId) || 'not it'}. ${currentCountry.name} is shown in green.</span>`;
    if (correctEl) correctEl.classList.add('show-correct');
    const wrongEl = document.getElementById(countryId);
    if (wrongEl) {
      wrongEl.classList.add('wrong-flash');
      setTimeout(() => wrongEl.classList.remove('wrong-flash'), 800);
    }
    updateScoreDisplay();
    waitingForNext = true;
  }
}

function getCountryName(id) {
  const all = Object.values(REGIONS).flatMap(r => r.countries);
  return all.find(c => c.id === id)?.name || null;
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent = scoreWrong;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
