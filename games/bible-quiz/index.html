<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Quiz — HomeschoolGames</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
  <link rel="stylesheet" href="../../assets/css/streak-rail.css">
  <link rel="stylesheet" href="../../assets/css/quest-rail.css">
  <style>
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.07); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-9px); }
      40%     { transform: translateX(9px); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .quiz-page {
      max-width: 580px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    /* Top bar */
    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .quiz-top h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .stat-group {
      display: flex;
      gap: 0.5rem;
    }

    .stat-badge {
      background: var(--cream-dark);
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 0.45rem 1rem;
      font-weight: 700;
      font-size: 0.92rem;
      font-family: var(--font-sans);
      color: var(--ink);
      white-space: nowrap;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .stat-badge.hot {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
    }

    /* Verse card */
    .verse-card {
      background: white;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.5rem 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(26,23,20,0.07);
      animation: fadeIn 0.3s ease;
    }

    .cat-pill {
      display: inline-block;
      padding: 0.18rem 0.75rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      font-family: var(--font-sans);
    }
    .cat-story     { background: #FFF3D0; color: #7A5C00; }
    .cat-verse     { background: #D4EEF5; color: #1A5C6B; }
    .cat-character { background: #E4DAF2; color: #4A2C6B; }
    .cat-wild      { background: #E4F2E8; color: #2A5C3F; }
    .cat-trap      { background: #FAE0E0; color: #8B2020; }

    .verse-text {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
      line-height: 1.35;
      margin-bottom: 0.9rem;
    }
    .verse-text::before { content: "\201C"; }
    .verse-text::after  { content: "\201D"; }

    .verse-blurb {
      font-size: 1rem;
      color: var(--ink-light);
      line-height: 1.5;
      max-width: 42ch;
      margin: 0 auto;
    }

    /* Reveal title (shown after answering) */
    .reveal-name {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gold);
      margin-top: 1rem;
      min-height: 0;
    }

    .prompt {
      text-align: center;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink-light);
      letter-spacing: 0.02em;
      margin-bottom: 0.9rem;
    }

    /* Feedback */
    .feedback {
      min-height: 1.9rem;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    /* Options grid */
    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .option-btn {
      background: white;
      border: 2.5px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 0.75rem;
      font-family: var(--font-serif);
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(26,23,20,0.07);
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-align: center;
    }

    .option-btn .key-hint {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink-light);
      background: var(--cream-dark);
      border-radius: 5px;
      padding: 0.1rem 0.4rem;
      flex-shrink: 0;
    }

    .option-btn .option-val {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.15;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--gold);
      background: #FFFDF4;
      transform: translateY(-2px);
    }

    .option-btn.correct {
      background: #EAF4EE;
      border-color: var(--green);
      animation: pop 0.3s ease;
    }
    .option-btn.correct .option-val { color: var(--green); }
    .option-btn.correct .key-hint { color: var(--green); }

    .option-btn.wrong {
      background: #FAE8E8;
      border-color: var(--red);
      animation: shake 0.4s ease;
    }
    .option-btn.wrong .option-val { color: var(--red); }
    .option-btn.wrong .key-hint { color: var(--red); }

    .option-btn.reveal-correct {
      background: #EAF4EE;
      border-color: var(--green);
    }
    .option-btn.reveal-correct .option-val { color: var(--green); }
    .option-btn.reveal-correct .key-hint { color: var(--green); }

    .option-btn:disabled { cursor: default; transform: none; }

    /* Next button */
    #nextBtn {
      display: block;
      width: 100%;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: 12px;
      padding: 1.05rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-sans);
      cursor: pointer;
      margin-bottom: 1rem;
      transition: background 0.15s;
    }
    #nextBtn:hover { background: #b08e30; }

    .control-row {
      display: flex;
      justify-content: center;
      margin-top: 0.25rem;
    }

    .reset-link {
      background: none;
      border: none;
      color: var(--ink-light);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: var(--font-sans);
      text-decoration: underline;
      padding: 0.3rem 0.5rem;
    }
    .reset-link:hover { color: var(--ink); }

    /* Filter chips */
    .filter-rows { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .filter-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
    .filter-label {
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-light); margin-right: 0.15rem; min-width: 3.6rem;
    }
    .chip {
      padding: 0.32rem 0.8rem; border: 1.5px solid var(--border); border-radius: 99px;
      background: #fff; font-size: 0.8rem; font-weight: 600; font-family: var(--font-sans);
      color: var(--ink-light); cursor: pointer; transition: all 0.12s;
    }
    .chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .chip:hover:not(.active) { border-color: var(--ink-light); color: var(--ink); }

    @media (max-width: 480px) {
      .option-grid { grid-template-columns: 1fr; }
      .option-btn { min-height: 56px; }
      .filter-label { min-width: 100%; margin-bottom: -0.1rem; }
    }
  </style>
</head>

  "Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon",
  "Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos",
  "Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi",
  "Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians",
  "Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians",
  "1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter",
  "1 John","2 John","3 John","Jude","Revelation",
];

const CAT_LABEL = {
  story: "Story", verse: "Verse", character: "Character",
  wild: "Many Books", trap: "Tricky",
};

const KEYS = ['A','B','C','D'];
const TARGET = 25;
const DELAY_OK = 2500, DELAY_NO = 4000;

const TIERS = [
  {id:'all', label:'All'}, {id:'gimme', label:'Easy'},
  {id:'medium', label:'Medium'}, {id:'niche', label:'Hard'},
];
const CATS = [
  {id:'all', label:'All'}, {id:'story', label:'Story'}, {id:'verse', label:'Verse'},
  {id:'character', label:'Character'}, {id:'wild', label:'Many Books'}, {id:'trap', label:'Tricky'},
];

let correct = 0;
let total = 0;
let streak = 0;
let bestStreak = 0;
let answered = false;
let currentCard = null;
let queue = [];
let selTier = 'all', selCat = 'all';
let advanceTimer = null, pendingEnd = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function activeDeck() {
  return DECK.filter(c =>
    (selTier === 'all' || c.tier === selTier) &&
    (selCat === 'all'  || c.cat === selCat));
}

function drawCard() {
  if (queue.length === 0) queue = shuffle(activeDeck());
  return queue.pop();
}

function buildFilters() {
  const diffRow = document.getElementById('diffRow');
  const catRow = document.getElementById('catRow');
  TIERS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip' + (t.id === selTier ? ' active' : '');
    b.textContent = t.label;
    b.dataset.tier = t.id;
    b.onclick = () => { if (selTier === t.id) return; selTier = t.id; HSGSound.tick(); startRound(); };
    diffRow.appendChild(b);
  });
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chip' + (c.id === selCat ? ' active' : '');
    b.textContent = c.label;
    b.dataset.cat = c.id;
    b.onclick = () => { if (selCat === c.id) return; selCat = c.id; HSGSound.tick(); startRound(); };
    catRow.appendChild(b);
  });
}
function syncFilterChips() {
  document.querySelectorAll('#diffRow .chip').forEach(b => b.classList.toggle('active', b.dataset.tier === selTier));
  document.querySelectorAll('#catRow .chip').forEach(b => b.classList.toggle('active', b.dataset.cat === selCat));
}

function buildOptions(card) {
  // One correct option drawn from the card's valid books...
  const answer = card.books[Math.floor(Math.random() * card.books.length)];
  // ...and three distractors that are NOT valid for this card.
  const pool = shuffle(CANON.filter(b => !card.books.includes(b)));
  const options = shuffle([answer, ...pool.slice(0, 3)]);
  return { answer, options };
}

function nextCard() {
  clearTimeout(advanceTimer);
  pendingEnd = false;
  answered = false;
  currentCard = drawCard();
  if (!currentCard) {
    document.getElementById('verseText').textContent = 'No verses match that combination';
    document.getElementById('verseBlurb').textContent = 'Pick another level or type.';
    document.getElementById('catPill').textContent = '—';
    document.getElementById('catPill').className = 'cat-pill';
    document.getElementById('optionGrid').innerHTML = '';
    document.getElementById('revealName').textContent = '';
    document.getElementById('feedback').textContent = '';
    return;
  }
  const { answer, options } = buildOptions(currentCard);
  currentCard._answer = answer;
  currentCard._options = options;

  const pill = document.getElementById('catPill');
  pill.textContent = CAT_LABEL[currentCard.cat] || currentCard.cat;
  pill.className = 'cat-pill cat-' + currentCard.cat;

  document.getElementById('verseText').textContent = currentCard.verse;
  document.getElementById('verseBlurb').textContent = currentCard.blurb;
  document.getElementById('revealName').textContent = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  const grid = document.getElementById('optionGrid');
  grid.innerHTML = '';
  options.forEach((book, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.idx = i;
    btn.dataset.book = book;

    const keyEl = document.createElement('span');
    keyEl.className = 'key-hint';
    keyEl.textContent = KEYS[i];

    const valEl = document.createElement('span');
    valEl.className = 'option-val';
    valEl.textContent = book;

    btn.appendChild(keyEl);
    btn.appendChild(valEl);
    btn.addEventListener('click', () => handleAnswer(book, btn));
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen, clickedBtn) {
  if (answered) return;
  answered = true;
  total++;
  let endedStreak = 0;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  // Any of the card's books is a correct answer.
  const isCorrect = currentCard.books.includes(chosen);

  if (isCorrect) {
    correct++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    quest.correct();
    HSGSound.correct();
    clickedBtn.classList.add('correct');
    const msg = streak >= 10 ? `🔥 Correct — ${streak} in a row!`
              : streak >= 5  ? `⭐ Correct — ${streak} in a row!`
              :                `✓ Correct!`;
    document.getElementById('feedback').innerHTML = `<span style="color:var(--green)">${msg}</span>`;
    if (HSGfx.milestone(streak)) HSGSound.streak(streak);
  } else {
    endedStreak = streak;
    streak = 0;
    quest.wrong();
    HSGSound.wrong();
    clickedBtn.classList.add('wrong');
    // Reveal the one correct option in the grid.
    allBtns.forEach(b => {
      if (b.dataset.book === currentCard._answer) b.classList.add('reveal-correct');
    });
    document.getElementById('feedback').innerHTML =
      `<span style="color:var(--red)">✗ This is from ${currentCard._answer}</span>`;
  }

  // Reveal the scene name, plus other books it appears in (for wilds/characters).
  const others = currentCard.books.filter(b => b !== currentCard._answer);
  let nameLine = currentCard.name.replace(/ \(.*\)$/, '');
  if (others.length) {
    nameLine += ` — also found in ${others.join(', ')}`;
  }
  document.getElementById('revealName').textContent = nameLine;

  updateBadges();

  // End after TARGET questions, but never mid-streak.
  pendingEnd = (total >= TARGET && streak === 0);
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = pendingEnd ? 'See results →' : 'Next Verse →';
  nextBtn.style.display = 'block';
  scheduleAdvance(isCorrect ? DELAY_OK : DELAY_NO);
}

function scheduleAdvance(ms) {
  clearTimeout(advanceTimer);
  advanceTimer = setTimeout(advance, ms);
}
function advance() {
  clearTimeout(advanceTimer);
  if (!answered) return;
  if (pendingEnd) endSession();
  else nextCard();
}

function endSession() {
  HSGfx.showSummary({
    title: `Bible Quiz — ${total} verses`,
    correct, total, best: bestStreak,
    onPlayAgain: startRound,
  });
}

function updateBadges() {
  document.getElementById('scoreBadge').textContent = `${correct} / ${total}`;
}

function startRound() {
  clearTimeout(advanceTimer);
  quest.endRun();
  correct = 0; total = 0; streak = 0; bestStreak = 0; queue = [];
  answered = false; pendingEnd = false;
  syncFilterChips();
  updateBadges();
  nextCard();
}

function resetAll() { startRound(); }

// Keyboard: A/B/C/D to answer, Enter or Space for next.
document.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && answered) {
    e.preventDefault();
    advance();
    return;
  }
  if (answered) return;
  const idx = ['a','b','c','d'].indexOf(e.key.toLowerCase());
  if (idx === -1) return;
  const btn = document.querySelector(`.option-btn[data-idx="${idx}"]`);
  if (btn && !btn.disabled) btn.click();
});

const quest = HSGQuest.init({
  gameId: 'bible-quiz', gameName: 'Bible Quiz',
  theme: HSGQuest.themes.ark,
  mount: document.getElementById('questRail')
});

buildFilters();
updateBadges();
nextCard();
</script>

</body>
</html>
