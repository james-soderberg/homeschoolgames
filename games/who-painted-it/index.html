<script>
// ============================================================
// WHO PAINTED IT? - see a famous painting + its name, choose the
// artist. A fixed run of RUN paintings; score = correct - hints,
// so a flawless 20/20 with no hints is the best possible.
// ============================================================
const RUN = 20;
const KEYS = ['A','B','C','D'];
const AUTO_OK = 3200, AUTO_NO = 4200, DELAY_END = 1500;
let autoAdvance = false;
try { autoAdvance = localStorage.getItem('wpi_autoadvance') === '1'; } catch(e){}

const slug = n => n.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const imgFor = p => '../../assets/img/artquiz/' + p.s + '.jpg';
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

const ART = (window.ARTQUIZ || []).slice();
const ARTISTS = [...new Set(ART.map(p=>p.a))];
const eraOf = {}; ART.forEach(p=>{ if(!eraOf[p.a]) eraOf[p.a]=p.e; });

// One-sentence life bio per artist, shown in the reveal and reused every time.
const BIOS = {
  'Leonardo da Vinci':"Probably the ultimate genius: he painted the Mona Lisa and also dreamed up flying machines the world would not build for centuries.",
  'Raphael':"A superstar of the Renaissance whose paintings feel calm and perfectly balanced, and he did it all before dying at just 37.",
  'Jan van Eyck':"One of the first painters to truly master oil paint, packing tiny jewel-like details into every corner back in the 1400s.",
  'Rembrandt':"The great Dutch master of light and shadow, who painted himself honestly his whole life and still ended up broke.",
  'Johannes Vermeer':"He painted quiet everyday moments so carefully that only about 35 of his paintings still exist today.",
  'Diego Velázquez':"The finest Spanish painter of the 1600s and the personal artist to King Philip IV.",
  'Jean-Honoré Fragonard':"He painted the fun, flirty, over-the-top world of French nobles right before the Revolution swept it all away.",
  'Caspar David Friedrich':"A German who loved painting tiny lone figures gazing out at huge, moody landscapes.",
  'John Constable':"An Englishman who painted the plain fields and skies of his home countryside as if they were something magical.",
  'J. M. W. Turner':"They called him the painter of light, since his glowing, stormy seascapes almost melt into pure color.",
  'Katsushika Hokusai':"The Japanese printmaker behind the famous Great Wave, who kept changing his name and style right into his 80s.",
  'Jean-François Millet':"He painted poor farm workers with real dignity, which later inspired Van Gogh.",
  'James McNeill Whistler':"An American who lived in Europe and thought about his paintings almost the way a composer thinks about music.",
  'Winslow Homer':"A mostly self-taught American who is best remembered for his dramatic paintings of the sea.",
  'Claude Monet':"The Frenchman who kicked off Impressionism, painting the same ponds and haystacks over and over to catch the light as it changed.",
  'Pierre-Auguste Renoir':"A Frenchman who loved painting happy crowds and kept working even after arthritis crippled his hands.",
  'Edgar Degas':"The French artist everyone knows for his paintings and little sculptures of ballet dancers.",
  'Édouard Manet':"A bold French painter whose modern city scenes helped push art from Realism toward Impressionism.",
  'Vincent van Gogh':"He sold almost nothing and struggled with his mental health, yet today he is one of the most loved artists in the world.",
  'Georges Seurat':"The Frenchman who built entire paintings out of thousands of tiny colored dots.",
  'Paul Cézanne':"A Frenchman who saw the world as simple blocks and shapes, quietly opening the door to modern art.",
  'Henri Rousseau':"A self-taught Frenchman who painted lush jungles he had only ever seen in books and at the zoo.",
  'Edvard Munch':"The Norwegian behind The Scream, who poured his fears and heartbreak straight onto the canvas.",
  'Gustav Klimt':"An Austrian famous for glamorous portraits that shimmer with real gold leaf.",
  'Piet Mondrian':"A Dutch painter who stripped art down to straight black lines and blocks of red, blue, and yellow.",
  'Grant Wood':"An Iowa painter who turned the plain, hardworking Midwest into crisp, almost storybook pictures.",
  'Edward Hopper':"An American who was a master at capturing just how lonely a big modern city can feel.",
  'Caravaggio':"A brilliant, hot-headed Italian who was always in trouble and changed painting forever with his intense light and shadow.",
  'Albrecht Dürer':"A German whose incredibly detailed prints made him famous all across Europe.",
  'El Greco':"Born in Greece and settled in Spain, he stretched his figures tall and thin for a strange, spiritual feeling.",
  'Pieter Bruegel the Elder':"A Flemish painter who loved showing regular villagers at work and play across wide, busy scenes.",
  'Hans Holbein the Younger':"A German so good at portraits that he became the official artist for England's King Henry VIII.",
  'Jacques-Louis David':"He led the clean, heroic Neoclassical style and later became Napoleon's personal painter.",
  'Francisco Goya':"A Spanish court painter whose art turned dark and haunting after an illness left him deaf.",
  'Mary Cassatt':"An American who joined the Impressionists in Paris and is loved for her warm scenes of mothers and children.",
  'John Singer Sargent':"The most in-demand portrait painter of his day, an American who could make paint look effortless.",
  'Pablo Picasso':"A restless Spanish genius who helped invent Cubism and reinvented his own style over and over for 70 years.",
  'Salvador Dalí':"A real showman of a Spanish Surrealist, as famous for his melting clocks as for his crazy curled mustache.",
  'René Magritte':"A quiet Belgian who loved turning ordinary things, like apples and hats, into playful little riddles.",
  'Frida Kahlo':"A Mexican painter who turned her pain and her life story into bold, unforgettable self-portraits.",
  'Andrew Wyeth':"An American who spent his whole life painting the people and quiet countryside of rural Pennsylvania and Maine.",
  'Henri Matisse':"A Frenchman who used big, joyful splashes of color, and when he got too old to paint he made art out of cut paper.",
  'Wassily Kandinsky':"A Russian often called the father of abstract art, painting pure color and shape with no real subject at all.",
  'Andy Warhol':"The king of Pop Art, who turned soup cans and movie stars into some of the most famous images of the 1900s.",
};
const brokenImg = new Set();
let pool = shuffle(ART);
let used = new Set();
let answered = false, current = null, advanceTimer = null;
let roundIndex = 0, correctCount = 0, hintCount = 0, hintThisRound = false;

function loadImg(p){ return new Promise(res=>{ const im=new Image(); im.onload=()=>res(true); im.onerror=()=>{ brokenImg.add(p.s); res(false); }; im.src=imgFor(p); }); }

async function pickPainting(){
  for(let guard=0; guard<ART.length+5; guard++){
    if(!pool.length) pool = shuffle(ART.filter(p=>!used.has(p.s) && !brokenImg.has(p.s)));
    if(!pool.length) pool = shuffle(ART.filter(p=>!brokenImg.has(p.s)));
    const cand = pool.pop();
    if(!cand || used.has(cand.s) || brokenImg.has(cand.s)) continue;
    if(await loadImg(cand)) return cand;
  }
  return ART.find(p=>!brokenImg.has(p.s)) || ART[0];
}

// 4 artists: the painter + 3 distractors, preferring the same era so it is not
// won by elimination; falls back to any artist if an era is thin.
function buildOptions(p){
  const same = ARTISTS.filter(a=>a!==p.a && eraOf[a]===p.e);
  let picks = shuffle(same).slice(0,3);
  if(picks.length<3){ const rest = shuffle(ARTISTS.filter(a=>a!==p.a && !picks.includes(a))); while(picks.length<3 && rest.length) picks.push(rest.pop()); }
  return shuffle([p.a, ...picks]);
}

// ---------- gallery ----------
function buildGallery(){
  const grid = document.getElementById('gGrid'); let html='';
  for(let i=0;i<RUN;i++) html += '<div class="g-cell locked"></div>';
  grid.innerHTML = html;
  document.getElementById('gTotal').textContent = RUN;
  document.getElementById('scoreGoal').textContent = RUN;
  updateGalleryCount();
}
function updateGalleryCount(){
  document.getElementById('gCount').textContent = correctCount;
  document.getElementById('scoreStat').textContent = correctCount;
  document.getElementById('gBar').style.width = (roundIndex/RUN*100)+'%';
  const left = RUN - roundIndex, note = document.getElementById('gNote');
  if(roundIndex===0) note.textContent='Name the artist to hang the painting.';
  else if(left<=0) note.textContent='🖼️ The tour is complete!';
  else note.textContent = left + ' painting' + (left>1?'s':'') + ' to go.';
}
function markCell(idx, p, correct){
  const cell = document.querySelectorAll('.g-cell')[idx]; if(!cell) return;
  cell.classList.remove('locked');
  if(correct){
    cell.innerHTML = '<img src="'+imgFor(p)+'" alt="'+p.t+' by '+p.a+'">';
    cell.classList.add('justwon'); setTimeout(()=>cell.classList.remove('justwon'),700);
  } else { cell.classList.add('missed'); }
  updateGalleryCount();
}

// ---------- round flow ----------
async function nextCard(){
  clearTimeout(advanceTimer);
  answered = false; hintThisRound = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('revealLine').textContent = '';
  document.getElementById('artistBio').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('frame').className = 'frame';
  document.getElementById('artSub').textContent = '';
  document.getElementById('hintBtn').hidden = false;

  current = await pickPainting();
  document.getElementById('painting').src = imgFor(current);
  document.getElementById('artTitle').textContent = current.t;

  const options = buildOptions(current);
  const grid = document.getElementById('optionGrid'); grid.innerHTML='';
  options.forEach((who,i)=>{
    const btn = document.createElement('button');
    btn.className='option-btn'; btn.dataset.idx=i; btn.dataset.who=who;
    btn.innerHTML='<span class="k">'+KEYS[i]+'</span><span></span>';
    btn.lastChild.textContent = who;
    btn.addEventListener('click', ()=>handleAnswer(who, btn));
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen, btn){
  if(answered) return; answered = true;
  const btns = [...document.querySelectorAll('.option-btn')];
  btns.forEach(b=>b.disabled=true);
  const correct = chosen === current.a;
  used.add(current.s);
  if(correct) correctCount++;
  markCell(roundIndex, current, correct);
  roundIndex++;

  if(correct){
    btn.classList.add('correct');
    document.getElementById('frame').classList.add('win');
    document.getElementById('feedback').innerHTML = '<span style="color:var(--green)">✓ Correct!</span>';
    if(window.HSGSound) HSGSound.correct();
    if(window.HSGfx && HSGfx.confetti) HSGfx.confetti({count:16});
  } else {
    btn.classList.add('wrong');
    btns.forEach(b=>{ if(b.dataset.who===current.a) b.classList.add('reveal-correct'); });
    document.getElementById('frame').classList.add('miss');
    document.getElementById('feedback').innerHTML = '<span style="color:var(--red)">✗ Not quite</span>';
    if(window.HSGSound) HSGSound.wrong();
    if(window.HSGfx) HSGfx.flash('rgba(150,40,40,0.25)');
  }
  document.getElementById('revealLine').innerHTML = 'It was <b>'+current.a+'</b> · '+current.e+', '+current.y;
  document.getElementById('artistBio').textContent = BIOS[current.a] || '';
  document.getElementById('hintBtn').hidden = true;

  if(roundIndex >= RUN){ setTimeout(endGame, DELAY_END); return; }
  document.getElementById('nextBtn').style.display='inline-block';
  if(autoAdvance) advanceTimer = setTimeout(()=>{ if(answered) nextCard(); }, correct?AUTO_OK:AUTO_NO);
}

function endGame(){
  const score = Math.max(0, correctCount - hintCount);
  const hinted = hintCount > 0, perfect = score >= RUN;
  const panel = { gameId:'who-painted-it', gameName:'Who Painted It?', level:'best', levelName:'Best Score',
                  minStreak:1, unit:'art20', score:score, hinted:hinted, onSaved:()=>renderSideBoard() };
  if(window.HSGfx && HSGfx.showSummary){
    HSGfx.showSummary({
      title: perfect ? '🎨 Master curator! '+RUN+' / '+RUN : '🖼️ Gallery tour complete!',
      correct:score, total:RUN,
      stats:[ {num:score, label:'Score / '+RUN, cls:'best'}, {num:correctCount, label:'Correct'}, {num:hintCount, label:'Hints used'} ],
      onPlayAgain:resetGame,
      extraHTML:'<div id="wpiBoard" style="text-align:left;margin:0.25rem 0 0.5rem"></div>',
      onMount:()=>{ if(window.HSGStreak) HSGStreak.endPanel('#wpiBoard', panel); } });
  } else { resetGame(); }
}
function resetGame(){
  used = new Set(); roundIndex = 0; correctCount = 0; hintCount = 0; hintThisRound = false;
  pool = shuffle(ART.filter(p=>!brokenImg.has(p.s)));
  buildGallery(); nextCard();
}

// The leaderboard stays on the left the whole time.
function renderSideBoard(){
  if(window.HSGStreak && HSGStreak.renderBoardInto)
    HSGStreak.renderBoardInto('#wpiSideBoard', { gameId:'who-painted-it', level:'best', unit:'art20', minStreak:1 });
}

document.getElementById('hintBtn').addEventListener('click', ()=>{
  document.getElementById('artSub').textContent = 'Style: ' + current.e + '  ·  painted ' + current.y;
  document.getElementById('hintBtn').hidden = true;
  if(!hintThisRound){ hintThisRound = true; hintCount++; }   // each hint costs a point
});
document.getElementById('nextBtn').addEventListener('click', ()=>{ if(answered) nextCard(); });
document.addEventListener('keydown', e=>{
  if((e.key==='Enter'||e.key===' ') && answered){ e.preventDefault(); nextCard(); return; }
  if(answered) return;
  const i=['a','b','c','d'].indexOf(e.key.toLowerCase());
  if(i<0) return;
  const b=document.querySelector('.option-btn[data-idx="'+i+'"]');
  if(b && !b.disabled) b.click();
});

// auto-advance toggle
const autoToggle = document.getElementById('autoToggle');
function renderAutoToggle(){
  autoToggle.setAttribute('aria-checked', autoAdvance ? 'true':'false');
  document.getElementById('autoLabel').textContent = 'Auto-advance: ' + (autoAdvance ? 'On':'Off');
}
autoToggle.addEventListener('click', ()=>{
  autoAdvance = !autoAdvance;
  try { localStorage.setItem('wpi_autoadvance', autoAdvance ? '1':'0'); } catch(e){}
  renderAutoToggle();
  if(window.HSGSound) HSGSound.tick();
  if(autoAdvance && answered){ clearTimeout(advanceTimer); advanceTimer=setTimeout(()=>{ if(answered) nextCard(); }, AUTO_OK); }
  else if(!autoAdvance){ clearTimeout(advanceTimer); }
});
renderAutoToggle();

// quit: only a finished run of 20 is scored, so quitting early just leaves.
let leaving = false;
function leaveGame(dest){ if(leaving) return; leaving=true; clearTimeout(advanceTimer); answered=true; if(dest) window.location.href=dest; }
document.getElementById('quitBtn').addEventListener('click', ()=>leaveGame('../../index.html'));
const allGamesLink = document.getElementById('allGamesLink');
if(allGamesLink) allGamesLink.addEventListener('click', e=>{ e.preventDefault(); leaveGame(allGamesLink.href); });

renderSideBoard();
resetGame();   // no start page; the game is self-explanatory, so begin right away
</script>
</body>
</html>
