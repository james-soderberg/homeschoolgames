<style>
  .ff-page { max-width: 1240px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
  .ff-top { display:flex; align-items:center; justify-content:space-between; gap:.75rem; flex-wrap:wrap; margin-bottom:1.1rem; }
  .ff-top h1 { margin:0; font-size:1.7rem; }
  .stat-badge { background: var(--cream-dark); border:1.5px solid var(--border); border-radius:99px;
    padding:.4rem .95rem; font-weight:700; font-size:.9rem; font-family:var(--font-sans); color:var(--ink); white-space:nowrap; }
  .stat-badge b { color: var(--gold); }
  .top-right { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; }
  .auto-toggle { display:inline-flex; align-items:center; gap:.45rem; cursor:pointer;
    background: var(--cream-dark); border:1.5px solid var(--border); border-radius:99px;
    padding:.4rem .85rem; font-weight:700; font-size:.82rem; font-family:var(--font-sans);
    color:var(--ink-light); white-space:nowrap; transition:background .15s, color .15s, border-color .15s; }
  .auto-toggle:hover { background:#efe7d6; }
  .auto-toggle .dot { width:.7rem; height:.7rem; border-radius:50%; background:#c2b69c;
    box-shadow:inset 0 0 0 2px var(--cream-dark); transition:background .15s; }
  .auto-toggle[aria-checked="true"] { color:var(--ink); border-color:var(--gold); background:#fbf3df; }
  .auto-toggle[aria-checked="true"] .dot { background:var(--gold); }
  .quit-btn { cursor:pointer; background:#fff; border:1.5px solid var(--border); border-radius:99px;
    padding:.4rem .9rem; font-weight:700; font-size:.82rem; font-family:var(--font-sans);
    color:var(--ink-light); white-space:nowrap; transition:border-color .15s, color .15s; }
  .quit-btn:hover { border-color:#c0392b; color:#c0392b; }

  /* three columns: leaderboard + quiz + wall */
  .ff-layout { display:flex; gap:1.5rem; align-items:flex-start; }
  .board-col { flex:0 0 250px; }
  .quiz-col { flex:1 1 auto; min-width:0; }
  .wall-col { flex:0 0 340px; }
  .board-panel { background:#fff; border:2px solid var(--border); border-radius:16px; box-shadow:0 4px 16px rgba(26,23,20,.1); overflow:hidden; position:sticky; top:1rem; }
  .board-panel .board-head { padding:.9rem 1rem .75rem; border-bottom:1.5px solid var(--border); }
  .board-panel .board-head h2 { margin:0; font-size:1.1rem; font-family:var(--font-serif); }
  .board-panel .board-head p { margin:.15rem 0 0; font-family:var(--font-sans); font-size:.72rem; color:var(--ink-light); }
  .board-panel .hsg-board { padding:.5rem .75rem .85rem; }
  .board-panel .hsg-board-head { display:none; }

  /* the flag card */
  .quiz-card { background:#fff; border:2px solid var(--border); border-radius:18px; box-shadow:0 4px 16px rgba(26,23,20,.1);
    padding:1.4rem 1.4rem 1.2rem; text-align:center; }
  .flag-wrap { width:300px; max-width:80%; aspect-ratio:4/3; margin:0 auto .95rem; border-radius:12px; overflow:hidden;
    border:3px solid var(--border); background:#ece5d6; box-shadow:0 6px 18px rgba(26,23,20,.2); position:relative; }
  .flag-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .flag-wrap.win { border-color: var(--gold); animation: pop .5s cubic-bezier(.34,1.56,.64,1); }
  .flag-wrap.miss { border-color: var(--red); }
  @keyframes pop { 0%{transform:scale(1)} 45%{transform:scale(1.07)} 100%{transform:scale(1)} }
  .flag-blurb { font-family:var(--font-sans); color:var(--ink-light); font-size:.95rem; line-height:1.4; margin:.2rem auto .2rem; max-width:40ch; }
  .hint-btn { background:var(--cream-dark); border:1.5px solid var(--border); border-radius:99px; color:var(--ink-light);
    font-family:var(--font-sans); font-weight:700; font-size:.8rem; padding:.32rem .9rem; cursor:pointer; margin:.2rem 0 .2rem;
    transition:background .12s, color .12s; }
  .hint-btn:hover { background:#efe7d6; color:var(--ink); }
  .hint-btn[hidden] { display:none; }
  .ask { font-family:var(--font-sans); font-weight:700; letter-spacing:.04em; color:var(--ink-light); font-size:.8rem;
    text-transform:uppercase; margin:1rem 0 .7rem; }

  .option-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
  .option-btn { display:flex; align-items:center; gap:.55rem; text-align:left; background:#fff; border:2px solid var(--border);
    border-radius:12px; padding:.7rem .8rem; font-family:var(--font-serif); font-size:1.02rem; color:var(--ink); cursor:pointer;
    transition:transform .1s, border-color .12s, background .12s; }
  .option-btn:hover:not(:disabled){ transform:translateY(-2px); border-color:var(--gold); }
  .option-btn:disabled{ cursor:default; }
  .key-hint { flex:0 0 auto; width:22px; height:22px; border-radius:6px; background:var(--cream-dark); border:1px solid var(--border);
    font-family:var(--font-sans); font-weight:700; font-size:.8rem; display:grid; place-items:center; color:var(--ink-light); }
  .option-btn.correct{ border-color:var(--green); background:#f0faf3; }
  .option-btn.reveal-correct{ border-color:var(--green); background:#f0faf3; }
  .option-btn.wrong{ border-color:var(--red); background:#fdf0f0; }

  .feedback { min-height:1.4rem; font-family:var(--font-sans); font-weight:700; margin:.9rem 0 .2rem; font-size:1rem; }
  .reveal-line { font-family:var(--font-sans); color:var(--ink-light); font-size:.9rem; min-height:1.1rem; }
  .reveal-line b { color:var(--ink); font-family:var(--font-serif); font-size:1.05rem; }
  .next-btn { margin-top:1rem; background:var(--gold); color:var(--ink); border:none; border-radius:99px; padding:.7rem 1.8rem;
    font-family:var(--font-sans); font-weight:800; font-size:1rem; cursor:pointer; box-shadow:0 4px 0 #a07f2c; }
  .next-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #a07f2c; }

  /* Wall of Flags */
  .wall-panel { background:#fff; border:2px solid var(--border); border-radius:16px; box-shadow:0 4px 16px rgba(26,23,20,.1); overflow:hidden; }
  .wall-head { padding:.9rem 1rem .75rem; border-bottom:1.5px solid var(--border); display:flex; align-items:baseline; justify-content:space-between; gap:.5rem; }
  .wall-head h2 { margin:0; font-size:1.1rem; font-family:var(--font-serif); }
  .wall-count { font-family:var(--font-sans); font-weight:700; font-size:.9rem; color:var(--ink-light); }
  .wall-count b { color:var(--gold); }
  .wall-bar { height:6px; background:var(--cream-dark); }
  .wall-bar > i { display:block; height:100%; width:0; background:var(--gold); transition:width .5s ease; }
  .wall-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; padding:10px; }
  .wall-cell { border-radius:9px; overflow:hidden; border:2px solid var(--border); background:#efe7d6; text-align:center; }
  .wall-pic { aspect-ratio:4/3; background:#d8cfbe; position:relative; overflow:hidden; }
  .wall-pic img { width:100%; height:100%; object-fit:cover; display:block; }
  .wall-cell.locked .wall-pic::after { content:'?'; position:absolute; inset:0; display:grid; place-items:center;
    font-family:var(--font-serif); font-size:1.4rem; font-weight:700; color:#a59cae; background:#353143; }
  .wall-nm { font-family:var(--font-sans); font-size:8px; font-weight:700; color:var(--ink); padding:2px 1px 3px; line-height:1.05; min-height:2.1em; }
  .wall-cell.locked .wall-nm { color:transparent; }
  .wall-cell.justwon { animation: pop .5s cubic-bezier(.34,1.56,.64,1); border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,74,.4); }
  .wall-cell.missed { border-color:var(--red); }
  .wall-cell.missed .wall-pic::after { content:'✗'; position:absolute; inset:0; display:grid; place-items:center;
    font-size:1.4rem; font-weight:700; color:#d98a8a; background:#3a2a2a; }
  .wall-cell.missed .wall-nm { color:transparent; }
  .wall-note { font-family:var(--font-sans); font-size:.8rem; color:var(--ink-light); text-align:center; padding:.3rem 1rem .9rem; }
  .credit { font-size:.72rem; color:var(--ink-light); text-align:center; margin-top:1rem; }
  .credit a { color:inherit; }

  @media (max-width: 860px){
    .ff-layout { flex-direction:column; align-items:stretch; }
    .board-col, .wall-col { flex:none; width:100%; }
    .board-panel { position:static; }
    .wall-grid { grid-template-columns:repeat(6,1fr); }
  }
  @media (max-width: 520px){ .option-grid{ grid-template-columns:1fr; } .wall-grid{ grid-template-columns:repeat(4,1fr); } }
</style>

const WALL_SIZE = 24;          // flags to fill to win (a run drawn from the 100-deck)
const KEYS = ['A','B','C','D'];
const DELAY_OK = 1700, DELAY_NO = 2600;
const AUTO_OK = 3000, AUTO_NO = 4000;
let autoAdvance = false;
try { autoAdvance = localStorage.getItem('ff_autoadvance') === '1'; } catch(e){}

function imgFor(c){ return '../../assets/flags/' + c.iso + '.svg'; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

let answerPool = shuffle(DECK);   // order to draw answers from
let collected = [];               // flags filling the wall this game (in order)
const collectedNames = new Set();
let answered = false, current = null, advanceTimer = null;
let roundIndex = 0;          // flags shown so far (0..WALL_SIZE)
let correctCount = 0;        // correct answers (flags earned)
let hintCount = 0;           // hints revealed across the run (each costs a point)
let hintThisRound = false;

// ---- pick the next flag: one not yet on the wall this run ----
function pickAnswer(){
  for(let guard=0; guard<DECK.length+5; guard++){
    if(answerPool.length===0) answerPool = shuffle(DECK.filter(c=>!collectedNames.has(c.country)));
    if(answerPool.length===0) answerPool = shuffle(DECK);
    const cand = answerPool.pop();
    if(!cand || collectedNames.has(cand.country)) continue;
    return cand;
  }
  return DECK[0];
}

// 4 countries: the answer + 3 distractors from the SAME continent (so you can't
// win by "which one is even in this region"), falling back to the whole deck if a
// continent is thin. Shuffled so the answer's position varies.
function buildOptions(ans){
  let pool = DECK.filter(c => c.continent===ans.continent && c.country!==ans.country).map(c=>c.country);
  if(pool.length < 3) pool = pool.concat(DECK.filter(c => c.country!==ans.country && c.continent!==ans.continent).map(c=>c.country));
  pool = shuffle(pool).slice(0,3);
  return shuffle([ans.country, ...pool]);
}

// ---------- Wall of Flags ----------
function buildWall(){
  const grid = document.getElementById('wallGrid');
  let html='';
  for(let i=0;i<WALL_SIZE;i++){
    const c = collected[i];
    html += '<div class="wall-cell'+(c?'':' locked')+'">'+
      '<div class="wall-pic">'+(c?'<img src="'+imgFor(c)+'" alt="'+c.country+'">':'')+'</div>'+
      '<div class="wall-nm">'+(c?c.country:'')+'</div></div>';
  }
  grid.innerHTML = html;
  document.getElementById('wallGoal').textContent = WALL_SIZE;
  document.getElementById('wallTotal').textContent = WALL_SIZE;
  updateWallCount();
}
function updateWallCount(){
  document.getElementById('wallCount').textContent = correctCount;
  document.getElementById('wallStat').textContent = correctCount;
  document.getElementById('wallBar').style.width = (roundIndex/WALL_SIZE*100)+'%';
  const left = WALL_SIZE - roundIndex;
  const note = document.getElementById('wallNote');
  if(roundIndex===0) note.textContent='Name the country to earn its flag.';
  else if(left<=0) note.textContent='🚩 Game complete!';
  else note.textContent = left + ' flag' + (left>1?'s':'') + ' to go.';
}
function markCell(idx, c, correct){
  const cell = document.querySelectorAll('.wall-cell')[idx];
  if(!cell) return;
  cell.classList.remove('locked');
  if(correct){
    collected.push(c);
    cell.querySelector('.wall-pic').innerHTML = '<img src="'+imgFor(c)+'" alt="'+c.country+'">';
    cell.querySelector('.wall-nm').textContent = c.country;
    cell.classList.add('justwon'); setTimeout(()=>cell.classList.remove('justwon'),700);
  } else {
    cell.classList.add('missed');
  }
  updateWallCount();
}

// ---------- round flow ----------
function nextCard(){
  clearTimeout(advanceTimer);
  answered = false;
  hintThisRound = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('revealLine').innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('flagWrap').className = 'flag-wrap';

  current = pickAnswer();
  document.getElementById('flagImg').src = imgFor(current);
  document.getElementById('flagImg').alt = 'Flag to identify';
  const blurb = document.getElementById('flagBlurb');
  blurb.textContent = current.blurb; blurb.hidden = true;      // hidden until the hint is revealed
  document.getElementById('hintBtn').hidden = false;

  const options = buildOptions(current);
  const grid = document.getElementById('optionGrid');
  grid.innerHTML = '';
  options.forEach((who,i)=>{
    const btn = document.createElement('button');
    btn.className='option-btn'; btn.dataset.idx=i; btn.dataset.who=who;
    btn.innerHTML='<span class="key-hint">'+KEYS[i]+'</span><span></span>';
    btn.lastChild.textContent = who;
    btn.addEventListener('click', ()=>handleAnswer(who, btn));
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen, btn){
  if(answered) return; answered = true;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  const correct = chosen === current.country;
  collectedNames.add(current.country);          // never ask this flag again this run
  if(correct) correctCount++;
  markCell(roundIndex, current, correct);
  roundIndex++;

  if(correct){
    btn.classList.add('correct');
    if(window.HSGSound) HSGSound.correct();
    document.getElementById('flagWrap').classList.add('win');
    document.getElementById('feedback').innerHTML = '<span style="color:var(--green)">✓ Correct!</span>';
    if(window.HSGfx && HSGfx.confetti) HSGfx.confetti({count:18});
  } else {
    if(window.HSGSound) HSGSound.wrong();
    btn.classList.add('wrong');
    btns.forEach(b=>{ if(b.dataset.who===current.country) b.classList.add('reveal-correct'); });
    document.getElementById('flagWrap').classList.add('miss');
    document.getElementById('feedback').innerHTML = '<span style="color:var(--red)">✗ Not quite</span>';
  }
  document.getElementById('revealLine').innerHTML = 'It was <b>'+current.country+'</b> · '+current.continent;

  const blurb = document.getElementById('flagBlurb');
  blurb.textContent = current.blurb; blurb.hidden = false;
  document.getElementById('hintBtn').hidden = true;

  if(roundIndex >= WALL_SIZE){ setTimeout(endGame, DELAY_OK); return; }

  const nb = document.getElementById('nextBtn');
  nb.style.display='inline-block';
  if(autoAdvance){
    advanceTimer = setTimeout(()=>{ if(answered) nextCard(); }, correct?AUTO_OK:AUTO_NO);
  }
}

function endGame(){
  const score = Math.max(0, correctCount - hintCount);
  const hinted = hintCount > 0;
  const perfect = score >= WALL_SIZE;
  const panel = { gameId:'flag-frenzy', gameName:'Flag Frenzy', level:'best', levelName:'Best Score',
                  minStreak:1, unit:'flags', score:score, hinted:hinted,
                  onSaved:()=>renderSideBoard() };
  if(window.HSGfx && HSGfx.showSummary){
    HSGfx.showSummary({
      title: perfect ? '🚩 Perfect wall! '+WALL_SIZE+' / '+WALL_SIZE : '🚩 Wall of Flags complete!',
      correct:score, total:WALL_SIZE,
      stats:[ {num:score, label:'Score / '+WALL_SIZE, cls:'best'},
              {num:correctCount, label:'Correct'},
              {num:hintCount, label:'Hints used'} ],
      onPlayAgain:resetGame,
      extraHTML:'<div id="ffBoard" style="text-align:left;margin:0.25rem 0 0.5rem"></div>',
      onMount:()=>{ if(window.HSGStreak) HSGStreak.endPanel('#ffBoard', panel); } });
  } else { resetGame(); }
}
function resetGame(){
  collected = []; collectedNames.clear();
  roundIndex = 0; correctCount = 0; hintCount = 0; hintThisRound = false;
  answerPool = shuffle(DECK);
  buildWall(); nextCard();
}

document.getElementById('hintBtn').addEventListener('click', ()=>{
  document.getElementById('flagBlurb').hidden = false;
  document.getElementById('hintBtn').hidden = true;
  if(!hintThisRound){ hintThisRound = true; hintCount++; }
});
document.getElementById('nextBtn').addEventListener('click', ()=>{ if(answered) nextCard(); });
document.addEventListener('keydown', e=>{
  if((e.key==='Enter'||e.key===' ') && answered){ e.preventDefault(); nextCard(); return; }
  if(answered) return;
  const i=['a','b','c','d'].indexOf(e.key.toLowerCase());
  if(i<0) return;
  const b=document.querySelector('.option-btn[data-idx="'+i+'"]');
  if(b && !b.disabled) b.click();
});

// ---- auto-advance toggle (persisted) ----
const autoToggle = document.getElementById('autoToggle');
function renderAutoToggle(){
  autoToggle.setAttribute('aria-checked', autoAdvance ? 'true' : 'false');
  document.getElementById('autoLabel').textContent = 'Auto-advance: ' + (autoAdvance ? 'On' : 'Off');
}
autoToggle.addEventListener('click', ()=>{
  autoAdvance = !autoAdvance;
  try { localStorage.setItem('ff_autoadvance', autoAdvance ? '1' : '0'); } catch(e){}
  renderAutoToggle();
  if(window.HSGSound) HSGSound.tick();
  if(autoAdvance && answered){
    clearTimeout(advanceTimer);
    advanceTimer = setTimeout(()=>{ if(answered) nextCard(); }, AUTO_OK);
  } else if(!autoAdvance){
    clearTimeout(advanceTimer);
  }
});
renderAutoToggle();

// ---- quit / leave: only a finished game (all 24) makes the leaderboard ----
let leaving = false;
function leaveGame(dest){
  if(leaving) return; leaving = true;
  clearTimeout(advanceTimer); answered = true;
  if(dest) window.location.href = dest;
}
document.getElementById('quitBtn').addEventListener('click', ()=> leaveGame('../../index.html'));
const allGamesLink = document.getElementById('allGamesLink');
if(allGamesLink) allGamesLink.addEventListener('click', (e)=>{ e.preventDefault(); leaveGame(allGamesLink.href); });

function renderSideBoard(){
  if(window.HSGStreak && HSGStreak.renderBoardInto){
    HSGStreak.renderBoardInto('#ffSideBoard', { gameId:'flag-frenzy', level:'best', unit:'flags', minStreak:1 });
  }
}

renderSideBoard();
buildWall();
nextCard();
</script>
