<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasure Hunt · HomeschoolGames</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
  <style>
    :root { --gold:#c8a24a; --gold-lt:#e7c979; --ink2:#2c2213; }
    body.th-body { background:#0c0a07; color:#e9e2d2; }
    .th-header { background:#0f0c08; border-bottom:1px solid #241d12; }
    .th-header .site-logo { color:#e9e2d2; } .th-header .site-logo span { color:var(--gold); }
    .th-header .site-nav a { color:#9a8a63; } .th-header .site-nav a:hover { color:var(--gold-lt); }

    .th-wrap { max-width: 720px; margin: 0 auto; padding: 1.4rem 0.9rem 3rem; }

    .th-vault { position:relative; border-radius:16px; overflow:hidden; padding:1.5rem 1.3rem 1.4rem;
      background: radial-gradient(120% 80% at 50% -10%, #2a2116 0%, #16110b 55%, #0c0906 100%);
      border:1px solid #2c2415; box-shadow:0 0 0 1px #000, inset 0 0 120px rgba(0,0,0,.7), 0 20px 60px rgba(0,0,0,.6); }
    .th-vault::after { content:''; position:absolute; inset:0; pointer-events:none; border-radius:16px;
      box-shadow:inset 0 0 140px rgba(0,0,0,.85); animation:flicker 5s ease-in-out infinite; }
    @keyframes flicker { 0%,100%{opacity:1} 45%{opacity:.86} 70%{opacity:.95} }

    /* progress trail */
    .th-rail { display:flex; align-items:center; justify-content:center; gap:.5rem; margin-bottom:1.4rem; flex-wrap:wrap; }
    .th-rail .node { display:flex; align-items:center; gap:.5rem; }
    .th-rail .seal { width:20px; height:20px; border-radius:50%;
      background:radial-gradient(circle at 38% 32%, #2b2417, #14100a); border:1.5px solid #3a2f1b; box-shadow:inset 0 1px 2px rgba(0,0,0,.7); }
    .th-rail .seal.done { background:radial-gradient(circle at 38% 32%, var(--gold-lt), #8a6a26); border-color:var(--gold); box-shadow:0 0 8px rgba(200,162,74,.7); }
    .th-rail .seal.cur { border-color:var(--gold-lt); box-shadow:0 0 0 2px rgba(231,201,121,.35), 0 0 10px rgba(200,162,74,.5); animation:pulse 1.6s ease-in-out infinite; }
    .th-rail .seal.chest { width:26px; height:26px; }
    .th-rail .link { width:20px; height:2px; background:#33291a; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 2px rgba(231,201,121,.3),0 0 8px rgba(200,162,74,.4)} 50%{box-shadow:0 0 0 3px rgba(231,201,121,.5),0 0 16px rgba(200,162,74,.7)} }

    /* parchment clue card */
    .parchment { position:relative; background:linear-gradient(160deg,#efe4ca,#e2d2ac 60%,#d3bf94);
      color:var(--ink2); border-radius:5px; padding:1.6rem 1.7rem 1.5rem;
      box-shadow:0 2px 0 #b8a271, 0 16px 34px rgba(0,0,0,.55), inset 0 0 60px rgba(150,120,70,.28); }
    .parchment::before { content:''; position:absolute; inset:0; border-radius:5px; pointer-events:none;
      box-shadow:inset 0 0 0 1px rgba(120,90,45,.3), inset 0 0 40px rgba(120,90,45,.25);
      background:radial-gradient(120% 100% at 85% 10%, rgba(120,90,45,.12), transparent 40%), radial-gradient(80% 80% at 10% 90%, rgba(120,90,45,.14), transparent 45%); }
    .ch-tag { font-family:var(--font-sans); font-size:.66rem; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:#9a7526; }
    .ch-riddle { font-family:var(--font-serif); font-size:1.55rem; line-height:1.4; font-style:italic; margin:.5rem 0 1rem; }
    .ch-trial { font-family:var(--font-sans); font-size:.92rem; color:#5a4a24; border-left:3px solid var(--gold); padding:.15rem 0 .15rem .7rem; margin:1rem 0 .2rem; }
    .ch-trial b { color:#6e2f12; }

    .how { margin-top:1.3rem; padding-top:1rem; border-top:1px dashed rgba(120,90,45,.4); font-family:var(--font-sans); font-size:.86rem; color:#6a5836; line-height:1.6; }
    .how b { color:#6e2f12; }
    .how .steps { display:flex; gap:.5rem; margin-top:.6rem; flex-wrap:wrap; }
    .how .steps span { flex:1 1 150px; background:rgba(120,90,45,.1); border:1px solid rgba(120,90,45,.3); border-radius:8px; padding:.5rem .6rem; }
    .how .steps b { display:block; color:#9a7526; font-size:.66rem; letter-spacing:.1em; text-transform:uppercase; margin-bottom:.15rem; }

    /* treasure reveal */
    .th-treasure { text-align:center; padding:1rem 0 .5rem; }
    .th-treasure .crest { font-size:3rem; }
    .th-treasure h2 { font-family:var(--font-serif); font-size:2.2rem; color:var(--gold-lt);
      background:linear-gradient(180deg,#f3e2b4,#c8a24a 60%,#8a6a26); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin:.3rem 0 .6rem; }
    .th-treasure p { color:#cfc2a2; font-family:var(--font-serif); font-size:1.15rem; line-height:1.55; max-width:42ch; margin:0 auto 1.4rem; }
    .btn-gold { font-family:var(--font-sans); font-weight:800; border:none; cursor:pointer; border-radius:10px; padding:.7rem 1.8rem; font-size:1rem;
      color:#1a1207; background:linear-gradient(180deg,var(--gold-lt),var(--gold)); box-shadow:0 5px 0 #7a5c1f; }
    .btn-gold:active { transform:translateY(4px); box-shadow:0 1px 0 #7a5c1f; }

    .th-foot { display:flex; justify-content:space-between; align-items:center; margin-top:1.1rem; font-family:var(--font-sans); }
    .th-note { font-size:.72rem; color:#6a5a3a; max-width:80%; line-height:1.5; }
    .th-reset { background:none; border:none; color:#5a4d34; font-size:.72rem; cursor:pointer; text-decoration:underline; }
    .th-reset:hover { color:var(--gold-lt); }

    .th-confetti { position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden; }
    .th-confetti i { position:absolute; top:-14px; width:9px; height:14px; border-radius:2px; animation:conf 1.6s linear forwards; }
    @keyframes conf { to { transform:translateY(103vh) rotate(680deg); } }
    @media (prefers-reduced-motion: reduce){ .th-vault::after, .th-rail .seal.cur { animation:none; } }
  </style>
</head>
<body class="th-body">

<header class="site-header th-header">
  <a href="../../index.html" class="site-logo">Homeschool<span>Games</span></a>
  <nav class="site-nav"><a href="../../index.html">← Home</a></nav>
</header>

<div class="th-wrap">
  <div class="th-vault">
    <div class="th-rail" id="rail"></div>
    <div id="content"></div>
    <div class="th-foot">
      <span class="th-note">Each clue solves to one word. Type that word on the home page to open a hidden game — beat its trial and the next clue is yours.</span>
      <button class="th-reset" id="resetBtn">Reset hunt</button>
    </div>
  </div>
</div>

<footer class="site-footer" style="border-top-color:#241d12;"><a href="../../index.html" style="color:#9a8a63;">homeschoolgames.app</a></footer>

<script src="../../assets/js/sfx.js"></script>
<script src="../../assets/js/hunt.js"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var H = window.HSGHunt;
  var N = H.STEPS.length;

  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function renderRail() {
    var st = H.step(), done = H.done(), html = '';
    for (var i = 0; i < N; i++) {
      var cls = i < st ? 'done' : (i === st && !done ? 'cur' : '');
      html += '<div class="node"><span class="seal ' + cls + '"></span></div>';
      html += '<span class="link"></span>';
    }
    html += '<div class="node"><span class="seal chest ' + (done ? 'done' : '') + '"></span></div>';
    $('rail').innerHTML = html;
  }

  function renderContent() {
    if (H.done()) {
      $('content').innerHTML =
        '<div class="th-treasure">' +
          '<div class="crest">🏆</div>' +
          '<h2>' + esc(H.TREASURE.title) + '</h2>' +
          '<p>' + esc(H.TREASURE.text) + '</p>' +
          '<button class="btn-gold" id="againBtn">Hunt again</button>' +
        '</div>';
      $('againBtn').addEventListener('click', function () { H.reset(); render(); });
      confetti();
      if (window.HSGSound && HSGSound.finish) HSGSound.finish(true);
      return;
    }
    var s = H.current(), n = H.step() + 1;
    $('content').innerHTML =
      '<div class="parchment">' +
        '<div class="ch-tag">Clue ' + n + ' of ' + N + '</div>' +
        '<div class="ch-riddle">“' + esc(s.riddle) + '”</div>' +
        '<div class="ch-trial">The trial that guards it: <b>' + esc(s.trial) + '</b></div>' +
        '<div class="how"><b>How the hunt works</b> — read the riddle, work out the single word it hides, then:' +
          '<div class="steps">' +
            '<span><b>1 · Speak it</b>Type that word anywhere on the home page.</span>' +
            '<span><b>2 · Enter</b>A hidden game opens its doors.</span>' +
            '<span><b>3 · Prove it</b>Beat the trial — the next clue appears.</span>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function render() { renderRail(); renderContent(); }

  function confetti() {
    var wrap = document.createElement('div'); wrap.className = 'th-confetti';
    var C = ['#E0531B', '#E0A53B', '#2E8FE0', '#C4A040', '#e7c979'];
    for (var i = 0; i < 40; i++) { var p = document.createElement('i');
      p.style.left = (Math.random() * 100) + 'vw'; p.style.background = C[i % C.length];
      p.style.animationDelay = (Math.random() * 0.4) + 's'; p.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      wrap.appendChild(p); }
    document.body.appendChild(wrap); setTimeout(function () { wrap.remove(); }, 2400);
  }

  $('resetBtn').addEventListener('click', function () {
    if (window.confirm('Reset the hunt back to the first clue?')) { H.reset(); render(); }
  });
  // if the player returns after clearing a game elsewhere, reflect the new step
  window.addEventListener('focus', render);
  document.addEventListener('visibilitychange', function () { if (!document.hidden) render(); });

  render();
})();
</script>

</body>
</html>
