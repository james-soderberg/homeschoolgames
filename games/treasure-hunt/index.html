  <link rel="stylesheet" href="../../assets/css/site.css">
  <style>
    :root { --gold:#c8a24a; --gold-lt:#e7c979; --ink2:#2c2213; }
    body.th-body { background:#0c0a07; color:#e9e2d2; min-height:100vh; }
    .th-header { background:#0f0c08; border-bottom:1px solid #241d12; }
    .th-header .site-logo { color:#e9e2d2; } .th-header .site-logo span { color:var(--gold); }
    .th-header .site-nav a { color:#9a8a63; } .th-header .site-nav a:hover { color:var(--gold-lt); }

    .th-wrap { max-width: 560px; margin: 0 auto; padding: 3.4rem 1.1rem 3rem; text-align:center; }

    /* faint progress dots */
    .th-rail { display:flex; align-items:center; justify-content:center; gap:.5rem; margin-bottom:2.4rem; }
    .th-rail .seal { width:9px; height:9px; border-radius:50%; background:#2b2417; border:1px solid #3a2f1b; }
    .th-rail .seal.done { background:var(--gold-lt); border-color:var(--gold); box-shadow:0 0 7px rgba(200,162,74,.7); }
    .th-rail .seal.cur { border-color:var(--gold-lt); box-shadow:0 0 0 2px rgba(231,201,121,.3); }
    .th-rail .seal.chest { width:12px; height:12px; }

    .th-tag { font-family:var(--font-sans); font-size:.66rem; font-weight:800; letter-spacing:.26em; text-transform:uppercase; color:#8a7526; margin-bottom:1.3rem; }

    /* a picture clue (e.g. a stereogram) shown above the riddle */
    .clue-img { display:block; width:min(88vw,480px); margin:0.4rem auto 1.4rem; border-radius:12px;
      border:2px solid #4a3c22; box-shadow:0 10px 30px rgba(0,0,0,.5); background:#1a150d; }
    /* the riddle */
    .riddle { font-family:var(--font-serif); font-style:italic; font-size:clamp(1.7rem,5.5vw,2.5rem); line-height:1.4;
      color:#f0e6cf; margin:0 auto 2.2rem; max-width:22ch; }
    .riddle .q { color:var(--gold); font-style:normal; }
    /* cipher clues: keep the runes on a single line, shrunk (via JS) to fit the screen */
    .riddle.mono { display:inline-block; font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
      font-style:normal; white-space:nowrap; max-width:100%; overflow:hidden; color:var(--gold-lt);
      font-size:1.4rem; letter-spacing:.02em; text-shadow:0 0 18px rgba(231,201,121,.25); }

    /* answer box */
    .answer { display:flex; gap:.5rem; max-width:400px; margin:0 auto; }
    .answer input { flex:1 1 auto; min-width:0; background:rgba(255,252,244,.06); border:none; border-bottom:2px solid #4a3f24;
      color:#f4ecd7; font-family:var(--font-serif); font-size:1.4rem; text-align:center; padding:.5rem .4rem; outline:none; transition:border-color .2s; }
    .answer input:focus { border-bottom-color:var(--gold); }
    .answer input::placeholder { color:#6a5a3a; font-style:italic; font-size:1rem; }
    .answer button { flex:0 0 auto; border:none; cursor:pointer; border-radius:8px; padding:0 1.3rem; font-family:var(--font-sans);
      font-weight:800; font-size:1rem; color:#1a1207; background:linear-gradient(180deg,var(--gold-lt),var(--gold)); box-shadow:0 4px 0 #7a5c1f; }
    .answer button:active { transform:translateY(3px); box-shadow:0 1px 0 #7a5c1f; }
    .answer.wrong input { animation:shake .4s; border-bottom-color:#a6432a; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .answer.right input { border-bottom-color:#5aa06a; color:#bfe9c8; }

    .fb { min-height:1.3em; margin-top:1rem; font-family:var(--font-serif); font-style:italic; font-size:1rem; color:#a08a5e; }
    .fb.bad { color:#c07a5a; } .fb.good { color:#8fce9a; font-style:normal; font-weight:700; }

    .hint-wrap { margin-top:2rem; }
    .hint-toggle { background:none; border:none; color:#5a4d34; font-size:.8rem; cursor:pointer; text-decoration:underline; font-family:var(--font-sans); }
    .hint-toggle:hover { color:var(--gold-lt); }
    .hint-text { display:none; margin-top:.7rem; font-family:var(--font-sans); font-size:.86rem; color:#8a7a55; line-height:1.6; }
    .hint-text.show { display:block; }

    /* treasure reveal */
    .treasure { text-align:center; }
    .treasure .crest { font-size:3.2rem; }
    .treasure h2 { font-family:var(--font-serif); font-size:2.3rem; margin:.4rem 0 .7rem;
      background:linear-gradient(180deg,#f3e2b4,#c8a24a 60%,#8a6a26); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .treasure p { color:#cfc2a2; font-family:var(--font-serif); font-size:1.2rem; line-height:1.55; max-width:40ch; margin:0 auto 1.6rem; }
    .treasure button { border:none; cursor:pointer; border-radius:10px; padding:.7rem 1.9rem; font-family:var(--font-sans); font-weight:800;
      color:#1a1207; background:linear-gradient(180deg,var(--gold-lt),var(--gold)); box-shadow:0 5px 0 #7a5c1f; }

    .th-reset { position:fixed; bottom:1rem; right:1rem; background:none; border:none; color:#4a3f28; font-size:.7rem; cursor:pointer; text-decoration:underline; font-family:var(--font-sans); }
    .th-reset:hover { color:#8a7a55; }

    .th-confetti { position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden; }
    .th-confetti i { position:absolute; top:-14px; width:9px; height:14px; border-radius:2px; animation:conf 1.6s linear forwards; }
    @keyframes conf { to { transform:translateY(103vh) rotate(680deg); } }

    /* ---------- checkpoint ---------- */
    .checkpoint { text-align:center; }
    .checkpoint .crest { font-size:3rem; line-height:1; }
    .checkpoint h2 { font-family:var(--font-serif); font-size:1.95rem; margin:.5rem 0 .6rem; line-height:1.2;
      background:linear-gradient(180deg,#f3e2b4,#c8a24a 60%,#8a6a26); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .cp-lead { color:#cfc2a2; font-family:var(--font-serif); font-size:1.12rem; line-height:1.55; max-width:40ch; margin:0 auto 1.6rem; }
    .cp-you { font-family:var(--font-sans); font-size:.95rem; color:#e7c979; font-weight:700; margin:0 auto 1.5rem; line-height:1.5; }
    .cp-you b { color:#f4ecd7; }

    /* claim form */
    .cp-claim { display:flex; gap:.5rem; max-width:400px; margin:0 auto 1.6rem; }
    .cp-claim input { flex:1 1 auto; min-width:0; background:rgba(255,252,244,.06); border:none; border-bottom:2px solid #4a3f24;
      color:#f4ecd7; font-family:var(--font-serif); font-size:1.2rem; text-align:center; padding:.5rem .4rem; outline:none; transition:border-color .2s; }
    .cp-claim input:focus { border-bottom-color:var(--gold); }
    .cp-claim input::placeholder { color:#6a5a3a; font-style:italic; font-size:.9rem; }
    .cp-claim button { flex:0 0 auto; border:none; cursor:pointer; border-radius:8px; padding:0 1.1rem; font-family:var(--font-sans);
      font-weight:800; font-size:.92rem; color:#1a1207; background:linear-gradient(180deg,var(--gold-lt),var(--gold)); box-shadow:0 4px 0 #7a5c1f; }
    .cp-claim button:active { transform:translateY(3px); box-shadow:0 1px 0 #7a5c1f; }

    /* arrival leaderboard */
    .cp-board { max-width:440px; margin:0 auto 1.8rem; text-align:left; }
    .cp-board h3 { font-family:var(--font-sans); font-size:.66rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase;
      color:#8a7526; text-align:center; margin:0 0 .85rem; }
    .cp-cols { display:flex; align-items:center; gap:.7rem; padding:0 .8rem .4rem; font-family:var(--font-sans);
      font-size:.6rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:#5f5540; }
    .cp-cols .cp-rank, .cp-cols .cp-name, .cp-cols .cp-date { color:#5f5540; }
    .cp-list { list-style:none; margin:0; padding:0; }
    .cp-row { display:flex; align-items:center; gap:.7rem; padding:.55rem .8rem; border-radius:9px;
      border:1px solid #241d12; margin-bottom:.4rem; background:#130f08; }
    .cp-row.me { border-color:var(--gold); background:#1c1509; box-shadow:0 0 0 1px rgba(200,162,74,.35); }
    .cp-rank { flex:0 0 1.9rem; text-align:center; font-family:var(--font-serif); font-weight:800; font-size:1.15rem; color:var(--gold-lt); }
    .cp-name { flex:1 1 auto; font-family:var(--font-sans); font-weight:700; font-size:.98rem; color:#f0e6cf; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cp-date { flex:0 0 auto; font-family:var(--font-sans); font-size:.78rem; color:#9a8a63; font-variant-numeric:tabular-nums; }
    .cp-empty { text-align:center; color:#8a7a55; font-family:var(--font-serif); font-style:italic; font-size:.95rem; padding:.9rem 0; }

    .cp-return { font-family:var(--font-sans); font-size:.92rem; color:#a08a5e; line-height:1.6; max-width:36ch; margin:0 auto; }
    .cp-return b { color:var(--gold-lt); }

    /* replay the buried games for a high score */
    .cp-replay { max-width:440px; margin:0 auto 1.8rem; text-align:left; }
    .cp-replay h3 { font-family:var(--font-sans); font-size:.66rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase;
      color:#8a7526; text-align:center; margin:0 0 .85rem; }
    .cp-replay-grid { display:grid; gap:.5rem; }
    .cp-replay-btn { display:flex; align-items:center; gap:.75rem; padding:.6rem .85rem; border-radius:11px;
      background:#130f08; border:1px solid #3a2f1b; text-decoration:none; transition:border-color .12s, transform .1s, background .12s; }
    .cp-replay-btn:hover { border-color:var(--gold); background:#1c1509; transform:translateY(-1px); }
    .cpr-icon { font-size:1.5rem; line-height:1; flex:0 0 auto; }
    .cpr-txt { display:flex; flex-direction:column; line-height:1.3; min-width:0; }
    .cpr-txt b { color:#f0e6cf; font-family:var(--font-sans); font-weight:800; font-size:.96rem; }
    .cpr-txt span { color:#9a8a63; font-family:var(--font-sans); font-size:.78rem; }
  </style>
</head>
<body class="th-body">

<header class="site-header th-header">
  <a href="../../index.html" class="site-logo">Homeschool<span>Games</span></a>
  <nav class="site-nav"><a href="../../index.html">← Home</a></nav>
</header>

<div class="th-wrap">
  <div class="th-rail" id="rail"></div>
  <div id="content"></div>
</div>

<button class="th-reset" id="resetBtn">reset hunt</button>

<script src="../../assets/js/sfx.js"></script>
<script src="../../assets/js/hunt.js"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var H = window.HSGHunt;
  var N = H.STEPS.length;
  // The clue shown is driven ENTIRELY by the URL via an opaque per-clue token
  // (?c=<token>) - no saved progress and no guessable numbers. Typing "treasure"
  // (no token) always starts at clue 1; each game hands off to the next clue's
  // token URL. An unknown/absent token falls back to the first clue.
  function clueIndex() {
    try {
      var tok = new URLSearchParams(location.search).get('c');
      if (!tok) return 0;
      var i = H.indexForToken(tok);
      return (i < 0) ? 0 : Math.min(i, N);
    } catch (e) { return 0; }
  }
  var CUR = clueIndex();
  function effStep()    { return CUR; }
  function effDone()    { return CUR >= N; }
  function effCurrent() { return effDone() ? null : H.STEPS[CUR]; }
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function norm(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]/g, ''); }

  function renderRail() {
    var st = effStep(), done = effDone(), html = '';
    for (var i = 0; i < N; i++) html += '<span class="seal ' + (i < st ? 'done' : (i === st && !done ? 'cur' : '')) + '"></span>';
    html += '<span class="seal chest ' + (done ? 'done' : '') + '"></span>';
    $('rail').innerHTML = html;
  }

  function accepts(step, raw) {
    var n = norm(raw); if (!n) return false;
    var list = (step.accept && step.accept.length) ? step.accept : [step.word];
    for (var i = 0; i < list.length; i++) if (norm(list[i]) === n) return true;
    return false;
  }

  function renderClue() {
    var s = effCurrent(), n = effStep() + 1;
    if (s.checkpoint) { renderCheckpoint(s); return; }   // a real, revisitable milestone
    if (s.placeholder) {   // trail not yet carved past here - show a gentle "coming soon"
      $('content').innerHTML =
        '<div class="th-tag">Clue ' + n + ' of ' + N + '</div>' +
        '<p class="riddle"><span class="q">“</span>' + esc(s.riddle) + '<span class="q">”</span></p>' +
        '<div class="fb good" style="opacity:.85">The next clue is being forged… check back soon, hunter.</div>';
      return;
    }
    if (s.directive) {   // a plain instruction to follow - no word to guess, just go
      $('content').innerHTML =
        '<div class="th-tag">Clue ' + n + ' of ' + N + '</div>' +
        '<p class="riddle" style="font-style:normal">' + esc(s.riddle) + '</p>' +
        '<button id="goBtn" style="border:none;cursor:pointer;border-radius:10px;padding:.75rem 2rem;font-family:var(--font-sans);font-weight:800;font-size:1.05rem;color:#1a1207;background:linear-gradient(180deg,var(--gold-lt),var(--gold));box-shadow:0 5px 0 #7a5c1f;">' + esc(s.goText || 'Go →') + '</button>';
      $('goBtn').addEventListener('click', function () { if (window.HSGSound) HSGSound.correct(); location.href = '../../' + s.open; });
      return;
    }
    $('content').innerHTML =
      '<div class="th-tag">Clue ' + n + ' of ' + N + '</div>' +
      (s.image ? '<img class="clue-img" src="../../' + esc(s.image) + '" alt="A hidden-word puzzle">' : '') +
      (!s.riddle ? ''
        : s.mono
        ? '<p class="riddle mono">' + esc(s.riddle) + '</p>'
        : '<p class="riddle"><span class="q">“</span>' + esc(s.riddle) + '<span class="q">”</span></p>') +
      '<form class="answer" id="ansForm" autocomplete="off">' +
        '<input id="ansInput" type="text" placeholder="the hidden word…" autocorrect="off" spellcheck="false" aria-label="Your answer">' +
        '<button type="submit">Submit</button>' +
      '</form>' +
      '<div class="fb" id="fb"></div>' +
      (s.hint ? '<div class="hint-wrap"><button class="hint-toggle" id="hintToggle">Stuck? Reveal a hint</button>' +
        '<div class="hint-text" id="hintText">' + esc(s.hint) + '</div></div>' : '');

    var form = $('ansForm'), input = $('ansInput');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (accepts(s, input.value)) {
        form.classList.remove('wrong'); form.classList.add('right');
        var fb = $('fb'); fb.textContent = 'The lock gives way…'; fb.className = 'fb good';
        if (window.HSGSound) HSGSound.correct();
        setTimeout(function () { location.href = '../../' + s.open; }, 850);   // launch the hidden game
      } else {
        form.classList.remove('right'); void form.offsetWidth; form.classList.add('wrong');
        var fb2 = $('fb'); fb2.textContent = 'That word turns nothing.'; fb2.className = 'fb bad';
        if (window.HSGSound) HSGSound.wrong();
      }
    });
    if (s.hint) $('hintToggle').addEventListener('click', function () {
      $('hintText').classList.toggle('show');
      this.textContent = $('hintText').classList.contains('show') ? 'Hide hint' : 'Stuck? Reveal a hint';
    });
    setTimeout(function () { try { input.focus(); } catch (e) {} }, 40);
    if (s.mono) fitMono();
  }

  // shrink a one-line cipher clue until every rune fits the viewport width
  function fitMono() {
    var m = document.querySelector('.riddle.mono'); if (!m) return;
    var vw = document.documentElement.clientWidth || window.innerWidth || 360;
    var avail = Math.min(vw - 28, 520);
    var size = 26; m.style.fontSize = size + 'px';
    while (m.scrollWidth > avail && size > 7) { size -= 1; m.style.fontSize = size + 'px'; }
  }
  window.addEventListener('resize', function () { if (document.querySelector('.riddle.mono')) fitMono(); });

  // ---------- checkpoint: a real milestone with a shared "who got here first" board ----------
  // Ranking is by ARRIVAL time: every arrival posts a constant score, so the
  // leaderboard's ts-ascending tiebreak orders players by who reached it earliest.
  var MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  function fmtDate(ts) {
    var d = new Date(Number(ts)); if (isNaN(d.getTime())) return '';
    return MON[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }
  function remoteOK() { return typeof fetch === 'function' && /^https?:$/.test(location.protocol); }
  function fmtName(raw) {
    if (window.HSGStreak && HSGStreak.formatName) return HSGStreak.formatName(raw);
    var s = (raw == null ? '' : String(raw)).replace(/\s+/g, ' ').trim();
    return s ? s.slice(0, 18) : 'Anonymous';
  }

  // this player's own arrival record for a checkpoint: { name, ts, synced, pos }
  function meKey(cp) { return 'hsg_cp' + cp + '_me'; }
  function loadMe(cp) { try { return JSON.parse(localStorage.getItem(meKey(cp))) || null; } catch (e) { return null; } }
  function saveMe(cp, m) { try { localStorage.setItem(meKey(cp), JSON.stringify(m)); } catch (e) {} }

  function postArrival(board, name, ts) {
    if (!remoteOK()) return Promise.resolve(null);
    return fetch('/api/score', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ board: board, name: name, score: 1, hinted: 0, ts: ts })
    }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; });
  }
  function fetchArrivals(board) {
    if (!remoteOK()) return Promise.resolve(null);
    return fetch('/api/top?board=' + encodeURIComponent(board))
      .then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; });
  }

  // Links back to every buried game. Because the player has cleared them all to get
  // here, each opens in its free-play HIGH-SCORE mode (no trial cap / clue hand-off).
  function replayHTML() {
    var games = H.SECRET_GAMES || [];
    if (!games.length) return '';
    var items = games.map(function (g) {
      return '<a class="cp-replay-btn" href="../../' + g.url + '">' +
        '<span class="cpr-icon">' + esc(g.icon) + '</span>' +
        '<span class="cpr-txt"><b>' + esc(g.name) + '</b><span>' + esc(g.blurb) + '</span></span></a>';
    }).join('');
    return '<div class="cp-replay">' +
      '<h3>Replay the buried games · chase a high score</h3>' +
      '<div class="cp-replay-grid">' + items + '</div></div>';
  }

  function renderCheckpoint(s) {
    var me = loadMe(s.checkpoint);
    $('content').innerHTML =
      '<div class="checkpoint">' +
        '<div class="crest">🚩</div>' +
        '<div class="th-tag">' + esc(s.title || ('Checkpoint ' + s.checkpoint)) + '</div>' +
        '<h2>Congratulations — you’ve reached the first checkpoint!</h2>' +
        '<p class="cp-lead">The rest of the treasure hunt is still being developed. When it opens, ' +
          'you’ll receive a head start based on your position on this leaderboard.</p>' +
        '<div id="cpClaim"></div>' +
        '<div class="cp-board" id="cpBoard">' +
          '<h3>Checkpoint One · who got here first</h3>' +
          '<div class="cp-empty">Loading the leaderboard…</div>' +
        '</div>' +
        replayHTML() +
        '<p class="cp-return">To return to this checkpoint any time, just type ' +
          '<b>checkpoint one</b> on the home page.</p>' +
      '</div>';
    if (window.HSGSound && HSGSound.finish && !me) HSGSound.finish(true);
    if (!me) confetti();
    drawClaim(s, me);
    refreshBoard(s, me);
  }

  // the name-claim form (first arrival) or the "you claimed your spot" status line
  function drawClaim(s, me) {
    var wrap = $('cpClaim'); if (!wrap) return;
    if (me) {
      wrap.innerHTML = '<div class="cp-you">You claimed your place as <b>' + esc(me.name) +
        '</b> on ' + esc(fmtDate(me.ts)) + '.</div>';
      return;
    }
    var prefill = (window.HSGStreak && HSGStreak.lastName && HSGStreak.lastName()) || '';
    wrap.innerHTML =
      '<form class="cp-claim" id="cpForm" autocomplete="off">' +
        '<input id="cpName" type="text" maxlength="24" placeholder="Enter your name to claim your spot" ' +
          'value="' + esc(prefill) + '" autocorrect="off" spellcheck="false" aria-label="Your name">' +
        '<button type="submit">Claim my place</button>' +
      '</form>';
    var form = $('cpForm'), input = $('cpName');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var name = fmtName(input.value);
      var m = { name: name, ts: Date.now(), synced: false };
      saveMe(s.checkpoint, m);
      try { localStorage.setItem('hsg_player_name', input.value.trim()); } catch (e2) {}  // share name with other games
      if (window.HSGSound && HSGSound.correct) HSGSound.correct();
      confetti();
      drawClaim(s, m);           // swap the form for the status line
      postArrival(s.board, m.name, m.ts).then(function (res) {
        if (res && Array.isArray(res.top)) { m.synced = true; if (res.rank) m.pos = res.rank; saveMe(s.checkpoint, m); }
        refreshBoard(s, m);
      });
      refreshBoard(s, m);        // optimistic paint while the POST is in flight
    });
    setTimeout(function () { try { input.focus(); } catch (e) {} }, 40);
  }

  function refreshBoard(s, me) {
    // retry a lost arrival post so a dropped POST never costs the player their spot
    if (me && !me.synced && remoteOK()) {
      postArrival(s.board, me.name, me.ts).then(function (res) {
        if (res && Array.isArray(res.top)) { me.synced = true; if (res.rank) me.pos = res.rank; saveMe(s.checkpoint, me); drawBoard(s, me, res.top); }
      });
    }
    drawBoard(s, me, null);      // instant paint from what we already know
    fetchArrivals(s.board).then(function (list) { drawBoard(s, me, list); });
  }

  function drawBoard(s, me, serverList) {
    var el = $('cpBoard'); if (!el) return;
    var rows = Array.isArray(serverList)
      ? serverList.filter(function (e) { return e && typeof e.name === 'string'; })
          .map(function (e) { return { name: e.name, ts: Number(e.ts) || 0 }; })
      : [];
    // make sure the player sees themselves even before the server reflects the write
    if (me && !rows.some(function (r) { return r.ts === me.ts; })) rows.push({ name: me.name, ts: me.ts });
    rows.sort(function (a, b) { return a.ts - b.ts; });   // earliest arrival first
    rows = rows.slice(0, 10);

    var head = '<h3>Checkpoint One · who got here first</h3>';
    if (!rows.length) {
      el.innerHTML = head + '<div class="cp-empty">Be the first to reach this checkpoint.</div>';
      return;
    }
    var mePos = (me && me.pos) ? me.pos : -1;
    var lis = rows.map(function (r, i) {
      var isMe = me && r.ts === me.ts;
      if (isMe && mePos < 0) mePos = i + 1;
      return '<li class="cp-row' + (isMe ? ' me' : '') + '">' +
          '<span class="cp-rank">' + (i + 1) + '</span>' +
          '<span class="cp-name">' + esc(r.name) + '</span>' +
          '<span class="cp-date">' + esc(fmtDate(r.ts)) + '</span>' +
        '</li>';
    }).join('');
    el.innerHTML = head +
      '<div class="cp-cols"><span class="cp-rank">#</span><span class="cp-name">Pioneer</span><span class="cp-date">Arrived</span></div>' +
      '<ol class="cp-list">' + lis + '</ol>';

    if (me && mePos > 0) {
      var you = document.querySelector('.cp-you');
      if (you) you.innerHTML = 'You’re checkpoint pioneer <b>#' + mePos +
        '</b> — claimed on ' + esc(fmtDate(me.ts)) + '.';
    }
  }

  function renderTreasure() {
    $('content').innerHTML =
      '<div class="treasure"><div class="crest">🏆</div><h2>' + esc(H.TREASURE.title) + '</h2>' +
      '<p>' + esc(H.TREASURE.text) + '</p><button id="againBtn">Hunt again</button></div>';
    $('againBtn').addEventListener('click', function () { location.href = location.pathname; });
    confetti();
    if (window.HSGSound && HSGSound.finish) HSGSound.finish(true);
  }

  function render() { renderRail(); if (effDone()) renderTreasure(); else renderClue(); }

  function confetti() {
    var wrap = document.createElement('div'); wrap.className = 'th-confetti';
    var C = ['#E0531B', '#E0A53B', '#2E8FE0', '#C4A040', '#e7c979'];
    for (var i = 0; i < 40; i++) { var p = document.createElement('i');
      p.style.left = (Math.random() * 100) + 'vw'; p.style.background = C[i % C.length];
      p.style.animationDelay = (Math.random() * 0.4) + 's'; p.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      wrap.appendChild(p); }
    document.body.appendChild(wrap); setTimeout(function () { wrap.remove(); }, 2400);
  }

  $('resetBtn').addEventListener('click', function () {
    if (window.confirm('Start the hunt over from the first clue?')) location.href = location.pathname;
  });

  render();
})();
</script>
