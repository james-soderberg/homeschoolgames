<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Racer · HomeschoolGames</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
  <link rel="stylesheet" href="../../assets/css/streak-rail.css">
  <style>
    .wr-page { max-width: 920px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }

    .wr-top { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
    .wr-top h1 { margin: 0; font-size: 1.8rem; }
    .best-badge {
      background: var(--cream-dark); border: 1.5px solid var(--border); border-radius: 99px;
      padding: 0.45rem 1rem; font-weight: 700; font-size: 0.9rem; font-family: var(--font-sans); white-space: nowrap;
    }

    /* start */
    .wr-start { text-align: center; padding: 1rem 0 0; }
    .wr-start .big-icon { font-size: 4rem; line-height: 1; }
    .wr-start h2 { font-family: var(--font-serif); font-size: 1.8rem; margin: 0.4rem 0 0.5rem; }
    .wr-start p { max-width: 48ch; margin: 0 auto 0.6rem; color: var(--ink-light); line-height: 1.55; }
    .start-race-btn {
      background: var(--gold); color: var(--ink); border: none; border-radius: 12px;
      padding: 1rem 2.6rem; font-size: 1.2rem; font-weight: 700; font-family: var(--font-sans);
      cursor: pointer; transition: background 0.15s; box-shadow: 0 6px 0 #a07f2c;
    }
    .start-race-btn:hover { background: #d0ab48; }
    .start-race-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a07f2c; }

    /* live stats */
    .race-stats { display: flex; justify-content: center; gap: 1.6rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
    .race-stats .stat { text-align: center; }
    .race-stats .stat b { display: block; font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; line-height: 1; color: var(--ink); }
    .race-stats .stat span { font-size: 0.66rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); }
    .progress-wrap { height: 8px; background: var(--cream-dark); border: 1px solid var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 0.9rem; }
    .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--gold), #e6c766); transition: width 0.15s ease-out; }

    /* ---------- the rotating track ---------- */
    .arena {
      position: relative; width: min(94vw, clamp(340px, 82vh, 780px)); height: min(94vw, clamp(340px, 82vh, 780px));
      margin: 0 auto 0.9rem; border-radius: 18px;
      background: #34302b; overflow: hidden;
      box-shadow: 0 8px 24px rgba(20,33,46,0.24); border: 2px solid #23201b;
    }
    /* the lane band the cars drive on, just outside the words */
    .arena::before {
      content: ''; position: absolute;
      left: var(--carmargin); top: var(--carmargin); right: var(--carmargin); bottom: var(--carmargin);
      border: var(--laneband) solid rgba(255,255,255,0.05); border-radius: 14px;
    }
    .finish-flag {
      position: absolute; width: 9px; z-index: 4; transform: translateX(-50%); border-radius: 2px;
      background-image:
        linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%),
        linear-gradient(45deg, #fff 25%, #111 25%, #111 75%, #fff 75%);
      background-size: 9px 9px; background-position: 0 0, 4.5px 4.5px; background-color: #111;
      box-shadow: 0 0 8px rgba(0,0,0,0.5);
    }
    .ring { position: absolute; inset: 0; transform-origin: 50% 50%; will-change: transform; }
    .ring.spin { transition: transform 0.32s ease-in-out; }

    .edge {
      position: absolute; left: 50%; top: 50%;
      width: var(--track); height: var(--lineh);
      margin-left: calc(var(--track) / -2); margin-top: calc(var(--lineh) / -2);
      font-family: var(--font-serif); font-size: var(--fs); line-height: var(--lineh);
      white-space: nowrap; overflow: hidden; text-align: center; padding: 0 6px;
    }
    .edge.top    { transform: rotate(0deg)   translateY(calc(-1 * var(--D))); color: #fbf4e3; }
    .edge.right  { transform: rotate(90deg)  translateY(calc(-1 * var(--D))); color: #b9b0a0; }
    .edge.bottom { transform: rotate(180deg) translateY(calc(-1 * var(--D))); color: #8f877a; }
    .edge.left   { transform: rotate(270deg) translateY(calc(-1 * var(--D))); color: #b9b0a0; }

    .ch { color: #a99f8c; }
    .ch.done { color: #7fd39a; }
    .ch.current { background: var(--gold-light); color: var(--ink); border-radius: 3px; }
    .ch.err { background: #F6C9C9; color: var(--red); border-radius: 3px; }
    .ch.space { white-space: pre; }
    /* trailing punctuation: shown for a complete sentence, but not part of the typed race */
    .ch.tail { color: #6f685b; }

    /* cars ride the ring */
    .ecar, .pcar { position: absolute; left: 0; top: 0; z-index: 5; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4)); }
    .ecar svg { width: 50px; height: 20px; display: block; overflow: visible; }
    .pcar svg { width: 62px; height: 24px; display: block; overflow: visible; }
    .pcar.boost { filter: drop-shadow(0 0 9px rgba(255,170,40,0.95)) drop-shadow(0 2px 2px rgba(0,0,0,0.4)); }
    .pcar .flame { position: absolute; top: 50%; left: -11px; transform: translateY(-50%); font-size: 0.9rem; opacity: 0; }
    .pcar.boost .flame { opacity: 1; animation: flamef 0.16s infinite; }
    @keyframes flamef { 0%,100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.3); } }

    .place-badge {
      position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 7;
      font: 800 0.7rem/1 var(--font-sans); padding: 0.1rem 0.34rem; border-radius: 6px;
      background: #fffbe9; color: var(--ink); box-shadow: 0 2px 5px rgba(0,0,0,0.35); white-space: nowrap;
    }

    .lap-note {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
      font-family: var(--font-serif); font-style: italic; color: rgba(255,255,255,0.5);
      font-size: 0.9rem; text-align: center; max-width: 55%; pointer-events: none;
    }

    .race-hint { text-align: center; font-size: 0.85rem; color: var(--ink-light); margin-top: 0.5rem; }

    /* "start typing to begin" prompt */
    .type-prompt { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(20,18,16,0.45); z-index: 20; }
    .type-prompt span { background: #14110e; color: #fff; font-family: var(--font-sans); font-weight: 700; font-size: 1.05rem;
      padding: 0.7rem 1.3rem; border-radius: 99px; box-shadow: 0 4px 14px rgba(0,0,0,0.4); animation: tpPulse 1.2s ease-in-out infinite; }
    @keyframes tpPulse { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .type-prompt span { animation: none; } }

    .commentary { text-align: center; min-height: 1.5rem; font-family: var(--font-sans); font-weight: 800; font-size: 1.02rem; color: var(--ink); margin-bottom: 0.5rem; }
    .commentary.pop { animation: cpop 0.35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes cpop { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .wr-confetti { position: fixed; inset: 0; pointer-events: none; z-index: 1090; overflow: hidden; }
    .wr-confetti i { position: absolute; top: -16px; width: 10px; height: 14px; border-radius: 2px; animation: wrfall linear forwards; }
    @keyframes wrfall { to { transform: translateY(105vh) rotate(720deg); opacity: 0.9; } }
    @media (prefers-reduced-motion: reduce) { .wr-confetti { display: none; } }

    /* hidden line-measurer */
    .measure { position: absolute; left: -99999px; top: 0; visibility: hidden; font-family: var(--font-serif); }

    /* results */
    .results { text-align: center; }
    .results h2 { font-family: var(--font-serif); font-size: 2.2rem; margin: 0.4rem 0; }
    .results .place-emoji { font-size: 3.5rem; line-height: 1; }
    .result-stats { display: flex; justify-content: center; gap: 2rem; margin: 1rem 0 1.25rem; flex-wrap: wrap; }
    .result-stats .stat b { display: block; font-family: var(--font-serif); font-size: 2rem; font-weight: 700; line-height: 1; }
    .result-stats .stat.new b { color: var(--gold); }
    .result-stats .stat span { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); }
    .standings { max-width: 360px; margin: 0 auto 1.25rem; text-align: left; }
    .standing-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.6rem; border-radius: 8px; }
    .standing-row:not(:last-child) { border-bottom: 1px solid var(--cream-dark); }
    .standing-row.you { background: #FFF6E2; }
    .standing-row .pos { width: 1.6rem; font-family: var(--font-serif); font-weight: 700; }
    .standing-row .car-dot { display: inline-block; width: 0.9rem; height: 0.9rem; border-radius: 3px; flex-shrink: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.25); }
    .standing-row .who { flex: 1; font-weight: 600; }
    .standing-row .pct { font-size: 0.85rem; color: var(--ink-light); }
    .results-btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

    .hidden { display: none !important; }
    @media (prefers-reduced-motion: reduce) { .ring.spin { transition: none; } .pcar.boost .flame { animation: none; } }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../../index.html" class="site-logo">Homeschool<span>Games</span></a>

<div class="wr-page">

  <div class="wr-top">
    <h1>Word Racer</h1>
    <div class="best-badge" id="bestBadge">Best: — WPM</div>
  </div>

  <section id="raceScreen">
    <div class="commentary" id="commentary"></div>
    <div class="race-stats">
      <div class="stat"><b id="wpmStat">0</b><span>WPM</span></div>
      <div class="stat"><b id="accStat">100%</b><span>Accuracy</span></div>

    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

    <div class="arena" id="arena" onclick="focusGame()">
      <input id="typeGrab" type="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="text" tabindex="-1"
             aria-label="Type here" style="position:absolute;top:0;left:0;width:1px;height:1px;opacity:0;border:0;padding:0;margin:0;background:transparent;caret-color:transparent;z-index:-1">
      <div class="ring" id="ring">
        <div class="edge left" id="edgeLeft"></div>
        <div class="edge bottom" id="edgeBottom"></div>
        <div class="edge right" id="edgeRight"></div>
        <div class="edge top" id="edgeTop"></div>
        <div class="finish-flag" id="finishFlag" style="display:none"></div>
        <div class="pcar" id="pcar"><span class="flame">🔥</span></div>
      </div>

      <div class="stat" id="wpmResultWrap"><b id="wpmResult">0</b><span>Your WPM</span></div>

    </div>

    <div class="results-btns"><button class="start-race-btn" onclick="startRace()">Race Again →</button></div>
  </section>

</div>

<div class="measure" id="measure"></div>

<script>
// ============================================================
// WORD RACER — the passage is a square track. You type the top line
// (your car rides exactly on your caret); finishing it rotates the
// square back a quarter-turn so the next line comes to the top.
// Rivals race the same loop by how far they've typed.
// ============================================================

// KJV verses. `text` is what you type; `ref` is shown only as a watermark (never typed).
const PASSAGES = [
  { ref: "John 3:16", text: "For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life." },
  { ref: "Proverbs 3:5-6", text: "Trust in the LORD with all thine heart; and lean not unto thine own understanding. In all thy ways acknowledge him, and he shall direct thy paths." },
  { ref: "Psalm 23:1-2", text: "The LORD is my shepherd; I shall not want. He maketh me to lie down in green pastures: he leadeth me beside the still waters." },
  { ref: "Romans 8:28", text: "And we know that all things work together for good to them that love God, to them who are the called according to his purpose." },
  { ref: "Joshua 1:9", text: "Be strong and of a good courage; be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest." },
  { ref: "Jeremiah 29:11", text: "For I know the thoughts that I think toward you, saith the LORD, thoughts of peace, and not of evil, to give you an expected end." },
  { ref: "Matthew 5:16", text: "Let your light so shine before men, that they may see your good works, and glorify your Father which is in heaven." },
  { ref: "Philippians 4:6", text: "Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God." },
  { ref: "Ephesians 2:8-9", text: "For by grace are ye saved through faith; and that not of yourselves: it is the gift of God: Not of works, lest any man should boast." },
  { ref: "Matthew 6:33", text: "But seek ye first the kingdom of God, and his righteousness; and all these things shall be added unto you." },
  { ref: "1 Corinthians 13:4", text: "Charity suffereth long, and is kind; charity envieth not; charity vaunteth not itself, is not puffed up." },
  { ref: "John 14:6", text: "Jesus saith unto him, I am the way, the truth, and the life: no man cometh unto the Father, but by me." },
  { ref: "Psalm 118:24", text: "This is the day which the LORD hath made; we will rejoice and be glad in it." },
  { ref: "Proverbs 17:22", text: "A merry heart doeth good like a medicine: but a broken spirit drieth the bones." },
  { ref: "Colossians 3:23", text: "And whatsoever ye do, do it heartily, as to the Lord, and not unto men." },
  { ref: "Isaiah 40:31", text: "But they that wait upon the LORD shall renew their strength; they shall mount up with wings as eagles; they shall run, and not be weary; and they shall walk, and not faint." }
];

function carSVG(body, accent, num) {
  const wheels =
    '<circle cx="17" cy="20" r="5.2" fill="#222"/><circle cx="17" cy="20" r="2" fill="#cfcfcf"/>' +
    '<circle cx="50" cy="20" r="5.2" fill="#222"/><circle cx="50" cy="20" r="2" fill="#cfcfcf"/>';
  const inner =
    '<rect x="3" y="3" width="12" height="2.6" rx="1" fill="' + accent + '"/>' +
    '<rect x="4" y="3" width="2.6" height="10" rx="1" fill="' + accent + '"/>' +
    '<path d="M5 18 Q7 12 16 11 L30 10 Q36 6.5 45 8 L58 11 Q63 12 62 17 L61 18 Z" fill="' + body + '"/>' +
    '<path d="M28 10 Q33 6.5 41 8 L42 11 L30 11 Z" fill="#17181c"/>' +
    '<circle cx="35" cy="8.6" r="2.3" fill="' + accent + '"/>' +
    '<circle cx="20.5" cy="14.5" r="4.6" fill="#fff"/>' +
    '<text x="20.5" y="16.8" font-size="6.4" text-anchor="middle" font-weight="700" fill="' + body + '" font-family="sans-serif">' + num + '</text>' + wheels;
  return '<svg viewBox="0 0 66 26" xmlns="http://www.w3.org/2000/svg">' + inner + '</svg>';
}

const OPPONENTS = [
  { name: 'Bolt',   body: '#2E6FB7', accent: '#EAF4FF', num: 7 },
  { name: 'Diesel', body: '#2E8B57', accent: '#FFD23F', num: 3 },
  { name: 'Zoom',   body: '#7A4FB0', accent: '#FF8A3F', num: 9 },
];
const MEDAL = { 1: '🥇', 2: '🥈', 3: '🥉' };
const BEST_KEY = 'hsg_wordracer_best';

// ---- DOM ----
const arena = document.getElementById('arena');
const ring = document.getElementById('ring');
const edgeTop = document.getElementById('edgeTop'), edgeRight = document.getElementById('edgeRight'),
      edgeBottom = document.getElementById('edgeBottom'), edgeLeft = document.getElementById('edgeLeft');
const pcar = document.getElementById('pcar');
const finishFlag = document.getElementById('finishFlag');
const measure = document.getElementById('measure');
const wpmStat = document.getElementById('wpmStat'), accStat = document.getElementById('accStat'),
      placeStat = document.getElementById('placeStat'), progressFill = document.getElementById('progressFill');
pcar.insertAdjacentHTML('afterbegin', carSVG('#D62828', '#FFD23F', 1));

// ---- geometry (set by layout) ----
let S = 440, LINEH = 30, FS = 17, TRACK = 300, DD = 150, TEXTOFF = 90;
let laneY = [], CARMARGIN = 8, LANE_H = 15;
const NLANES = 4;          // your car + 3 rivals, each its own concentric lane
let _spaceW = 0;
function spaceW() {   // width of one space in the track font, cached (reset in layout)
  if (_spaceW) return _spaceW;
  const s = document.createElement('span'); s.className = 'ch'; s.textContent = ' ';
  s.style.cssText = 'visibility:hidden;position:absolute'; edgeTop.appendChild(s);
  _spaceW = s.offsetWidth || 8; s.remove(); return _spaceW;
}
function layout() {
  _spaceW = 0;
  S = arena.clientWidth || 440;
  FS = Math.round(Math.min(24, Math.max(16, S / 22)));
  LINEH = Math.round(FS * 1.62);
  LANE_H = Math.max(26, Math.round(S / 22));   // lane pitch — must clear the (now larger) cars so they don't stack
  CARMARGIN = 8;
  const gapToText = 6;
  const textTop = CARMARGIN + NLANES * LANE_H + gapToText;
  TEXTOFF = textTop + LINEH / 2;      // border -> centre of a text line
  DD = S / 2 - TEXTOFF;
  TRACK = S - 2 * TEXTOFF;
  laneY = [];                          // distance from the near border to each lane (0 = innermost, by the words)
  for (let k = 0; k < NLANES; k++) laneY[k] = CARMARGIN + (NLANES - 1 - k) * LANE_H + LANE_H / 2;
  arena.style.setProperty('--carmargin', CARMARGIN + 'px');
  arena.style.setProperty('--laneband', (NLANES * LANE_H) + 'px');
  arena.style.setProperty('--track', TRACK + 'px');
  arena.style.setProperty('--lineh', LINEH + 'px');
  arena.style.setProperty('--fs', FS + 'px');
  arena.style.setProperty('--D', DD + 'px');
  measure.style.width = (TRACK - 12) + 'px';
  measure.style.fontSize = FS + 'px';
  measure.style.lineHeight = LINEH + 'px';
}

// ---- state ----
let passage = '', chars = [], passageLen = 0, tail = '';   // tail = trailing punctuation shown but not typed
let lines = [];              // [{start,end}]
let activeLine = 0, topSpans = [];
let index = 0, errors = 0, totalKeystrokes = 0;
let racing = false, armed = false, raceStart = 0, lastFrame = 0, rafId = 0;
let lastPassage = -1;
let bestWpm = loadBest();
let keyTimes = [], combo = 0;
let cars = [], halfPassed = false, lastLeader = '', said85 = false;
let lastCommentaryMsg = '', lastCommentaryTime = 0;

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const randRange = (lo, hi) => lo + Math.random() * (hi - lo);
const shuffle = a => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
function loadBest() { try { return parseInt(localStorage.getItem(BEST_KEY)) || 0; } catch (e) { return 0; } }
function saveBest() { try { localStorage.setItem(BEST_KEY, String(bestWpm)); } catch (e) {} }
function showBest() { document.getElementById('bestBadge').textContent = bestWpm ? `Best: ${bestWpm} WPM` : 'Best: — WPM'; }
function recentWpm() { const now = performance.now(); while (keyTimes.length && now - keyTimes[0] > 2500) keyTimes.shift(); return keyTimes.length * (12 / 2.5); }
function ordinal(n) { const s = ['th', 'st', 'nd', 'rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
// seconds gap: show tenths when it's close (< 10s), whole seconds otherwise
function fmtSecs(sec) { const s = Math.abs(sec); return (s < 10 ? s.toFixed(1) : Math.round(s)) + 's'; }
function pickPassage() { let i; do { i = Math.floor(Math.random() * PASSAGES.length); } while (i === lastPassage && PASSAGES.length > 1); lastPassage = i; return PASSAGES[i]; }

// break the passage into lines that fit one side of the square
function measureLines() {
  measure.innerHTML = '';
  const spans = [];
  chars.forEach(ch => { const s = document.createElement('span'); if (ch === ' ') s.style.whiteSpace = 'normal'; s.textContent = ch; measure.appendChild(s); spans.push(s); });
  lines = [];
  let top = null, start = 0;
  spans.forEach((s, i) => { if (s.offsetTop !== top) { if (top !== null) lines.push({ start, end: i }); top = s.offsetTop; start = i; } });
  lines.push({ start, end: passageLen });
  balanceLastLine();
}

// natural word-wrap can leave a stubby final line (e.g. "should boast"). Pull trailing
// words down from the line above so the finish sits after a fuller line (aim ~4 words),
// as long as the last line still fits one edge (width = the measure box).
let _mw = null;
function measureWidth(str) {
  if (!_mw) { _mw = document.createElement('span');
    _mw.style.cssText = 'position:absolute;left:-99999px;top:0;visibility:hidden;white-space:pre;font-family:var(--font-serif)';
    document.body.appendChild(_mw); }
  _mw.style.fontSize = FS + 'px'; _mw.textContent = str; return _mw.offsetWidth;
}
function balanceLastLine() {
  if (lines.length < 2) return;
  const maxW = measure.clientWidth;
  const wordCount = (a, b) => { const t = passage.slice(a, b).trim(); return t ? t.split(/\s+/).length : 0; };
  let guard = 0;
  while (guard++ < 60) {
    const last = lines[lines.length - 1], prev = lines[lines.length - 2];
    if (wordCount(last.start, last.end) >= 4) break;        // final line is full enough
    let e = last.start;
    while (e > prev.start && passage[e - 1] === ' ') e--;    // step over the boundary space(s)
    let sp = -1;
    for (let i = e - 1; i > prev.start; i--) { if (passage[i] === ' ') { sp = i; break; } }
    if (sp < 0) break;                                       // line above has one word — leave it
    const newStart = sp + 1;                                 // pull that word onto the last line
    if (measureWidth(passage.slice(newStart, last.end)) > maxW) break;   // would overflow the edge
    prev.end = newStart; last.start = newStart;
  }
}
function lineIndexForChar(ch) {
  ch = clamp(ch, 0, passageLen - 1);
  for (let i = 0; i < lines.length; i++) if (ch >= lines[i].start && ch < lines[i].end) return i;
  return lines.length - 1;
}
function lineText(li) { return lines[li] ? passage.slice(lines[li].start, lines[li].end) + (li === lines.length - 1 ? tail : '') : ''; }

// fill the four edges from the window around activeLine
function renderEdges() {
  edgeTop.innerHTML = ''; topSpans = [];
  const ln = lines[activeLine];
  for (let i = ln.start; i < ln.end; i++) {
    const s = document.createElement('span');
    s.className = 'ch' + (chars[i] === ' ' ? ' space' : '') + (i < index ? ' done' : (i === index ? ' current' : ''));
    s.textContent = chars[i];
    edgeTop.appendChild(s); topSpans.push(s);
  }
  // on the final line, show the sentence's trailing punctuation (faint, never typed)
  if (tail && activeLine === lines.length - 1) {
    for (const t of tail) {
      const s = document.createElement('span');
      s.className = 'ch tail' + (t === ' ' ? ' space' : '');
      s.textContent = t;
      edgeTop.appendChild(s); topSpans.push(s);
    }
  }
  edgeRight.textContent = lineText(activeLine + 1);
  edgeBottom.textContent = lineText(activeLine + 2);
  edgeLeft.textContent = lineText(activeLine - 1);
}

// place every car in its lane (just outside the words) from its character progress
function positionCars() {
  const cx = S / 2, cy = S / 2, ln = lines[activeLine], left = cx - TRACK / 2;
  const onLast = (activeLine === lines.length - 1) && topSpans.length > 0;
  // the finish line sits one space past the last letter — the exact x every car stops at.
  // off the last line there's no finish yet, so use the far corner (= a full-track lap).
  const finishX = onLast
    ? left + topSpans[topSpans.length - 1].offsetLeft + topSpans[topSpans.length - 1].offsetWidth + spaceW()
    : cx + TRACK / 2;
  // your car: innermost lane, right above your caret on the top edge
  // (at the finish, sit on the very last span — past the trailing punctuation — so you land on the line)
  const li = (index >= ln.end) ? topSpans.length - 1 : clamp(index - ln.start, 0, topSpans.length - 1);
  const span = topSpans[li];
  let px = left;
  if (span) px += (index >= ln.end ? span.offsetLeft + span.offsetWidth + (onLast ? spaceW() : 0)  // finished → sit on the line
                                    : span.offsetLeft + span.offsetWidth / 2);
  pcar.style.left = px + 'px';
  pcar.style.top = laneY[0] + 'px';
  pcar.style.transform = 'translate(-50%,-50%)';
  cars.forEach(c => {
    const rl = lineIndexForChar(c.chars), rel = rl - activeLine, L = lines[rl];
    const f = L ? clamp((c.chars - L.start) / Math.max(1, L.end - L.start), 0, 1) : 0;
    const yOut = laneY[c.lane], R = S / 2 - yOut;    // this rival's lane
    let x, y, rot, show = true;
    // on the last line the rival converges on finishX (so f=1 lands exactly on the finish line)
    if (rel === 0)      { x = left + f * (finishX - left);         y = yOut;      rot = 0; }
    else if (rel === 1) { x = cx + R;                     y = cy - TRACK / 2 + f * TRACK; rot = 90; }
    else if (rel === 2) { x = cx + TRACK / 2 - f * TRACK; y = S - yOut;  rot = 180; }
    else if (rel === -1){ x = cx - R;                     y = cy + TRACK / 2 - f * TRACK; rot = 270; }
    else show = false;
    c.el.style.display = show ? '' : 'none';
    if (show) { c.el.style.left = x + 'px'; c.el.style.top = y + 'px'; c.el.style.transform = 'translate(-50%,-50%) rotate(' + rot + 'deg)'; }
  });
  // checkered finish line — one space past the last letter, only while on the last line
  if (onLast) {
    finishFlag.style.display = '';
    finishFlag.style.left = finishX + 'px';
    finishFlag.style.top = CARMARGIN + 'px';
    finishFlag.style.height = (TEXTOFF + LINEH / 2 - CARMARGIN) + 'px';
  } else {
    finishFlag.style.display = 'none';
  }
}

function buildOpponents() {
  cars.forEach(c => c.el.remove());
  cars = [];
  OPPONENTS.forEach((o, i) => {
    const el = document.createElement('div'); el.className = 'ecar'; el.innerHTML = carSVG(o.body, o.accent, o.num);
    ring.appendChild(el);
    cars.push({ el, name: o.name, color: o.body, chars: 0, bias: randRange(-2.5, 2.5), targetWpm: 0, locked: false, lane: i + 1, finishTime: 0 });
  });
}

function startRace() {
  if (window.HSGSound) HSGSound.tick();
  const sel = pickPassage();
  // trim trailing punctuation/space so the race ends on the last letter — the final
  // period (or ! ? " …) isn't required; typing the last letter finishes the race.
  // The trimmed punctuation is kept as `tail` and shown (faint) after the last letter.
  passage = sel.text.replace(/[^\p{L}\p{N}]+$/u, ''); chars = passage.split(''); passageLen = chars.length;
  tail = sel.text.slice(passage.length);
  document.getElementById('verseRef').innerHTML = sel.ref +
    '<br><span style="font-size:.72em;letter-spacing:.18em;opacity:.7">KJV</span>';
  index = 0; errors = 0; totalKeystrokes = 0; activeLine = 0;
  racing = false; keyTimes = []; combo = 0;
  halfPassed = false; lastLeader = ''; said85 = false; lastCommentaryMsg = ''; lastCommentaryTime = 0;

  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('raceScreen').classList.remove('hidden');
  document.getElementById('commentary').textContent = '';
  pcar.classList.remove('boost');
  pcar.querySelectorAll('.place-badge').forEach(b => b.remove());
  ring.classList.remove('spin'); ring.style.transform = 'rotate(0deg)';

  layout(); measureLines(); buildOpponents(); renderEdges(); positionCars();
  wpmStat.textContent = '0'; accStat.textContent = '100%'; placeStat.textContent = '—'; progressFill.style.width = '0%';

  // arm: the race begins the moment the player types their first character
  armed = true;
  document.getElementById('typePrompt').classList.remove('hidden');
  if (TOUCH) focusGrab();   // summon the mobile keyboard for this race
}

// called on the first real keystroke — starts the clock and the animation loop
function beginRace() {
  armed = false;
  document.getElementById('typePrompt').classList.add('hidden');
  racing = true; raceStart = performance.now(); lastFrame = raceStart; rafId = requestAnimationFrame(loop);
}

function loop() {
  if (!racing) return;
  const now = performance.now();
  const dt = Math.min((now - lastFrame) / 1000, 0.1); lastFrame = now;
  const pSpeed = Math.max(10, recentWpm());
  cars.forEach(c => {
    let wpm;
    if (c.locked) wpm = c.targetWpm;
    else { const rubber = clamp((index - c.chars) * 0.6, -18, 18); wpm = clamp(pSpeed + c.bias + rubber, 6, pSpeed + 16); }
    c.chars = Math.min(passageLen, c.chars + (wpm * 5 / 60) * dt);
    if (c.chars >= passageLen && !c.finishTime) c.finishTime = now;   // stamp when a rival crosses the line
  });
  positionCars();
  updateStats();
  updateRace();
  rafId = requestAnimationFrame(loop);
}

function updateStats() {
  const mins = Math.max((performance.now() - raceStart) / 60000, 1e-4);
  const wpm = Math.round((Math.max(0, index - 1) / 5) / mins);   // index-1: don't credit the free first char
  wpmStat.textContent = isFinite(wpm) ? wpm : 0;
  accStat.textContent = (totalKeystrokes ? Math.round(index / totalKeystrokes * 100) : 100) + '%';
  progressFill.style.width = Math.round((passageLen ? index / passageLen : 0) * 100) + '%';
  let ahead = 0; cars.forEach(c => { if (c.chars > index) ahead++; });
  placeStat.textContent = ordinal(ahead + 1);
}

function updateRace() {
  const order = [{ you: true, name: 'You', p: index }].concat(cars.map(c => ({ you: false, name: c.name, p: c.chars })));
  order.sort((a, b) => b.p - a.p);
  if (order[0].name !== lastLeader) {
    lastLeader = order[0].name;
    setCommentary(order[0].you ? "🏁 You're in the lead!" : `💨 ${order[0].name} grabs the lead!`, false);
  }
  if (!said85 && index / passageLen >= 0.85) { said85 = true; setCommentary('⚡ Final stretch — floor it!', true); }
}

function setCommentary(msg, force) {
  const now = performance.now();
  if (!force && now - lastCommentaryTime < 1400) return;
  if (msg === lastCommentaryMsg) return;
  lastCommentaryMsg = msg; lastCommentaryTime = now;
  const el = document.getElementById('commentary');
  el.textContent = msg; el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

function handleHalfway() {
  halfPassed = true;
  const mins = Math.max((performance.now() - raceStart) / 60000, 1e-4);
  const playerWpmHalf = (Math.max(0, index - 1) / 5) / mins;   // index-1: the clock started ON the first char
  // Lock the rivals around your first-half pace: one dead-on, one +7, one -7 WPM.
  const deltas = shuffle([0, 7, -7]);
  cars.forEach((c, i) => { c.targetWpm = Math.max(8, playerWpmHalf + (deltas[i] || 0)); c.locked = true; });
}

// finish the top line -> the square swings the next line up from the right to the
// top. We rebuild the edges immediately (so typing never blocks), then run the
// rotation purely as a cosmetic transform: snap forward a quarter-turn and glide back.
function rotateSquare() {
  activeLine = Math.min(activeLine + 1, lines.length - 1);
  renderEdges();
  positionCars();
  if (window.HSGSound) HSGSound.tick();
  ring.classList.remove('spin');
  ring.style.transform = 'rotate(90deg)';
  void ring.offsetWidth;
  ring.classList.add('spin');
  ring.style.transform = 'rotate(0deg)';
}

// Feed one typed character into the race. Shared by the physical keyboard
// (onKeyDown) and the mobile soft keyboard (hidden input's 'input' event).
function feedChar(k) {
  if (!racing) {
    if (!armed) return;      // the first printable char kicks off the race
    beginRace();
  }
  totalKeystrokes++;
  if (k === chars[index]) {
    keyTimes.push(performance.now());
    combo++;
    if (combo >= 12) pcar.classList.add('boost');
    if (combo === 12) { if (window.HSGSound) HSGSound.streak(2); if (window.HSGfx && HSGfx.banner) HSGfx.banner('NITRO! 🔥', '#D62828'); }
    const cur = topSpans[index - lines[activeLine].start];
    if (cur) { cur.classList.remove('current', 'err'); cur.classList.add('done'); }
    index++;
    const nxt = topSpans[index - lines[activeLine].start];
    if (nxt) nxt.classList.add('current');
    positionCars();
    updateStats();
    if (!halfPassed && index >= Math.floor(passageLen / 2)) handleHalfway();
    if (index >= passageLen) finishSequence();
    else if (lineIndexForChar(index) > activeLine) rotateSquare();
  } else {
    errors++;
    if (combo >= 3 && window.HSGSound) HSGSound.wrong();
    combo = 0; pcar.classList.remove('boost');
    const cur = topSpans[index - lines[activeLine].start];
    if (cur) { cur.classList.add('err'); setTimeout(() => cur.classList.remove('err'), 200); }
  }
}

// Desktop physical-keyboard path. On touch devices the hidden input feeds chars instead.
const TOUCH = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
function onKeyDown(e) {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key;
  if (k === 'Backspace' || k === 'Tab') { e.preventDefault(); return; }
  if (k.length !== 1) return;
  if (!racing && !armed) return;
  e.preventDefault();
  if (TOUCH) return;          // mobile: the #typeGrab input's 'input' event handles it
  feedChar(k);
}

function finishSequence() {
  racing = false;
  cancelAnimationFrame(rafId);
  pcar.classList.remove('boost');

  const mins = Math.max((performance.now() - raceStart) / 60000, 1e-4);
  const wpm = Math.round((Math.max(0, passageLen - 1) / 5) / mins);   // index-1: clock started on the first char
  const acc = totalKeystrokes ? Math.round(passageLen / totalKeystrokes * 100) : 100;

  // time gap vs you: negative = they crossed the line before you, positive = seconds behind you
  const nowMs = performance.now();
  const playerSec = (nowMs - raceStart) / 1000;
  const gapFor = c => {
    if (c.finishTime) return (c.finishTime - nowMs) / 1000;          // finished already → ahead of you
    const cps = c.chars / Math.max(playerSec, 1e-4);                  // their average chars/sec so far
    return cps > 0 ? (passageLen - c.chars) / cps : 999;             // project remaining time → behind you
  };
  const mapCar = c => ({ name: c.name, color: c.color, chars: c.chars, you: false, gap: gapFor(c) });
  const you = { name: 'You', color: '#D62828', chars: passageLen, you: true, time: playerSec };
  const ahead = cars.filter(c => c.chars >= passageLen).map(mapCar).sort((a, b) => b.chars - a.chars);
  const behind = cars.filter(c => c.chars < passageLen).map(mapCar).sort((a, b) => b.chars - a.chars);
  const racers = [...ahead, you, ...behind];
  const place = ahead.length + 1;

  const isBest = wpm > bestWpm;
  if (isBest) { bestWpm = wpm; saveBest(); showBest(); }

  positionCars();
  racers.forEach((r, i) => {
    const el = r.you ? pcar : (cars.find(c => c.name === r.name) || {}).el;
    if (!el) return;
    const b = document.createElement('div'); b.className = 'place-badge'; b.textContent = MEDAL[i + 1] || ('#' + (i + 1));
    el.appendChild(b);
  });
  if (place === 1) confettiBurst();
  if (window.HSGSound) HSGSound.finish(place === 1);

  setTimeout(() => {
    showResults(place, racers, wpm, acc, isBest);
    if (window.HSGStreak) HSGStreak.endPanel('#wrBoard', { gameId: 'word-racer', gameName: 'Word Racer', unit: 'wpm', score: wpm, minStreak: 1 });
  }, 1900);
}

function confettiBurst() {
  const wrap = document.createElement('div'); wrap.className = 'wr-confetti';
  const colors = ['#D62828', '#2E6FB7', '#2E8B57', '#7A4FB0', '#FFD23F'];
  for (let i = 0; i < 42; i++) {
    const p = document.createElement('i');
    p.style.left = Math.random() * 100 + 'vw'; p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.1 + Math.random() * 0.9) + 's'; p.style.animationDelay = (Math.random() * 0.3) + 's';
    p.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)'; wrap.appendChild(p);
  }
  document.body.appendChild(wrap); setTimeout(() => wrap.remove(), 2600);
}

function showResults(place, racers, wpm, acc, isBest) {
  document.getElementById('raceScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const medals = { 1: '🥇', 2: '🥈', 3: '🥉', 4: '🏁' };
  document.getElementById('placeEmoji').textContent = medals[place] || '🏁';
  document.getElementById('resultTitle').textContent = place === 1 ? 'You won the race!' : `You finished ${ordinal(place)} of ${racers.length}`;
  document.getElementById('wpmResult').textContent = wpm;
  document.getElementById('wpmResultWrap').classList.toggle('new', isBest);
  document.getElementById('wpmResultWrap').querySelector('span').textContent = isBest ? '🔥 New Best WPM' : 'Your WPM';
  document.getElementById('accResult').textContent = acc + '%';
  const list = document.getElementById('standings'); list.innerHTML = '';
  racers.forEach((r, i) => {
    const row = document.createElement('div'); row.className = 'standing-row' + (r.you ? ' you' : '');
    let gapText;
    if (r.you) gapText = 'your time · ' + fmtSecs(r.time);
    else if (r.gap < 0.05) gapText = fmtSecs(-r.gap) + ' ahead';
    else gapText = fmtSecs(r.gap) + ' behind';
    row.innerHTML = `<span class="pos">${ordinal(i + 1)}</span><span class="car-dot" style="background:${r.color}"></span><span class="who">${r.you ? 'You' : r.name}</span><span class="pct">${gapText}</span>`;
    list.appendChild(row);
  });
}

// Mobile: a hidden input summons the soft keyboard; its 'input' event feeds chars.
const typeGrab = document.getElementById('typeGrab');
function focusGrab() { if (typeGrab) { try { typeGrab.focus({ preventScroll: true }); } catch (e) { typeGrab.focus(); } } }
function focusGame() { if (TOUCH) focusGrab(); }   // tapping the arena re-summons the keyboard
if (typeGrab) {
  typeGrab.addEventListener('input', () => {
    const v = typeGrab.value; typeGrab.value = '';   // read what was typed, then clear so it never accumulates
    for (const ch of v) if (ch.length === 1) feedChar(ch);
  });
}
window.addEventListener('resize', () => { if (lines.length) { layout(); measureLines(); activeLine = Math.min(lineIndexForChar(index), lines.length - 1); renderEdges(); positionCars(); } });
document.addEventListener('keydown', onKeyDown);
showBest();
startRace();   // no intro screen — drop straight into the track, armed and waiting for the first keystroke
</script>

</body>
</html>
