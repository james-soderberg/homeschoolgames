<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element Hunter — HomeschoolGames</title>
  <link rel="stylesheet" href="../../assets/css/site.css">
  <link rel="stylesheet" href="../../assets/css/streak-rail.css">
  <style>
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .eh-page { padding: 1.25rem 1rem 3rem; }
    .eh-header h1 { font-size: 1.8rem; margin: 0 0 0.75rem; }

    /* Filter chips */
    .filter-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .chip {
      padding: 0.32rem 0.8rem; border: 1.5px solid var(--border); border-radius: 99px;
      background: #fff; font-size: 0.8rem; font-weight: 600; font-family: var(--font-sans);
      color: var(--ink-light); cursor: pointer; transition: all 0.12s;
    }
    .chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .chip:hover:not(.active) { border-color: var(--ink-light); color: var(--ink); }

    /* Prompt + score */
    .prompt-box {
      background: white; border: 2px solid var(--border); border-radius: 14px;
      padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem; flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(26,23,20,0.07);
    }
    .prompt-left { flex: 1; min-width: 180px; }
    .prompt-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-light); margin-bottom: 0.25rem;
    }
    .prompt-name { font-family: var(--font-serif); font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 600; line-height: 1.05; }
    .prompt-cat { font-size: 0.8rem; font-weight: 600; color: var(--ink-light); margin-top: 0.15rem; }
    .score-box { display: flex; gap: 1.25rem; }
    .score-item { text-align: center; }
    .score-num { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 600; display: block; line-height: 1; }
    .score-num.found { color: var(--green); }
    .score-num.missed { color: var(--red); }
    .score-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-light); font-weight: 700; }

    .feedback-bar { min-height: 2rem; font-size: 1.02rem; font-weight: 600; margin-bottom: 0.5rem; padding: 0.2rem 0; }

    /* Periodic table */
    .table-scroll { overflow-x: auto; padding-bottom: 0.5rem; }
    .ptable {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      grid-template-rows: repeat(7, 1fr) 0.45fr 1fr 1fr;
      gap: 3px;
      min-width: 660px;
      max-width: 1100px;
    }
    .el-cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(26,23,20,0.18);
      border-radius: 4px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: var(--font-sans);
      padding: 0; overflow: hidden;
      transition: transform 0.08s, box-shadow 0.12s, filter 0.12s;
    }
    .el-cell .el-num { font-size: 0.5rem; line-height: 1; opacity: 0.7; align-self: flex-start; margin: 2px 0 0 3px; }
    .el-cell .el-sym { font-size: clamp(0.6rem, 1.1vw, 1rem); font-weight: 700; color: var(--ink); line-height: 1; }
    .el-cell:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(26,23,20,0.2); z-index: 2; }

    /* category colors */
    .cat-alkali     { background: #FFE0B2; }
    .cat-alkaline   { background: #FFF1C2; }
    .cat-transition { background: #F8D6D6; }
    .cat-post       { background: #D7E3EA; }
    .cat-metalloid  { background: #DCE9C8; }
    .cat-nonmetal   { background: #CBE9D6; }
    .cat-noble      { background: #E2D8F4; }
    .cat-lanthanide { background: #F8D6E6; }
    .cat-actinide   { background: #F4DBC8; }

    /* states */
    .el-cell.found { filter: saturate(0.25) brightness(1.05); opacity: 0.65; }
    .el-cell.found::after {
      content: "✓"; position: absolute; top: 1px; right: 3px; font-size: 0.6rem;
      font-weight: 800; color: var(--gold);
    }
    .el-cell.correct-flash { animation: pop 0.4s ease; box-shadow: 0 0 0 3px var(--green); z-index: 3; }
    .el-cell.wrong-flash  { box-shadow: 0 0 0 3px var(--red); z-index: 3; }
    .el-cell.show-correct { box-shadow: 0 0 0 3px var(--green); z-index: 3; }

    /* f-block marker cells */
    .fblock-marker {
      aspect-ratio: 1/1; border: 1px dashed rgba(26,23,20,0.3); border-radius: 4px;
      display: flex; align-items: center; justify-content: center; font-size: 0.5rem;
      color: var(--ink-light); font-family: var(--font-sans);
    }

    .btn-row { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
    .reset-link {
      background: none; border: none; color: var(--ink-light); font-size: 0.85rem; cursor: pointer;
      font-family: var(--font-sans); text-decoration: underline; padding: 0.3rem 0.5rem;
    }
    .reset-link:hover { color: var(--ink); }

    @media (max-width: 520px) {
      .el-cell .el-num { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../../index.html" class="site-logo">Homeschool<span>Games</span></a>
  <nav class="site-nav">
    <a href="../../subjects/science.html">← Science</a>
  </nav>
</header>

<div class="game-layout game-layout-wide">
<div class="eh-page game-main">

  <div class="eh-header"><h1>Element Hunter</h1></div>

  <div class="filter-row" id="filterRow"></div>

  <div class="prompt-box">
    <div class="prompt-left">
      <div class="prompt-label">Find this element on the table →</div>
      <div class="prompt-name" id="promptName">Loading…</div>
      <div class="prompt-cat" id="promptCat"></div>
    </div>
    <div class="score-box">
      <div class="score-item"><span class="score-num found" id="scoreFound">0</span><span class="score-label">✓ Found</span></div>
      <div class="score-item"><span class="score-num missed" id="scoreMissed">0</span><span class="score-label">✗ Missed</span></div>
    </div>
  </div>

  <div class="feedback-bar" id="feedbackBar"></div>

  <div class="table-scroll">
    <div class="ptable" id="ptable"></div>
  </div>

  <div class="btn-row">
    <button class="reset-link" onclick="resetSet()">Reset this set</button>
  </div>

</div><!-- /.eh-page -->

  <aside class="hsg-rail" id="streakRail"></aside>
</div><!-- /.game-layout -->

<footer class="site-footer">
  <a href="../../index.html">homeschoolgames.app</a>
</footer>

<script src="../../assets/js/streak-rail.js"></script>
<script src="../../assets/js/sfx.js"></script>
<script src="../../assets/js/fx.js"></script>
<script src="../../assets/js/element-data.js"></script>
<script>
// ============================================================
// ELEMENT HUNTER — find the element on a real periodic table.
// Click-the-board + fill-the-set, modeled on Map Quiz.
// ============================================================

const ELS = window.HSG_ELEMENTS;
const byNum = {};
ELS.forEach(e => byNum[e.n] = e);

const CAT_LABEL = {
  alkali: 'Alkali metal', alkaline: 'Alkaline earth metal', transition: 'Transition metal',
  post: 'Post-transition metal', metalloid: 'Metalloid', nonmetal: 'Nonmetal',
  noble: 'Noble gas', lanthanide: 'Lanthanide', actinide: 'Actinide',
};

// Filter sets (the "regions"). match(e) selects the askable targets.
const FILTERS = [
  { key:'common',     label:'Common',           match: e => e.common },
  { key:'all',        label:'All 118',          match: e => true },
  { key:'nonmetal',   label:'Nonmetals',        match: e => e.cat==='nonmetal' },
  { key:'noble',      label:'Noble gases',      match: e => e.cat==='noble' },
  { key:'alkali',     label:'Alkali',           match: e => e.cat==='alkali' },
  { key:'alkaline',   label:'Alkaline earth',   match: e => e.cat==='alkaline' },
  { key:'transition', label:'Transition',       match: e => e.cat==='transition' },
  { key:'post',       label:'Post-transition',  match: e => e.cat==='post' },
  { key:'metalloid',  label:'Metalloids',       match: e => e.cat==='metalloid' },
  { key:'lanthanide', label:'Lanthanides',      match: e => e.cat==='lanthanide' },
  { key:'actinide',   label:'Actinides',        match: e => e.cat==='actinide' },
];

// ---- State ----
let curFilter = FILTERS[0];
let queue = [];
let current = null;            // current target element
let found = new Set();         // atomic numbers found in the active set
let missed = 0, streak = 0, bestStreak = 0;
let waitingForNext = false, advanceTimer = null, setJustFinished = false;

// ---- Persistence (per filter set) ----
function storageKey(k) { return 'hsg-elements-found-' + k; }
function loadFound(k) {
  try { return new Set(JSON.parse(localStorage.getItem(storageKey(k)) || '[]')); }
  catch (e) { return new Set(); }
}
function saveFound() {
  try { localStorage.setItem(storageKey(curFilter.key), JSON.stringify([...found])); }
  catch (e) {}
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setTitle(el, text) {
  if (!el) return;
  el.setAttribute('title', text);
}

// ---- Build the (static) table once ----
function buildTable() {
  const grid = document.getElementById('ptable');
  grid.innerHTML = '';
  // f-block placeholder markers at group 3, periods 6 & 7
  [[3,6,'57–71'],[3,7,'89–103']].forEach(([x,y,txt]) => {
    const m = document.createElement('div');
    m.className = 'fblock-marker';
    m.style.gridColumn = x; m.style.gridRow = y;
    m.textContent = txt;
    grid.appendChild(m);
  });
  ELS.forEach(e => {
    const cell = document.createElement('button');
    cell.className = 'el-cell cat-' + e.cat;
    cell.id = 'el-' + e.n;
    cell.style.gridColumn = e.x;
    cell.style.gridRow = e.y;
    cell.dataset.n = e.n;
    cell.innerHTML = `<span class="el-num">${e.n}</span><span class="el-sym">${e.sym}</span>`;
    cell.addEventListener('click', () => handleClick(e.n));
    grid.appendChild(cell);
  });
}

function buildFilters() {
  const row = document.getElementById('filterRow');
  FILTERS.forEach(f => {
    const b = document.createElement('button');
    b.className = 'chip' + (f.key === curFilter.key ? ' active' : '');
    b.textContent = f.label;
    b.dataset.key = f.key;
    b.onclick = () => { if (f.key === curFilter.key) return; curFilter = f; HSGSound.tick(); startSet(); };
    row.appendChild(b);
  });
}
function syncFilterChips() {
  document.querySelectorAll('#filterRow .chip').forEach(b =>
    b.classList.toggle('active', b.dataset.key === curFilter.key));
}

function activeTargets() { return ELS.filter(curFilter.match); }

function clearCellStates() {
  document.querySelectorAll('.el-cell').forEach(c => {
    c.classList.remove('found', 'correct-flash', 'wrong-flash', 'show-correct');
    c.removeAttribute('title');
  });
}

function markFound(n) {
  const cell = document.getElementById('el-' + n);
  if (cell) { cell.classList.add('found'); setTitle(cell, byNum[n].name); }
}

function startSet() {
  clearTimeout(advanceTimer);
  // switch to this set's own streak board (banks the previous run if it qualifies)
  if (typeof rail !== 'undefined') rail.setLevel(curFilter.key, curFilter.label);
  found = loadFound(curFilter.key);
  missed = 0; streak = 0; bestStreak = 0;
  waitingForNext = false; setJustFinished = false;

  clearCellStates();
  found.forEach(markFound);

  queue = shuffle(activeTargets().filter(e => !found.has(e.n)));
  syncFilterChips();
  updateScore();
  nextQuestion();
}

function resetSet() {
  if (!confirm('Reset your found elements for "' + curFilter.label + '"?')) return;
  try { localStorage.removeItem(storageKey(curFilter.key)); } catch (e) {}
  startSet();
}

function nextQuestion() {
  clearTimeout(advanceTimer);
  waitingForNext = false;
  document.getElementById('feedbackBar').textContent = '';
  document.querySelectorAll('.el-cell').forEach(c =>
    c.classList.remove('correct-flash', 'wrong-flash', 'show-correct'));

  if (queue.length === 0) {
    current = null;
    const total = activeTargets().length;
    document.getElementById('promptName').textContent = 'Set complete! 🎉';
    document.getElementById('promptCat').textContent = '';
    document.getElementById('feedbackBar').innerHTML =
      `<span style="color:var(--green)">🧪 You found all ${total} elements in "${curFilter.label}"!</span>`;
    if (setJustFinished) {
      setJustFinished = false;
      HSGfx.confetti({ count: 90, big: true });
      const banked = bestStreak;
      HSGfx.showSummary({
        title: `${curFilter.label} complete!`,
        correct: total, total: total + missed, best: bestStreak,
        onPlayAgain: () => { try { localStorage.removeItem(storageKey(curFilter.key)); } catch (e) {} startSet(); },
        extraHTML: '<div id="ehBoard" style="text-align:left;margin:0.25rem 0 0.5rem"></div>',
        // bank the streak + show the placement/name entry INLINE in the summary card
        onMount: card => rail.gameOver(banked, card.querySelector('#ehBoard')),
      });
    }
    return;
  }

  current = queue.pop();
  document.getElementById('promptName').textContent = current.name;
  document.getElementById('promptCat').textContent = CAT_LABEL[current.cat] || '';
}

function handleClick(n) {
  if (waitingForNext) { nextQuestion(); return; }
  if (!current) return;
  if (found.has(n)) return;            // already-found cell does nothing

  const fb = document.getElementById('feedbackBar');
  const targetCell = document.getElementById('el-' + current.n);

  if (n === current.n) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    rail.hit();
    HSGSound.correct();
    if (HSGfx.milestone(streak)) HSGSound.streak(streak);
    found.add(current.n);
    saveFound();
    if (found.size === activeTargets().length) setJustFinished = true;
    if (targetCell) { targetCell.classList.add('correct-flash', 'found'); setTitle(targetCell, current.name); }
    fb.innerHTML = `<span style="color:var(--green)">🎉 Yes! ${current.name} (${current.sym}), #${current.n}.</span>`;
    updateScore();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 1100);
  } else {
    missed++;
    streak = 0;
    HSGSound.wrong();
    const clicked = byNum[n];
    fb.innerHTML = `<span style="color:var(--red)">✗ That's ${clicked.name} (${clicked.sym}). ${current.name} is highlighted in green.</span>`;
    if (targetCell) targetCell.classList.add('show-correct');
    const wrongCell = document.getElementById('el-' + n);
    if (wrongCell) { wrongCell.classList.add('wrong-flash'); setTimeout(() => wrongCell.classList.remove('wrong-flash'), 800); }
    // missed — put it back in rotation for another shot
    const at = Math.floor(Math.random() * (queue.length + 1));
    queue.splice(at, 0, current);
    updateScore();
    waitingForNext = true;
    advanceTimer = setTimeout(nextQuestion, 2000);
    rail.broke();   // wrong click snaps the streak — keep hunting, no modal
  }
}

function updateScore() {
  document.getElementById('scoreFound').textContent = `${found.size} / ${activeTargets().length}`;
  document.getElementById('scoreMissed').textContent = missed;
}

document.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && waitingForNext) { e.preventDefault(); nextQuestion(); }
});

const rail = HSGStreak.init({
  gameId: 'element-hunter', gameName: 'Element Hunter', minStreak: 1,
  mount: document.getElementById('streakRail')
});

buildTable();
buildFilters();
startSet();
</script>

</body>
</html>
