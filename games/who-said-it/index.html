<script>
// ============================================================
// WHO SAID IT? - read a famous quote, see the real person, and
// pick who said it. Each correct guess fills a slot on the Wall
// of Fame; fill the whole wall to win. Questions are drawn from
// a 250-person bank, so no single game uses them all.
// ============================================================
const WALL_SIZE = 24;          // slots to fill to win (kept small, not all 250)
const KEYS = ['A','B','C','D'];
const DELAY_OK = 1700, DELAY_NO = 2600;   // win-screen pacing (auto path below)
// Auto-advance pacing - long enough to read the speaker's bio before moving on.
const AUTO_OK = 3500, AUTO_NO = 4500;
let autoAdvance = false;
try { autoAdvance = localStorage.getItem('wsi_autoadvance') === '1'; } catch(e){}

function slug(n){ return n.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function imgFor(p){ return '../../assets/img/whosaidit/' + slug(p.n) + '.jpg'; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

const PEOPLE = WSI_PEOPLE.slice();
const brokenImg = new Set();   // people whose portrait failed to load - never used as the answer
let answerPool = shuffle(PEOPLE);   // order to draw answers from
let collected = [];            // people filling the wall this game (in order)
const collectedNames = new Set();
let answered = false, current = null, advanceTimer = null;
// The game is a fixed run of WALL_SIZE (24) questions. Score = correct - hints,
// so a flawless 24/24 with no hints is the best possible (24). A miss or a hint
// each costs a point.
let roundIndex = 0;          // questions asked so far (0..WALL_SIZE)
let correctCount = 0;        // correct answers (portraits earned)
let hintCount = 0;           // hints revealed across the run (each costs a point)
let hintThisRound = false;   // whether the current question's hint was revealed

// ---- preload the portrait, skipping any that 404 ----
function loadPortrait(p){
  return new Promise(resolve=>{
    const im = new Image();
    im.onload = ()=>resolve(true);
    im.onerror = ()=>{ brokenImg.add(p.n); resolve(false); };
    im.src = imgFor(p);
  });
}

// ---- pick the next answer: someone not yet on the wall, with a working portrait ----
async function pickAnswer(){
  for(let guard=0; guard<PEOPLE.length+5; guard++){
    if(answerPool.length===0) answerPool = shuffle(PEOPLE.filter(p=>!collectedNames.has(p.n) && !brokenImg.has(p.n)));
    if(answerPool.length===0) answerPool = shuffle(PEOPLE.filter(p=>!brokenImg.has(p.n)));
    const cand = answerPool.pop();
    if(!cand || collectedNames.has(cand.n) || brokenImg.has(cand.n)) continue;
    if(await loadPortrait(cand)) return cand;
  }
  return PEOPLE.find(p=>!brokenImg.has(p.n)) || PEOPLE[0];
}

// 4 names: the speaker + 3 plausible distractors - all the SAME gender as the
// speaker (the portrait gives that away) and from the SAME period, so you can't
// win by simple elimination. Ranking = year distance, with a big discount for
// sharing the speaker's era label, so contemporaries surface first. We pick 3 of
// the closest 8 (shuffled) so every wrong answer "could have said it" but the
// set still varies run to run.
function buildOptions(ans){
  const sameG = PEOPLE.filter(p=>p.n!==ans.n && p.g===ans.g);
  const base = sameG.length>=6 ? sameG : PEOPLE.filter(p=>p.n!==ans.n);
  const score = p => Math.abs(p.y-ans.y) - (p.e===ans.e ? 400 : 0);   // same era ⇒ treated as 400 yrs closer
  const near = base.slice().sort((a,b)=>score(a)-score(b)).slice(0, 8);
  const pool = shuffle(near).slice(0,3).map(p=>p.n);
  while(pool.length<3){ const r=base[Math.floor(Math.random()*base.length)].n; if(!pool.includes(r)) pool.push(r); }
  return shuffle([ans.n, ...pool]);
}

// ---------- Wall of Fame ----------
function buildWall(){
  const grid = document.getElementById('wallGrid');
  let html='';
  for(let i=0;i<WALL_SIZE;i++){
    const p = collected[i];
    html += '<div class="wall-cell'+(p?'':' locked')+'">'+
      '<div class="wall-pic">'+(p?'<img src="'+imgFor(p)+'" alt="'+p.n+'">':'')+'</div>'+
      '<div class="wall-nm">'+(p?p.n:'')+'</div></div>';
  }
  grid.innerHTML = html;
  document.getElementById('wallGoal').textContent = WALL_SIZE;
  document.getElementById('wallTotal').textContent = WALL_SIZE;
  updateWallCount();
}
function updateWallCount(){
  document.getElementById('wallCount').textContent = correctCount;
  document.getElementById('wallStat').textContent = correctCount;
  document.getElementById('wallBar').style.width = (roundIndex/WALL_SIZE*100)+'%';
  const left = WALL_SIZE - roundIndex;
  const note = document.getElementById('wallNote');
  if(roundIndex===0) note.textContent='Name the speaker to earn their portrait.';
  else if(left<=0) note.textContent='🏛️ Game complete!';
  else note.textContent = left + ' question' + (left>1?'s':'') + ' to go.';
}
// Fill the cell for the round just played: their portrait if correct, a red mark if not.
function markCell(idx, p, correct){
  const cell = document.querySelectorAll('.wall-cell')[idx];
  if(!cell) return;
  cell.classList.remove('locked');
  if(correct){
    collected.push(p);
    cell.querySelector('.wall-pic').innerHTML = '<img src="'+imgFor(p)+'" alt="'+p.n+'">';
    cell.querySelector('.wall-nm').textContent = p.n;
    cell.classList.add('justwon'); setTimeout(()=>cell.classList.remove('justwon'),700);
  } else {
    cell.classList.add('missed');
  }
  updateWallCount();
}

// ---------- round flow ----------
async function nextCard(){
  clearTimeout(advanceTimer);
  answered = false;
  hintThisRound = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('revealLine').innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('portraitWrap').className = 'portrait-wrap';

  current = await pickAnswer();
  document.getElementById('portrait').src = imgFor(current);
  document.getElementById('quoteText').textContent = current.q;
  const blurb = document.getElementById('quoteBlurb');
  blurb.textContent = current.b; blurb.hidden = true;          // hidden until the hint is revealed
  document.getElementById('hintBtn').hidden = false;

  const options = buildOptions(current);
  const grid = document.getElementById('optionGrid');
  grid.innerHTML = '';
  options.forEach((who,i)=>{
    const btn = document.createElement('button');
    btn.className='option-btn'; btn.dataset.idx=i; btn.dataset.who=who;
    btn.innerHTML='<span class="key-hint">'+KEYS[i]+'</span><span></span>';
    btn.lastChild.textContent = who;
    btn.addEventListener('click', ()=>handleAnswer(who, btn));
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen, btn){
  if(answered) return; answered = true;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  const correct = chosen === current.n;
  collectedNames.add(current.n);          // never ask this person again this run
  if(correct) correctCount++;
  markCell(roundIndex, current, correct);
  roundIndex++;

  if(correct){
    btn.classList.add('correct');
    if(window.HSGSound) HSGSound.correct();
    document.getElementById('portraitWrap').classList.add('win');
    document.getElementById('feedback').innerHTML = '<span style="color:var(--green)">✓ Correct!</span>';
    if(window.HSGfx && HSGfx.confetti) HSGfx.confetti({count:18});
  } else {
    if(window.HSGSound) HSGSound.wrong();
    btn.classList.add('wrong');
    btns.forEach(b=>{ if(b.dataset.who===current.n) b.classList.add('reveal-correct'); });
    document.getElementById('portraitWrap').classList.add('miss');
    document.getElementById('feedback').innerHTML = '<span style="color:var(--red)">✗ Not quite</span>';
  }
  document.getElementById('revealLine').innerHTML = 'It was <b>'+current.n+'</b> · '+current.e;

  // a sentence about the speaker, shown right or wrong, where the clue sits
  const bio = (window.WSI_BIOS && WSI_BIOS[current.n]) || current.b;
  const blurb = document.getElementById('quoteBlurb');
  blurb.textContent = bio; blurb.hidden = false;
  document.getElementById('hintBtn').hidden = true;   // the hint is moot once answered

  if(roundIndex >= WALL_SIZE){ setTimeout(endGame, DELAY_OK); return; }

  const nb = document.getElementById('nextBtn');
  nb.style.display='inline-block';
  // Only move on by itself when auto-advance is on; otherwise wait for the click.
  if(autoAdvance){
    advanceTimer = setTimeout(()=>{ if(answered) nextCard(); }, correct?AUTO_OK:AUTO_NO);
  }
}

function endGame(){
  // Final score = correct answers minus hints used; a flawless 24/24 with no hints is 24.
  const score = Math.max(0, correctCount - hintCount);
  const hinted = hintCount > 0;
  const perfect = score >= WALL_SIZE;
  const panel = { gameId:'who-said-it', gameName:'Who Said It?', level:'best', levelName:'Best Score',
                  minStreak:1, unit:'wall24', score:score, hinted:hinted,
                  onSaved:()=>renderSideBoard() };   // reflect the new score in the left board
  if(window.HSGfx && HSGfx.showSummary){
    HSGfx.showSummary({
      title: perfect ? '🏛️ Perfect wall! '+WALL_SIZE+' / '+WALL_SIZE : '🏛️ Wall of Fame complete!',
      correct:score, total:WALL_SIZE,
      stats:[ {num:score, label:'Score / '+WALL_SIZE, cls:'best'},
              {num:correctCount, label:'Correct'},
              {num:hintCount, label:'Hints used'} ],
      onPlayAgain:resetGame,
      extraHTML:'<div id="wsiBoard" style="text-align:left;margin:0.25rem 0 0.5rem"></div>',
      onMount:()=>{ if(window.HSGStreak) HSGStreak.endPanel('#wsiBoard', panel); } });
  } else { resetGame(); }
}
function resetGame(){
  collected = []; collectedNames.clear();
  roundIndex = 0; correctCount = 0; hintCount = 0; hintThisRound = false;
  answerPool = shuffle(PEOPLE.filter(p=>!brokenImg.has(p.n)));
  buildWall(); nextCard();
}

document.getElementById('hintBtn').addEventListener('click', ()=>{
  document.getElementById('quoteBlurb').hidden = false;
  document.getElementById('hintBtn').hidden = true;
  if(!hintThisRound){ hintThisRound = true; hintCount++; }   // each hint costs a point
});
document.getElementById('nextBtn').addEventListener('click', ()=>{ if(answered) nextCard(); });
document.addEventListener('keydown', e=>{
  if((e.key==='Enter'||e.key===' ') && answered){ e.preventDefault(); nextCard(); return; }
  if(answered) return;
  const i=['a','b','c','d'].indexOf(e.key.toLowerCase());
  if(i<0) return;
  const b=document.querySelector('.option-btn[data-idx="'+i+'"]');
  if(b && !b.disabled) b.click();
});

// ---- auto-advance toggle (persisted) ----
const autoToggle = document.getElementById('autoToggle');
function renderAutoToggle(){
  autoToggle.setAttribute('aria-checked', autoAdvance ? 'true' : 'false');
  document.getElementById('autoLabel').textContent = 'Auto-advance: ' + (autoAdvance ? 'On' : 'Off');
}
autoToggle.addEventListener('click', ()=>{
  autoAdvance = !autoAdvance;
  try { localStorage.setItem('wsi_autoadvance', autoAdvance ? '1' : '0'); } catch(e){}
  renderAutoToggle();
  if(window.HSGSound) HSGSound.tick();
  if(autoAdvance && answered){            // already on a result → start the countdown now
    clearTimeout(advanceTimer);
    advanceTimer = setTimeout(()=>{ if(answered) nextCard(); }, AUTO_OK);
  } else if(!autoAdvance){
    clearTimeout(advanceTimer);           // turning it off cancels any pending jump
  }
});
renderAutoToggle();

// ---- quit / leave: only a finished game (all 24) makes the leaderboard, so quitting
// early just leaves without recording a partial score. ----
let leaving = false;
function leaveGame(dest){
  if(leaving) return; leaving = true;
  clearTimeout(advanceTimer); answered = true;        // freeze the current round
  if(dest) window.location.href = dest;
}
document.getElementById('quitBtn').addEventListener('click', ()=> leaveGame('../../index.html'));
const allGamesLink = document.getElementById('allGamesLink');
if(allGamesLink) allGamesLink.addEventListener('click', (e)=>{ e.preventDefault(); leaveGame(allGamesLink.href); });

// The Wall of Fame leaderboard stays visible on the left the whole time.
function renderSideBoard(){
  if(window.HSGStreak && HSGStreak.renderBoardInto){
    HSGStreak.renderBoardInto('#wsiSideBoard', { gameId:'who-said-it', level:'best', unit:'wall24', minStreak:1 });
  }
}

renderSideBoard();
buildWall();
nextCard();
</script>
