<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#C4A040">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Page not found | Accidental Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap">
<style>
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:'Outfit',system-ui,sans-serif;color:#2b2922;background:#c79a5b;
    background-image:radial-gradient(rgba(90,60,25,.22) 1.3px,transparent 1.4px),radial-gradient(rgba(120,85,40,.16) 1.2px,transparent 1.3px);
    background-size:9px 9px,13px 13px;background-position:0 0,4px 6px;text-align:center;padding:2rem;}
  .card{background:#fffdf5;padding:2.2rem 2.4rem;max-width:460px;transform:rotate(-1.2deg);
    box-shadow:0 8px 18px rgba(40,25,5,.3);position:relative;}
  .card::before{content:'';position:absolute;top:-9px;left:50%;width:16px;height:16px;border-radius:50%;
    transform:translateX(-50%);background:radial-gradient(circle at 35% 30%,#666,#0a0a0a);box-shadow:0 2px 4px rgba(0,0,0,.4);}
  h1{font-weight:800;font-size:2.4rem;margin:.2rem 0 .4rem;letter-spacing:-.02em;}
  h1 span{color:#d98324;}
  p{color:#7a7363;font-weight:600;margin:.4rem 0 1.4rem;line-height:1.5;}
  a.home{display:inline-block;background:#d98324;color:#fffdf6;text-decoration:none;font-weight:800;
    padding:.7rem 1.4rem;border-radius:8px;box-shadow:0 4px 10px rgba(40,25,5,.3);}
  a.home:hover{background:#c2731d;}
</style>
</head>
<body>
  <div class="card">
    <h1>Page <span>not found</span></h1>
    <p>That page wandered off. Let's get you back to the games.</p>
    <a class="home" href="/">← Back to Accidental Learning</a>
  </div>
</body>
</html>
