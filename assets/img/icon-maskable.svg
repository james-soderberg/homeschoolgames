<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HomeschoolGames">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8B863"/>
      <stop offset="1" stop-color="#B58C2C"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (maskable: platform applies its own shape mask) -->
  <rect width="64" height="64" fill="url(#tile)"/>
  <!-- controller shrunk into the central 80% safe zone and vertically centered -->
  <g transform="translate(32 32) scale(0.78) translate(-32 -34)">
    <rect x="9" y="21" width="46" height="26" rx="13" fill="#F7F3EC"/>
    <rect x="9" y="21" width="46" height="10" rx="10" fill="#ffffff" opacity="0.45"/>
    <g fill="#1A1714">
      <rect x="18" y="27" width="6" height="14" rx="1.6"/>
      <rect x="14" y="31" width="14" height="6" rx="1.6"/>
    </g>
    <circle cx="44" cy="30" r="4" fill="#8B2020"/>
    <circle cx="49.5" cy="37.5" r="4" fill="#2A5C3F"/>
  </g>
</svg>
