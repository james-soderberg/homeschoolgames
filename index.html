<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeschoolGames — Learn by Playing</title>
  <link rel="stylesheet" href="assets/css/site.css">
  <style>
    .games-section {
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    .games-heading {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .games-heading h1 {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      line-height: 1.05;
      margin: 0 0 0.5rem;
    }
    .games-heading h1 .pop {
      background: linear-gradient(90deg, #E0853B, var(--gold) 45%, #7A9C5C 90%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .games-heading p {
      color: var(--ink-light);
      font-size: clamp(1rem, 2.6vw, 1.2rem);
    }

    /* "All Games" call-to-action */
    .home-toolbar {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .all-games-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gold);
      color: var(--ink);
      border-radius: 99px;
      padding: 0.7rem 1.6rem;
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      box-shadow: 0 5px 0 #a07f2c, 0 8px 16px rgba(196,160,64,0.35);
      transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
    }
    .all-games-btn:hover { background: #d0ab48; text-decoration: none; color: var(--ink); }
    .all-games-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #a07f2c, 0 3px 8px rgba(196,160,64,0.35); }

    /* small "N games" line under each subject name */
    .tile-count {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-light);
      opacity: 0.75;
    }

    @media (max-width: 600px) {
      .games-section { padding: 2.5rem 1rem 3rem; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-logo">Homeschool<span>Games</span></a>
  </header>

  <section class="games-section">
    <div class="games-heading">
      <h1>Homeschool <span class="pop">Games</span></h1>
      <p>Pick a subject, press play, and learn something cool — no sign-in, no ads.</p>
    </div>

    <div class="home-toolbar">
      <a href="all-games.html" class="all-games-btn">All Games <span aria-hidden="true">▸</span></a>
    </div>

    <div class="game-grid">

      <a href="subjects/history.html" class="game-tile">
        <span class="tile-icon">🏛️</span>
        <span class="tile-name">History</span>
        <span class="tile-count">2 games</span>
      </a>

      <a href="subjects/math.html" class="game-tile">
        <span class="tile-icon">✖️</span>
        <span class="tile-name">Math</span>
        <span class="tile-count">1 game</span>
      </a>

      <a href="subjects/science.html" class="game-tile">
        <span class="tile-icon">🧪</span>
        <span class="tile-name">Science</span>
        <span class="tile-count">1 game</span>
      </a>

      <a href="subjects/geography.html" class="game-tile">
        <span class="tile-icon">🗺️</span>
        <span class="tile-name">Geography</span>
        <span class="tile-count">2 games</span>
      </a>

      <a href="subjects/typing.html" class="game-tile">
        <span class="tile-icon">⌨️</span>
        <span class="tile-name">Typing</span>
        <span class="tile-count">2 games</span>
      </a>

      <a href="subjects/spelling.html" class="game-tile">
        <span class="tile-icon">🔤</span>
        <span class="tile-name">Spelling</span>
        <span class="tile-count">1 game</span>
      </a>

      <a href="subjects/bible.html" class="game-tile">
        <span class="tile-icon">📖</span>
        <span class="tile-name">Bible</span>
        <span class="tile-count">1 game</span>
      </a>

    </div>
  </section>

  <footer class="site-footer">
    homeschoolgames.app
  </footer>

</body>
</html>
