<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeschoolGames · Learn by Playing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Outfit',system-ui,sans-serif;color:#2b2922;
    background:#c79a5b;
    background-image:radial-gradient(rgba(90,60,25,.22) 1.3px,transparent 1.4px),radial-gradient(rgba(120,85,40,.16) 1.2px,transparent 1.3px);
    background-size:9px 9px,13px 13px;background-position:0 0,4px 6px;}
  .wrap{max-width:1180px;margin:0 auto;padding:2.6rem 1.5rem 4rem;}

  .banner{margin:0 auto 2.8rem;max-width:560px;background:#fffdf5;padding:1.2rem 1.5rem;text-align:center;
    transform:rotate(-1.2deg);box-shadow:0 8px 18px rgba(40,25,5,.3);position:relative;}
  .banner::before{content:'';position:absolute;top:-9px;left:50%;width:16px;height:16px;border-radius:50%;
    transform:translateX(-50%);background:radial-gradient(circle at 35% 30%,#666,#0a0a0a);box-shadow:0 2px 4px rgba(0,0,0,.4);}
  .banner h1{font-weight:800;font-size:clamp(2.1rem,6.2vw,3.3rem);margin:.1rem 0;letter-spacing:-.02em;line-height:1;}
  .banner h1 span{color:#d98324;}
  .banner p{margin:.5rem 0 0;color:#7a7363;font-weight:600;font-size:1rem;}

  .grid{display:flex;flex-wrap:wrap;justify-content:center;gap:2.6rem 1.9rem;}
  .pin{width:224px;flex:0 0 auto;background:#fffdf6;padding:12px 12px 0;position:relative;text-decoration:none;color:inherit;
    box-shadow:0 9px 18px rgba(40,25,5,.32);transition:transform .16s,box-shadow .16s;}
  .pin:nth-child(4n){transform:rotate(2deg);}   .pin:nth-child(4n+1){transform:rotate(-1.7deg);}
  .pin:nth-child(4n+2){transform:rotate(1.1deg);}.pin:nth-child(4n+3){transform:rotate(-2.3deg);}
  .pin:hover,.pin:focus-visible{transform:rotate(0) translateY(-6px) scale(1.03);box-shadow:0 18px 30px rgba(40,25,5,.4);z-index:5;outline:none;}
  /* push-pin */
  .pin::before{content:'';position:absolute;top:-10px;left:50%;width:15px;height:15px;border-radius:50%;z-index:2;
    transform:translateX(-50%);background:radial-gradient(circle at 35% 30%,#666,#0a0a0a);box-shadow:0 2px 4px rgba(0,0,0,.4);}
  .pin .pic{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#eee;filter:saturate(.98);}
  .pin .cap{font-weight:800;font-size:1.3rem;text-align:center;padding:.55rem 0 .1rem;line-height:1.05;letter-spacing:-.01em;}
  .pin .sub{font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;text-align:center;color:#a59a83;padding-bottom:.85rem;}
  .pin .badge{position:absolute;top:-11px;left:-8px;z-index:3;background:#d98324;color:#fffdf6;font-weight:800;
    font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;padding:.22rem .5rem;border-radius:3px;
    box-shadow:0 2px 6px rgba(40,25,5,.4);transform:rotate(-3deg);white-space:nowrap;}

  .foot{text-align:center;margin-top:3rem;color:#6c5836;font-weight:600;font-size:.95rem;}
  .foot a{color:#6c5836;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="banner">
      <h1>Homeschool<span>Games</span></h1>
    </div>
    <div class="grid" id="board"></div>
    <div class="foot">homeschoolgames.app · made for curious kids</div>
  </div>
<script src="assets/js/home-games.js"></script>
<script>
  const board=document.getElementById('board');
  GAMES.forEach(g=>{
    const a=document.createElement('a'); a.href=g.href; a.className='pin';
    a.innerHTML=`${g.badge?`<div class="badge">${g.badge}</div>`:''}<img class="pic" src="${g.photo}" alt="${g.name}" loading="lazy">
      <div class="cap">${g.name}</div><div class="sub">${g.subject}</div>`;
    board.appendChild(a);
  });

  // Secret game: type "secret game" anywhere on the home page to unlock it.
  (function(){
    const CODE='secretgame'; let buf='';
    document.addEventListener('keydown',e=>{
      if(e.key&&e.key.length===1&&/[a-zA-Z ]/.test(e.key)){
        buf=(buf+e.key.toLowerCase()).replace(/[^a-z]/g,'').slice(-CODE.length);
        if(buf===CODE) location.href='games/secret-flap/index.html';
      }
    });
  })();
</script>
</body>
</html>
