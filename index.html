<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeschoolGames — Learn by Playing</title>
  <link rel="stylesheet" href="assets/css/site.css">
  <style>
    /* ============ Playful intro splash ============ */
    .splash {
      position: relative;
      min-height: calc(100vh - 58px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* soft floating colour blobs in the background */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.5;
      z-index: 0;
      animation: drift 14s ease-in-out infinite;
    }
    .blob-1 { width: 220px; height: 220px; background: #D4EEF5; top: 8%;  left: 6%;  animation-delay: 0s; }
    .blob-2 { width: 180px; height: 180px; background: #FFE3C2; top: 12%; right: 8%; animation-delay: -3s; }
    .blob-3 { width: 240px; height: 240px; background: #E4DAF2; bottom: 6%; left: 12%; animation-delay: -6s; }
    .blob-4 { width: 160px; height: 160px; background: #DDF1E2; bottom: 12%; right: 10%; animation-delay: -9s; }

    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(20px,-26px) scale(1.08); }
      66%     { transform: translate(-18px,16px) scale(0.95); }
    }

    /* floating subject emoji scattered around */
    .floatie {
      position: absolute;
      font-size: 2.4rem;
      z-index: 1;
      opacity: 0.9;
      animation: bob 5s ease-in-out infinite;
      filter: drop-shadow(0 4px 6px rgba(26,23,20,0.12));
    }
    .floatie:nth-child(odd) { animation-duration: 6.5s; }
    .f1 { top: 16%; left: 14%; animation-delay: -0.5s; }
    .f2 { top: 22%; right: 16%; animation-delay: -1.5s; }
    .f3 { bottom: 24%; left: 18%; animation-delay: -2.5s; }
    .f4 { bottom: 20%; right: 14%; animation-delay: -3.5s; }
    .f5 { top: 46%; left: 7%;  animation-delay: -1s; }
    .f6 { top: 50%; right: 7%; animation-delay: -2s; }

    @keyframes bob {
      0%,100% { transform: translateY(0) rotate(-6deg); }
      50%     { transform: translateY(-16px) rotate(6deg); }
    }

    /* central mascot: a globe with orbiting subject icons */
    .mascot {
      position: relative;
      width: 250px;
      height: 250px;
      margin-bottom: 1.5rem;
      z-index: 2;
      animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }
    .mascot .core {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff7e0, var(--gold-light) 55%, #e7b94e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      box-shadow: 0 10px 30px rgba(196,160,64,0.35);
      animation: floaty 4s ease-in-out infinite;
    }
    .orbit {
      position: absolute;
      inset: 0;
      animation: spin 18s linear infinite;
    }
    .orbit.reverse { animation-direction: reverse; animation-duration: 24s; }
    .orbit .chip {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      border: 2.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 4px 10px rgba(26,23,20,0.12);
      animation: counterspin 18s linear infinite;
    }
    .orbit.reverse .chip { animation: counterspin-rev 24s linear infinite; }
    .orbit .chip.b { top: auto; bottom: -6px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes counterspin { to { transform: translateX(-50%) rotate(-360deg); } }
    @keyframes counterspin-rev { to { transform: translateX(-50%) rotate(360deg); } }
    @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }

    .splash-title {
      position: relative;
      z-index: 2;
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: clamp(2.8rem, 9vw, 5rem);
      line-height: 1.05;
      margin: 0 0 0.6rem;
      animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both;
    }
    .splash-title .pop {
      background: linear-gradient(90deg, #E0853B, var(--gold) 45%, #7A9C5C 90%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .splash-tagline {
      position: relative;
      z-index: 2;
      font-size: clamp(1.05rem, 3vw, 1.4rem);
      color: var(--ink-light);
      margin: 0 0 2rem;
      max-width: 30ch;
      animation: popIn 0.6s ease 0.25s both;
    }

    .start-btn {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: 99px;
      padding: 1.1rem 2.6rem;
      font-family: var(--font-sans);
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 0 #a07f2c, 0 12px 22px rgba(196,160,64,0.4);
      transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
      animation: popIn 0.6s ease 0.4s both, pulse 2.2s ease-in-out 1.4s infinite;
    }
    .start-btn:hover { background: #d0ab48; }
    .start-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #a07f2c, 0 4px 12px rgba(196,160,64,0.4); }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.05); }
    }

    .scroll-cue {
      position: absolute;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 1.6rem;
      color: var(--gold);
      animation: bounceDown 1.6s ease-in-out infinite;
      cursor: pointer;
      line-height: 1;
    }
    @keyframes bounceDown {
      0%,100% { transform: translate(-50%, 0); }
      50%     { transform: translate(-50%, 8px); }
    }

    /* ============ Games section ============ */
    .games-section {
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    .games-heading {
      text-align: center;
      margin-bottom: 2rem;
    }
    .games-heading h2 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin-bottom: 0.4rem;
    }
    .games-heading p {
      color: var(--ink-light);
    }

    .game-grid {
      display: grid;
      /* fixed 3-up grid; tiles wrap row by row */
      grid-template-columns: repeat(3, 1fr);
      gap: 1.75rem;
      max-width: 760px;
      margin: 0 auto;
    }

    @media (max-width: 760px) {
      .game-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px) {
      .game-grid { grid-template-columns: 1fr; }
    }

    /* floating, tap-me tiles — just an icon and a name */
    .game-tile {
      position: relative;
      border-radius: 22px;
      padding: 2.5rem 1.25rem;
      text-decoration: none;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      border: 2.5px solid rgba(26,23,20,0.06);
      box-shadow: 0 12px 24px rgba(26,23,20,0.10);
      animation: float 4.5s ease-in-out infinite;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }
    .game-tile:hover,
    .game-tile:focus-visible {
      transform: translateY(-10px) scale(1.04);
      box-shadow: 0 22px 38px rgba(26,23,20,0.20);
      border-color: var(--gold);
      color: var(--ink);
      text-decoration: none;
      animation-play-state: paused;
      outline: none;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-10px); }
    }

    .tile-icon {
      font-size: 4.8rem;
      line-height: 1;
      filter: drop-shadow(0 5px 6px rgba(26,23,20,0.15));
      transition: transform 0.2s;
    }
    .game-tile:hover .tile-icon { transform: scale(1.14) rotate(8deg); }

    .tile-name {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 1.55rem;
      text-align: center;
    }

    /* staggered float + soft subject colours */
    .game-tile:nth-child(1) { animation-delay:  0s;   background: #FFF6DD; }
    .game-tile:nth-child(2) { animation-delay: -0.6s; background: #E1F2F7; }
    .game-tile:nth-child(3) { animation-delay: -1.2s; background: #E7F4EC; }
    .game-tile:nth-child(4) { animation-delay: -1.8s; background: #EEE6F8; }
    .game-tile:nth-child(5) { animation-delay: -2.4s; background: #E1F2F7; }
    .game-tile:nth-child(6) { animation-delay: -3.0s; background: #FFF6DD; }
    .game-tile:nth-child(7) { animation-delay: -3.6s; background: #F3E2E2; }

    /* featured "Most Popular" tile */
    .game-tile--featured {
      border-color: var(--gold) !important;
      box-shadow: 0 12px 30px rgba(196,160,64,0.30);
    }
    .popular-badge {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(95deg, #E0531B, #E0A53B);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.64rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 0.34rem 0.85rem;
      border-radius: 99px;
      white-space: nowrap;
      box-shadow: 0 5px 14px rgba(224,83,27,0.45);
      animation: popPulse 1.8s ease-in-out infinite;
      z-index: 3;
    }
    @keyframes popPulse {
      0%,100% { transform: translateX(-50%) scale(1); }
      50%     { transform: translateX(-50%) scale(1.09); }
    }

    /* "New" tile badge */
    .new-badge {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(95deg, #2E8FE0, #7A9C5C);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.64rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 0.34rem 0.85rem;
      border-radius: 99px;
      white-space: nowrap;
      box-shadow: 0 5px 14px rgba(46,143,224,0.45);
      animation: popPulse 1.8s ease-in-out infinite;
      z-index: 3;
    }
    .game-tile--new {
      border-color: #2E8FE0 !important;
      box-shadow: 0 12px 30px rgba(46,143,224,0.25);
    }

    @media (max-width: 600px) {
      .games-section { padding: 2.5rem 1rem 3rem; }
      .game-grid { gap: 1rem; }
      .floatie { font-size: 1.8rem; }
      .mascot { width: 210px; height: 210px; }
    }

    /* Be kind to motion-sensitive kids */
    @media (prefers-reduced-motion: reduce) {
      .blob, .floatie, .orbit, .core, .start-btn, .scroll-cue, .game-tile, .popular-badge { animation: none !important; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-logo">Homeschool<span>Games</span></a>
  </header>

  <!-- ============ Fun intro splash ============ -->
  <section class="splash">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <span class="floatie f1">📚</span>
    <span class="floatie f2">⭐</span>
    <span class="floatie f3">🔢</span>
    <span class="floatie f4">🗺️</span>
    <span class="floatie f5">✏️</span>
    <span class="floatie f6">🎨</span>

    <div class="mascot">
      <div class="core">🌍</div>
      <div class="orbit">
        <div class="chip">📖</div>
        <div class="chip b">➕</div>
      </div>
      <div class="orbit reverse">
        <div class="chip">🚩</div>
        <div class="chip b">🎙️</div>
      </div>
    </div>

    <h1 class="splash-title">Homeschool <span class="pop">Games</span></h1>
    <p class="splash-tagline">Pick a game, press play, and learn something cool!</p>
    <button class="start-btn" onclick="document.getElementById('games').scrollIntoView({behavior:'smooth'})">
      Let's Play! <span aria-hidden="true">▸</span>
    </button>

    <span class="scroll-cue" onclick="document.getElementById('games').scrollIntoView({behavior:'smooth'})" aria-hidden="true">⌄</span>
  </section>

  <!-- ============ Games ============ -->
  <section class="games-section" id="games">
    <div class="games-heading">
      <h2>Choose Your Game</h2>
      <p>No sign-in, no ads — just play.</p>
    </div>

    <div class="game-grid">

      <a href="games/circa/index.html" class="game-tile game-tile--featured">
        <span class="popular-badge">★ Most Popular</span>
        <span class="tile-icon">🏛️</span>
        <span class="tile-name">Circa</span>
      </a>

      <a href="games/map-quiz/index.html" class="game-tile">
        <span class="tile-icon">🗺️</span>
        <span class="tile-name">Map Quiz</span>
      </a>

      <a href="games/math-drill/index.html" class="game-tile">
        <span class="tile-icon">✖️</span>
        <span class="tile-name">Math Drill</span>
      </a>

      <a href="games/bible-quiz/index.html" class="game-tile">
        <span class="tile-icon">📖</span>
        <span class="tile-name">Bible Quiz</span>
      </a>

      <a href="games/flag-frenzy/index.html" class="game-tile">
        <span class="tile-icon">🚩</span>
        <span class="tile-name">Flag Frenzy</span>
      </a>

      <a href="games/who-said-it/index.html" class="game-tile">
        <span class="tile-icon">🎙️</span>
        <span class="tile-name">Who Said It?</span>
      </a>

      <a href="games/dragon-siege/index.html" class="game-tile game-tile--new">
        <span class="new-badge">✦ New</span>
        <span class="tile-icon">🐉</span>
        <span class="tile-name">Dragon Siege</span>
      </a>

    </div>
  </section>

  <footer class="site-footer">
    homeschoolgames.app
  </footer>

</body>
</html>
